<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | The Black Flower</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; color: #fff; padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .brand-header { text-align: center; margin-bottom: 30px; }
        .logo { width: 100px; height: auto; margin-bottom: 10px; }
        .brand-title { 
            font-family: "Times New Roman", Times, serif;
            font-size: 24px; letter-spacing: 3px; text-transform: uppercase; margin: 0; 
        }

        .admin-container {
            width: 100%;
            max-width: 500px;
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 8px;
        }

        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; letter-spacing: 1px; }

        label { display: block; margin-top: 15px; font-size: 13px; color: #888; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input:focus { border-color: #fff; outline: none; }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            margin-top: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add:hover { background: #ccc; }

        /* قائمة الإعلانات الحالية */
        .current-ads {
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
        }

        .ad-item {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ad-info h4 { margin: 0; font-size: 14px; }
        .ad-info p { margin: 5px 0 0; font-size: 11px; color: #555; }

        .btn-delete {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
        }

        .btn-delete:hover { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

    <div class="brand-header">
        <!-- استخدام الشعار من مسار GitHub الخاص بك -->
        <img src="wight.jpg" alt="Logo" class="logo">
        <h1 class="brand-title">Black Flower Admin</h1>
    </div>

    <div class="admin-container">
        <h2>إضافة إعلان جديد</h2>
        <label>عنوان الإعلان (Art Title)</label>
        <input type="text" id="adTitle" placeholder="مثال: التصميم المعماري الحديث">
        
        <label>رابط الوجهة (Target URL)</label>
        <input type="url" id="adUrl" placeholder="https://example.com">
        
        <button class="btn-add" onclick="addAd()">حفظ الإعلان ونشره</button>
    </div>

    <div class="current-ads">
        <h2>الإعلانات النشطة</h2>
        <div id="adsList">
            <!-- قائمة الإعلانات ستظهر هنا -->
        </div>
    </div>

    <script>
        // دالة لجلب الإعلانات وعرضها في لوحة التحكم
        function displayAds() {
            const adsList = document.getElementById('adsList');
            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            
            adsList.innerHTML = '';
            
            ads.forEach(ad => {
                const item = document.createElement('div');
                item.className = 'ad-item';
                item.innerHTML = `
                    <div class="ad-info">
                        <h4>${ad.title}</h4>
                        <p>${ad.url}</p>
                    </div>
                    <button class="btn-delete" onclick="deleteAd('${ad.id}')">حذف</button>
                `;
                adsList.appendChild(item);
            });

            if (ads.length === 0) {
                adsList.innerHTML = '<p style="text-align:center; color:#333; font-size:12px;">لا توجد إعلانات نشطة حالياً</p>';
            }
        }

        // دالة إضافة إعلان جديد
        function addAd() {
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;

            if (title && url) {
                const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
                const newAd = {
                    id: 'ad_' + Date.now(), // معرف فريد لكل إعلان
                    title: title,
                    url: url
                };
                
                ads.push(newAd);
                localStorage.setItem('ads_v2', JSON.stringify(ads));
                
                // تنظيف الخانات وتحديث القائمة
                document.getElementById('adTitle').value = '';
                document.getElementById('adUrl').value = '';
                displayAds();
                alert('تمت إضافة الإعلان بنجاح!');
            } else {
                alert('يرجى ملء جميع الخانات');
            }
        }

        // دالة حذف إعلان
        function deleteAd(id) {
            let ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            ads = ads.filter(ad => ad.id !== id);
            localStorage.setItem('ads_v2', JSON.stringify(ads));
            displayAds();
        }

        // تحميل القائمة عند فتح الصفحة
        displayAds();
    </script>
</body>
</html>
