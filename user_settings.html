<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات الحساب اليدوي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; width: 350px; border: 1px solid #222; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .forgot { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#28a745; text-align:center;">تعديل البيانات</h2>
        <input type="text" id="new_name" placeholder="اسم المستخدم الجديد">
        <input type="password" id="new_pass" placeholder="كلمة المرور الجديدة">
        <button onclick="saveManual()">حفظ التغييرات</button>
        
        <a href="#" onclick="forgotPass()" class="forgot">هل نسيت كلمة المرور؟</a>
        <a href="home.html" style="color:#444; display:block; text-align:center; margin-top:20px; text-decoration:none;">عودة</a>
    </div>

    <script>
        const _supabase = supabase.createClient('https://qxtubfnbbqnxteoocqrg.supabase.co', 'YOUR_KEY_HERE');

        async function saveManual() {
            const name = document.getElementById('new_name').value;
            const pass = document.getElementById('new_pass').value;
            const { data: { user } } = await _supabase.auth.getUser();

            // تحديث قاعدة البيانات مباشرة (صامت)
            if (name) await _supabase.from('profiles').update({ username: name }).eq('id', user.id);
            if (pass) await _supabase.auth.updateUser({ password: pass });

            alert("✅ تم الحفظ بنجاح دون الحاجة لتأكيد البريد.");
        }

        async function forgotPass() {
            const { data: { user } } = await _supabase.auth.getUser();
            await _supabase.auth.resetPasswordForEmail(user.email);
            alert("تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك.");
        }
    </script>
</body>
</html>
