<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الملف الشخصي - Manual Edit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #28a745;
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .settings-card {
            background: var(--card);
            padding: 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #1f1f1f;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 0.8rem; margin-bottom: 25px; }

        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; margin-bottom: 7px; color: #bbb; font-size: 0.9rem; }
        .field-group input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .field-group input:focus { border-color: var(--primary); outline: none; background: #222; }

        .update-btn {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .alert {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
            border: 1px solid transparent;
        }

        .home-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .home-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="settings-card">
        <h2>تحديث البيانات</h2>
        <p class="subtitle">خاص بالحسابات اليدوية فقط</p>
        
        <div class="field-group">
            <label>اسم المستخدم الجديد</label>
            <input type="text" id="manual_user" placeholder="تغيير الاسم الظاهر">
        </div>

        <div class="field-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="manual_pass" placeholder="أدخل كلمة مرور جديدة">
        </div>

        <button class="update-btn" onclick="performManualUpdate()">حفظ التغييرات</button>

        <div id="msg_box" class="alert"></div>

        <a href="home.html" class="home-link">🏠 الرجوع للوحة التحكم</a>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function performManualUpdate() {
            const userBox = document.getElementById('manual_user');
            const passBox = document.getElementById('manual_pass');
            const info = document.getElementById('msg_box');

            const { data: { user } } = await _supabase.auth.getUser();
            
            if (!user) {
                showAlert("جلسة العمل انتهت، يرجى الدخول مجدداً", "#ff4444");
                return;
            }

            let updates = {};
            if (userBox.value.trim()) updates.username = userBox.value.trim();
            if (passBox.value.trim()) updates.password = passBox.value.trim();

            if (Object.keys(updates).length === 0) {
                showAlert("لم يتم إدخال أي بيانات جديدة", "#ffc107");
                return;
            }

            // تحديث الجدول اليدوي (profiles)
            const { error: dbError } = await _supabase
                .from('profiles')
                .update(updates)
                .eq('id', user.id);

            if (dbError) {
                showAlert("خطأ في القاعدة: " + dbError.message, "#ff4444");
            } else {
                // تحديث كلمة المرور في نظام Auth أيضاً لضمان تسجيل الدخول القادم
                if (updates.password) {
                    await _supabase.auth.updateUser({ password: updates.password });
                }
                
                showAlert("✅ تم التحديث بنجاح! \n Profile updated successfully.", "var(--primary)");
                userBox.value = "";
                passBox.value = "";
            }
        }

        function showAlert(text, color) {
            const box = document.getElementById('msg_box');
            box.style.display = "block";
            box.innerText = text;
            box.style.color = color;
            box.style.borderColor = color;
        }
    </script>
</body>
</html>
