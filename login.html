<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--pure-white);
            text-align: center;
        }

        .logo-header img { 
            width: 80px; height: 80px; 
            border: 1px solid var(--pure-white);
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .brand-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 { 
            margin: 30px 0 20px 0; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            color: var(--light-gray);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--light-gray); font-size: 10px; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 12px; border: none; border-bottom: 1px solid #333;
            background-color: transparent; color: var(--pure-white); box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }

        .btn-login {
            width: 100%; padding: 15px; border: 1px solid var(--pure-white);
            background-color: var(--pure-white); color: var(--pure-black);
            font-size: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: var(--pure-black); color: var(--pure-white); }
        
        #status-msg { margin-top: 15px; font-size: 11px; color: #ff4444; display: none; }
        
        .footer-link { margin-top: 25px; font-size: 11px; color: var(--light-gray); }
        .footer-link a { color: var(--pure-white); text-decoration: none; border-bottom: 1px solid white; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
        </div>
        
        <h2>Authentication</h2>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="ENTER YOUR EMAIL" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="ENTER YOUR PASSWORD" required>
            </div>
            
            <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
        </form>
        
        <div id="status-msg"></div>

        <p class="footer-link">Not a member? <a href="rigister.html">Start Earning</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const statusMsg = document.getElementById('status-msg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            statusMsg.style.display = "none";
            btn.innerText = 'VERIFYING...';
            btn.disabled = true;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data.session) {
                    // نجاح! الانتقال لصفحة الهوم التي تظهر في صورتك
                    window.location.href = "home.html";
                }

            } catch (err) {
                statusMsg.innerText = err.message.toUpperCase();
                statusMsg.style.display = "block";
                btn.innerText = 'SIGN IN';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
