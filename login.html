<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --text-main: #f0f0f0;
            --text-dim: #888888;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Times New Roman', Times, serif;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .login-card {
            background: rgba(10, 10, 10, 0.8);
            padding: 50px;
            border: 1px solid #222;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-radius: 2px;
        }

        h2 {
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-family: Arial, sans-serif;
            margin-top: 8px;
            outline: none;
        }

        input:focus { border-color: var(--primary-accent); }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-accent);
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #ccc; }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: 1px solid #444;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .google-btn:hover { background: rgba(255,255,255,0.05); border-color: #666; }

        .footer-links { margin-top: 25px; font-size: 0.8rem; color: var(--text-dim); }
        .footer-links a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>AUTHENTICATE</h2>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-submit" onclick="handleLogin()">Sign In</button>

        <div style="margin: 20px 0; color: #333;">OR</div>

        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continue with Google
        </button>

        <div class="footer-links">
            Don't have an account? <a href="register.html">Join Now</a>
        </div>
    </div>

    <script>
        // إعداد Supabase
        const SUPABASE_URL = 'https://your-project-id.supabase.co';
        const SUPABASE_KEY = 'your-anon-key';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. تسجيل الدخول بالبريد وكلمة السر
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert(error.message);
            } else {
                // الانتقال لصفحة هوم عند النجاح
                window.location.href = "home.html";
            }
        }

        // 2. تسجيل الدخول عبر Google (Gmail)
        async function loginWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/home.html'
                }
            });
            if (error) alert(error.message);
        }
    </script>
</body>
</html>
