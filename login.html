<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.all.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --input-bg: #0a0a0a;
            --transition: all 0.3s ease;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Times New Roman', Times, serif;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .login-card {
            background: rgba(10, 10, 10, 0.9);
            padding: 50px;
            border: 1px solid #222;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        h2 { 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 1.6rem; 
            margin-bottom: 35px;
            background: linear-gradient(to bottom, #fff 50%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 25px; text-align: left; }
        label { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 8px; }

        input {
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333;
            color: #fff; font-family: Arial, sans-serif; outline: none; transition: var(--transition);
            border-radius: 2px; box-sizing: border-box;
        }

        input:focus { border-color: var(--primary-accent); box-shadow: 0 0 15px rgba(255,255,255,0.1); }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--primary-accent); color: #000;
            border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; margin-top: 15px; transition: var(--transition);
            border-radius: 2px; font-size: 0.9rem;
        }

        .btn-submit:hover { background: #ccc; transform: translateY(-2px); }
        .btn-submit:disabled { background: #444; cursor: not-allowed; transform: none; }

        #status-msg { 
            margin-top: 20px; font-size: 13px; display: none; padding: 12px; 
            border-radius: 2px; line-height: 1.4;
        }
        .error { color: #ff4444; background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.3); }
        .success { color: #00ff88; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); }

        .footer-links { margin-top: 30px; font-size: 0.85rem; color: var(--text-dim); border-top: 1px solid #222; padding-top: 20px; }
        .footer-links a { color: #fff; text-decoration: none; border-bottom: 1px solid #333; transition: var(--transition); }
        .footer-links a:hover { border-color: #fff; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>AUTHENTICATE</h2>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Sign In</button>
        
        <div id="status-msg"></div>

        <div class="footer-links">
            Don't have an account? <a href="register.html">Join the Ecosystem</a>
        </div>
    </div>

    <script>
        // --- إعدادات Supabase (تأكد من وضع بياناتك الحقيقية هنا) ---
        const SB_URL = 'https://YOUR_PROJECT_ID.supabase.co'; 
        const SB_KEY = 'YOUR_ANON_KEY';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const statusMsg = document.getElementById('status-msg');

            // التحقق من الحقول
            if (!email || !password) {
                showStatus("Error: All fields are required.", "error");
                return;
            }

            // تحديث حالة الزر
            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;
            statusMsg.style.display = 'none';

            try {
                // 1. تسجيل الدخول في نظام Auth
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // 2. التحقق من وجود المستخدم في جدول البيانات (اختياري لضمان المزامنة)
                if (data.user) {
                    showStatus("Authentication Successful. Redirecting...", "success");
                    
                    // تأخير بسيط لضمان تخزين الجلسة (Session) في المتصفح
                    setTimeout(() => {
                        window.location.href = "home.html";
                    }, 1200);
                }

            } catch (err) {
                console.error("Login System Error:", err.message);
                showStatus(err.message, "error");
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        }

        function showStatus(text, type) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = text;
            statusMsg.className = type;
            statusMsg.style.display = 'block';
        }

        // دعم الضغط على مفتاح Enter
        document.addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') handleLogin(); 
        });
    </script>
</body>
</html>
