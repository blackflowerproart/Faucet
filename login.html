<div style="text-align: center; padding: 20px;">
    <img src="wight.jpg" alt="Logo" style="width: 100px; height: auto;">
    <h1 style="font-family: 'Times New Roman', Times, serif; margin: 0;">The Black Flower</h1>
    <p style="font-family: Arial, sans-serif; font-size: 14px; color: gray; margin: 0;">Professional Art</p>
    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>تسجيل الدخول</title>
</head>
<body>
    <!-- الشعار هنا -->
    <div style="max-width: 300px; margin: auto; text-align: center;">
        <input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>
        <input type="password" id="password" placeholder="كلمة السر"><br><br>
        <button onclick="login()">دخول</button>
        <button onclick="signInWithGoogle()">دخول بواسطة Google</button>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function login() {
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert(error.message);
            else window.location.href = 'home.html';
        }
    </script>
</body>
</html>
</div>
