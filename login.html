<script>
    // 1. إعدادات المشروع (تأكد من صحتها)
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';

    // 2. التهيئة الفورية (Initialization)
    // نستخدم اسم ثابت وموحد لتجنب أخطاء التعريف
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. دالة تسجيل الدخول
    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const statusMsg = document.getElementById('status-msg');

        // التحقق من أن العميل جاهز
        if (!supabaseClient) {
            alert("Supabase is not initialized yet!");
            return;
        }

        if (!email || !password) {
            showStatus("Please enter your email and password.", "error");
            return;
        }

        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) throw error;

            if (data.user) {
                showStatus("Success! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1000);
            }
        } catch (err) {
            showStatus(err.message, "error");
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    }

    function showStatus(text, type) {
        const statusMsg = document.getElementById('status-msg');
        if (statusMsg) {
            statusMsg.innerText = text;
            statusMsg.className = type;
            statusMsg.style.display = 'block';
        } else {
            alert(text);
        }
    }
</script>
