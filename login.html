<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --text-main: #f0f0f0;
            --text-dim: #888888;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Times New Roman', Times, serif;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .login-card {
            background: rgba(10, 10, 10, 0.8);
            padding: 50px;
            border: 1px solid #222;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-radius: 2px;
            backdrop-filter: blur(10px);
        }

        h2 {
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 12px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-family: Arial, sans-serif;
            margin-top: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-accent); }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-accent);
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #ccc; transform: translateY(-2px); }

        /* رسالة الخطأ */
        #error-msg { color: #ff4444; font-size: 12px; margin-top: 15px; display: none; }

        .footer-links { margin-top: 25px; font-size: 0.8rem; color: var(--text-dim); }
        .footer-links a { color: #fff; text-decoration: none; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>AUTHENTICATE</h2>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="btn-submit" id="signInBtn" onclick="handleLogin()">Sign In</button>
        
        <div id="error-msg">Invalid credentials. Please try again.</div>

        <div class="footer-links">
            New to the ecosystem? <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        // إعداد Supabase (استبدل القيم ببياناتك)
        const SUPABASE_URL = 'https://your-project.id.supabase.co';
        const SUPABASE_KEY = 'your-anon-key';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('signInBtn');
            const errorMsg = document.getElementById('error-msg');

            // تغيير حالة الزر أثناء التحميل
            btn.innerText = "Verifying...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                // إذا نجح الدخول:
                if (data.user) {
                    // الانتقال لصفحة الهوم
                    window.location.href = "home.html";
                }

            } catch (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        }

        // تسجيل الدخول بالضغط على Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
