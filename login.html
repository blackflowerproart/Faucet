<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--pure-white);
            text-align: center;
        }

        .logo-header { margin-bottom: 20px; }
        .logo-header img { 
            width: 80px; height: 80px; 
            border: 1px solid var(--pure-white);
            filter: grayscale(100%);
            margin-bottom: 15px;
        }

        .brand-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--light-gray);
            margin-top: 5px;
            text-transform: uppercase;
        }

        h2 { 
            margin: 30px 0 10px 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--light-gray); font-size: 9px; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 10px; border: none; border-bottom: 1px solid #333;
            background-color: transparent; color: var(--pure-white); box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }

        .btn-login {
            width: 100%; padding: 15px; border: 1px solid var(--pure-white);
            background-color: var(--pure-white); color: var(--pure-black);
            font-size: 13px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
            margin-top: 20px;
        }
        .btn-login:hover { background-color: var(--pure-black); color: var(--pure-white); }
        .btn-login:disabled { background-color: #444; cursor: not-allowed; opacity: 0.6; }

        .footer-link { margin-top: 25px; font-size: 10px; color: var(--light-gray); }
        .footer-link a { color: var(--pure-white); text-decoration: none; border-bottom: 1px solid var(--pure-white); }
        
        #status-msg { margin-top: 15px; font-size: 11px; display: none; text-transform: uppercase; color: #ff4444; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
            <div class="brand-subtitle">Professional Art</div>
        </div>
        
        <h2>Authentication</h2>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="EMAIL@EXAMPLE.COM">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button type="button" id="loginBtn" onclick="handleLogin()" class="btn-login">Sign In</button>
        
        <div id="status-msg"></div>

        <p class="footer-link">New Member? <a href="register.html">Create Account</a></p>
    </div>

    <script>
        // 1. إعدادات Supabase
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        
        // 2. تهيئة العميل فوراً
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 3. دالة تسجيل الدخول المباشرة
        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const statusMsg = document.getElementById('status-msg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // التحقق من الحقول
            if (!email || !password) {
                showError("Please enter your credentials.");
                return;
            }

            // تحديث حالة الزر
            btn.innerText = 'AUTHENTICATING...';
            btn.disabled = true;
            statusMsg.style.display = "none";

            try {
                // تنفيذ عملية تسجيل الدخول
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data.user) {
                    // تحويل المستخدم لصفحة الـ Home عند النجاح
                    window.location.href = "home.html";
                }

            } catch (err) {
                console.error("Login Error:", err.message);
                showError(err.message);
                btn.innerText = 'SIGN IN';
                btn.disabled = false;
            }
        }

        function showError(text) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = text;
            statusMsg.style.display = "block";
        }
    </script>
</body>
</html>
