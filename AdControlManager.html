<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Management | The Black Flower</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #000; color: #fff; padding: 40px 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; background: #0a0a0a; border: 1px solid #222; padding: 30px; border-radius: 4px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: "Times New Roman", serif; letter-spacing: 2px; text-transform: uppercase; margin: 0; font-size: 24px; }
        
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #888; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #111; 
            border: 1px solid #333; color: #fff; border-radius: 2px; box-sizing: border-box;
        }
        input:focus { border-color: #fff; outline: none; }

        .btn-submit { 
            width: 100%; padding: 15px; background: #fff; color: #000; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #ccc; }

        .btn-back { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 11px; text-transform: uppercase; }
        .btn-back:hover { color: #fff; }

        .ads-list { margin-top: 40px; width: 100%; max-width: 500px; }
        .ad-item { background: #050505; border: 1px solid #111; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .ad-item span { font-size: 13px; color: #ccc; }
        .btn-delete { background: none; border: 1px solid #444; color: #444; padding: 5px 10px; cursor: pointer; font-size: 10px; }
        .btn-delete:hover { border-color: #ff0000; color: #ff0000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ad Control Manager</h1>
        <p style="font-size: 10px; color: #444; letter-spacing: 2px; margin-top: 5px;">THE BLACK FLOWER SYSTEM</p>
    </div>

    <div class="container">
        <label>عنوان الإعلان</label>
        <input type="text" id="adTitle" placeholder="أدخل اسم الإعلان الفني">

        <label>رابط الإعلان (URL)</label>
        <input type="url" id="adUrl" placeholder="https://example.com">

        <button class="btn-submit" onclick="addAd()">نشر الإعلان فوراً</button>
        <a href="index.html" class="btn-back">العودة لصفحة العرض</a>
    </div>

    <div class="ads-list" id="currentAds">
        <h2 style="font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px;">الإعلانات النشطة حالياً</h2>
        <div id="listBody"></div>
    </div>

    <script>
        function loadAds() {
            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            const listBody = document.getElementById('listBody');
            listBody.innerHTML = '';

            ads.forEach(ad => {
                const div = document.createElement('div');
                div.className = 'ad-item';
                div.innerHTML = `
                    <span>${ad.title}</span>
                    <button class="btn-delete" onclick="deleteAd('${ad.id}')">إزالة</button>
                `;
                listBody.appendChild(div);
            });
        }

        function addAd() {
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;

            if (!title || !url) {
                alert("يرجى ملء كافة الخانات");
                return;
            }

            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            const newAd = {
                id: 'ad_' + Date.now(),
                title: title,
                url: url
            };

            ads.push(newAd);
            localStorage.setItem('ads_v2', JSON.stringify(ads));
            
            document.getElementById('adTitle').value = '';
            document.getElementById('adUrl').value = '';
            
            alert("تمت إضافة الإعلان بنجاح!");
            loadAds();
        }

        function deleteAd(id) {
            let ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            ads = ads.filter(ad => ad.id !== id);
            localStorage.setItem('ads_v2', JSON.stringify(ads));
            loadAds();
        }

        loadAds();
    </script>
</body>
</html>
