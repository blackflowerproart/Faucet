<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Control Manager | The Black Flower</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #0a0a0a;
            --accent: #fff;
            --border: #222;
            --danger: #ff4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); color: #fff; padding: 40px 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { 
            width: 100%; max-width: 500px; background: var(--card-bg); 
            border: 1px solid var(--border); padding: 30px; border-radius: 4px; 
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-family: serif; letter-spacing: 2px; 
            text-transform: uppercase; margin: 0; font-size: 22px; 
        }
        
        .price-badge { 
            background: #111; padding: 15px; border-radius: 2px; 
            text-align: center; margin-bottom: 25px; border: 1px dashed #444; 
            color: #fff; font-weight: bold; font-size: 13px;
        }

        label { display: block; margin-bottom: 8px; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #000; 
            border: 1px solid #333; color: #fff; border-radius: 2px; box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-publish { 
            width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-publish:hover { opacity: 0.8; }

        .btn-back { 
            display: block; text-align: center; color: #444; text-decoration: none; 
            font-size: 10px; text-transform: uppercase; margin-top: 20px;
        }

        .manage-section { margin-top: 40px; width: 100%; max-width: 500px; }
        .ad-item { 
            background: #050505; border: 1px solid var(--border); padding: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .ad-details strong { display: block; font-size: 13px; color: #fff; }
        .ad-details small { color: #444; font-size: 10px; }
        .btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 5px 10px; cursor: pointer; font-size: 9px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ad Control Center</h1>
        <p style="font-size: 9px; color: #444; letter-spacing: 2px; margin-top: 5px;">THE BLACK FLOWER PRO ART</p>
    </div>

    <div class="container">
        <div class="price-badge">PUBLISHING COST: 50.00 BFP</div>

        <label>Ad Title</label>
        <input type="text" id="adTitle" placeholder="e.g. 3D Architectural Design">

        <label>Target URL</label>
        <input type="url" id="adUrl" placeholder="https://example.com">

        <label>Promo Code (For Free Access)</label>
        <input type="text" id="promoCode" placeholder="Enter '123456789' for free">

        <button class="btn-publish" onclick="publishAd()">Publish to Home</button>
        <a href="home.html" class="btn-back">Back to Dashboard</a>
    </div>

    <div class="manage-section">
        <div id="managerList"></div>
    </div>

    <script>
        const FREE_CODE = "123456789";
        const AD_COST = 50;

        function publishAd() {
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;
            const code = document.getElementById('promoCode').value;

            if (!title || !url) {
                alert("Please fill in Title and URL.");
                return;
            }

            // Check Payment
            if (code !== FREE_CODE) {
                let currentBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
                
                if (currentBalance < AD_COST) {
                    alert("Insufficient Balance. You need 50 BFP or a valid Promo Code.");
                    return;
                }

                const confirmPay = confirm(`Spend ${AD_COST} BFP to publish this ad?`);
                if (!confirmPay) return;

                // Deduct Balance
                currentBalance -= AD_COST;
                localStorage.setItem('bfp_balance', currentBalance.toFixed(2));
            } else {
                alert("Promo Code accepted! Publishing for free.");
            }

            // Add to Ads List (Shared with Home)
            const ads = JSON.parse(localStorage.getItem('added_ads')) || [];
            const newAd = {
                id: 'ad_' + Date.now(),
                title: title,
                url: url
            };

            ads.push(newAd);
            localStorage.setItem('added_ads', JSON.stringify(ads));
            
            // Clear inputs
            document.getElementById('adTitle').value = '';
            document.getElementById('adUrl').value = '';
            document.getElementById('promoCode').value = '';
            
            alert("Ad published successfully!");
            renderManager();
        }

        function renderManager() {
            const ads = JSON.parse(localStorage.getItem('added_ads')) || [];
            const list = document.getElementById('managerList');
            list.innerHTML = '<h2 style="font-size:12px; text-transform:uppercase; color:#333; margin-bottom:15px;">Active Ads</h2>';

            if (ads.length === 0) {
                list.innerHTML += '<p style="font-size:10px; color:#222; text-align:center;">No ads running.</p>';
                return;
            }

            ads.forEach(ad => {
                const div = document.createElement('div');
                div.className = 'ad-item';
                div.innerHTML = `
                    <div class="ad-details">
                        <strong>${ad.title}</strong>
                        <small>${ad.url}</small>
                    </div>
                    <button class="btn-delete" onclick="deleteAd('${ad.id}')">Delete</button>
                `;
                list.appendChild(div);
            });
        }

        function deleteAd(id) {
            if (confirm("Remove this ad from Home?")) {
                let ads = JSON.parse(localStorage.getItem('added_ads')) || [];
                ads = ads.filter(item => item.id !== id);
                localStorage.setItem('added_ads', JSON.stringify(ads));
                renderManager();
            }
        }

        window.onload = renderManager;
    </script>
</body>
</html>
