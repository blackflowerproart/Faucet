<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Control Manager | The Black Flower</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #0a0a0a;
            --accent: #fff;
            --border: #222;
            --danger: #ff4444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); color: #fff; padding: 40px 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { 
            width: 100%; max-width: 500px; background: var(--card-bg); 
            border: 1px solid var(--border); padding: 30px; border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-family: "Times New Roman", serif; letter-spacing: 2px; 
            text-transform: uppercase; margin: 0; font-size: 24px; 
        }
        
        .price-badge { 
            background: #111; padding: 12px; border-radius: 4px; 
            text-align: center; margin-bottom: 25px; border: 1px dashed #333; 
            color: #00ff00; font-weight: bold; font-size: 14px;
        }

        label { display: block; margin-bottom: 8px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #050505; 
            border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; background: #080808; }

        .btn-publish { 
            width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 4px; transition: 0.3s;
        }
        .btn-publish:hover { background: #ccc; transform: translateY(-2px); }

        .btn-back { 
            display: block; text-align: center; color: #666; text-decoration: none; 
            font-size: 11px; text-transform: uppercase; margin-top: 15px; letter-spacing: 1px;
        }
        .btn-back:hover { color: #fff; }

        /* قسم إدارة الإعلانات */
        .manage-section { 
            margin-top: 50px; width: 100%; max-width: 500px; 
            border-top: 1px solid var(--border); padding-top: 30px; 
        }
        .manage-title { font-size: 14px; color: #fff; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; text-align: center; }
        
        .ad-item { 
            background: #050505; border: 1px solid var(--border); padding: 15px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-radius: 4px;
        }
        .ad-details strong { display: block; font-size: 14px; margin-bottom: 4px; }
        .ad-details small { color: #444; font-size: 10px; word-break: break-all; }
        
        .btn-delete { 
            background: transparent; border: 1px solid var(--danger); color: var(--danger); 
            padding: 6px 12px; cursor: pointer; font-size: 10px; text-transform: uppercase;
            border-radius: 3px; transition: 0.3s;
        }
        .btn-delete:hover { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ad Control Center</h1>
        <p style="font-size: 9px; color: #444; letter-spacing: 3px; margin-top: 8px;">THE BLACK FLOWER PRO ART SYSTEM</p>
    </div>

    <div class="container">
        <div class="price-badge">تكلفة النشر: 0.01 USD</div>

        <label>عنوان الإعلان</label>
        <input type="text" id="adTitle" placeholder="مثال: معرض التصميم الثلاثي الأبعاد">

        <label>رابط الموقع (URL)</label>
        <input type="url" id="adUrl" placeholder="https://example.com">

        <label>البرومو كود (للنشر المجاني)</label>
        <input type="text" id="promoCode" placeholder="أدخل كود 9861003993 للمجاني">

        <button class="btn-publish" onclick="publishAd()">نشر الإعلان الآن</button>
        <a href="home.html" class="btn-back">العودة للرئيسية</a>
    </div>

    <div class="manage-section">
        <h2 class="manage-title">الإعلانات النشطة</h2>
        <div id="managerList"></div>
    </div>

    <script>
        const FREE_CODE = "9861003993"; // الكود الذي حددته

        function publishAd() {
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;
            const code = document.getElementById('promoCode').value;

            if (!title || !url) {
                alert("يرجى تعبئة الحقول الأساسية (العنوان والرابط)");
                return;
            }

            // نظام التحقق من الدفع/الكود
            if (code !== FREE_CODE) {
                const confirmPayment = confirm("سيتم احتساب تكلفة 0.01 لنشر هذا الإعلان. هل تود المتابعة؟");
                if (!confirmPayment) return;
            } else {
                alert("تم قبول البرومو كود! النشر مجاني.");
            }

            // حفظ الإعلان
            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            const newAd = {
                id: 'ad_' + Date.now(),
                title: title,
                url: url,
                createdAt: Date.now()
            };

            ads.push(newAd);
            localStorage.setItem('ads_v2', JSON.stringify(ads));
            
            // إعادة تعيين الحقول
            document.getElementById('adTitle').value = '';
            document.getElementById('adUrl').value = '';
            document.getElementById('promoCode').value = '';
            
            alert("تم إرسال الإعلان إلى صفحة Home بنجاح!");
            renderManager();
        }

        function renderManager() {
            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            const list = document.getElementById('managerList');
            list.innerHTML = '';

            if (ads.length === 0) {
                list.innerHTML = '<p style="font-size:11px; color:#333; text-align:center;">لا توجد إعلانات منشورة حالياً</p>';
                return;
            }

            ads.forEach(ad => {
                const div = document.createElement('div');
                div.className = 'ad-item';
                div.innerHTML = `
                    <div class="ad-details">
                        <strong>${ad.title}</strong>
                        <small>${ad.url}</small>
                    </div>
                    <button class="btn-delete" onclick="deleteAd('${ad.id}')">حذف</button>
                `;
                list.appendChild(div);
            });
        }

        function deleteAd(id) {
            if (confirm("هل تريد إزالة هذا الإعلان نهائياً من العرض؟")) {
                let ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
                ads = ads.filter(item => item.id !== id);
                localStorage.setItem('ads_v2', JSON.stringify(ads));
                renderManager();
            }
        }

        // تشغيل العرض عند التحميل
        window.onload = renderManager;
    </script>
</body>
</html>
