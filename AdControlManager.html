<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Control Manager | The Black Flower</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #0a0a0a;
            --accent: #fff;
            --border: #222;
        }

        body { 
            font-family: Arial, sans-serif; 
            background-color: var(--bg-color); color: #fff; padding: 40px 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 4px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: "Times New Roman", serif; letter-spacing: 2px; text-transform: uppercase; margin: 0; font-size: 24px; }
        
        .price-tag { background: #111; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 20px; border: 1px dashed #444; color: #00ff00; font-weight: bold; }

        label { display: block; margin-bottom: 8px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #050505; 
            border: 1px solid #333; color: #fff; border-radius: 2px; box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-submit { 
            width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; margin-bottom: 10px;
        }
        .btn-submit:hover { background: #ccc; }

        .btn-back { display: block; text-align: center; color: #555; text-decoration: none; font-size: 11px; text-transform: uppercase; margin-top: 10px; }

        /* قسم إدارة الإعلانات المحذوفة */
        .manage-section { margin-top: 40px; width: 100%; max-width: 500px; border-top: 1px solid var(--border); padding-top: 20px; }
        .ad-item { background: #0a0a0a; border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .ad-info { font-size: 13px; }
        .btn-delete { background: none; border: 1px solid #ff0000; color: #ff0000; padding: 5px 12px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .btn-delete:hover { background: #ff0000; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ad Control Manager</h1>
        <p style="font-size: 9px; color: #444; letter-spacing: 3px; margin-top: 5px;">THE BLACK FLOWER PRO ART</p>
    </div>

    <div class="container">
        <div class="price-tag">سعر الإعلان الحالي: 0.01 وحدة</div>

        <label>عنوان الإعلان</label>
        <input type="text" id="adTitle" placeholder="أدخل اسم الإعلان">

        <label>رابط الإعلان (URL)</label>
        <input type="url" id="adUrl" placeholder="https://example.com">

        <label>برومو كود (للإعلان المجاني)</label>
        <input type="text" id="promoCode" placeholder="أدخل الكود إن وجد">

        <button class="btn-submit" onclick="publishAd()">نشر الإعلان (24 ساعة)</button>
        <a href="home.html" class="btn-back">العودة لصفحة HOME</a>
    </div>

    <div class="manage-section">
        <h2 style="font-size: 12px; color: #555; text-transform: uppercase; margin-bottom: 15px;">إدارة وحذف الإعلانات</h2>
        <div id="managerList"></div>
    </div>

    <script>
        const FREE_CODE = "9861003993"; // كود الإعلان المجاني
        const AD_PRICE = 0.01; // سعر الإعلان

        function publishAd() {
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;
            const code = document.getElementById('promoCode').value;

            if (!title || !url) {
                alert("يرجى إدخال كافة البيانات المطلوبة");
                return;
            }

            // التحقق من البرومو كود أو السعر
            if (code !== FREE_CODE) {
                const confirmPay = confirm(`سعر نشر الإعلان هو ${AD_PRICE}. هل تود المتابعة والخصم من الميزانية؟`);
                if (!confirmPay) return;
            } else {
                alert("تم تفعيل الكود المجاني بنجاح!");
            }

            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            const newAd = {
                id: 'ad_' + Date.now(),
                title: title,
                url: url,
                timestamp: Date.now()
            };

            ads.push(newAd);
            localStorage.setItem('ads_v2', JSON.stringify(ads));
            
            // تنظيف المدخلات
            document.getElementById('adTitle').value = '';
            document.getElementById('adUrl').value = '';
            document.getElementById('promoCode').value = '';
            
            alert("تم نشر الإعلان بنجاح، سيظهر في صفحة Home لمدة 24 ساعة بمجرد مشاهدته.");
            renderManager();
        }

        function renderManager() {
            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            const list = document.getElementById('managerList');
            list.innerHTML = '';

            if (ads.length === 0) {
                list.innerHTML = '<p style="font-size:11px; color:#333; text-align:center;">لا توجد إعلانات نشطة للحذف</p>';
                return;
            }

            ads.forEach(ad => {
                const item = document.createElement('div');
                item.className = 'ad-item';
                item.innerHTML = `
                    <div class="ad-info">
                        <strong>${ad.title}</strong><br>
                        <small style="color:#444">${ad.url}</small>
                    </div>
                    <button class="btn-delete" onclick="deleteAd('${ad.id}')">حذف الآن</button>
                `;
                list.appendChild(item);
            });
        }

        function deleteAd(id) {
            if (confirm("هل أنت متأكد من حذف هذا الإعلان نهائياً من صفحة العرض؟")) {
                let ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
                ads = ads.filter(ad => ad.id !== id);
                localStorage.setItem('ads_v2', JSON.stringify(ads));
                renderManager();
            }
        }

        // تحديث القائمة عند فتح الصفحة
        renderManager();
    </script>
</body>
</html>
