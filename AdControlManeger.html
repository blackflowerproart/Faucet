<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ad Campaign | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #ffffff; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 100%; max-width: 450px; background: var(--card); padding: 30px; border: 1px solid #222; border-radius: 8px; }
        h2 { text-align: center; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .price-box { background: #111; padding: 15px; border-left: 3px solid #fff; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Launch Campaign</h2>
        <div class="field">
            <label>Ad Title</label>
            <input type="text" id="adTitle" placeholder="Enter title...">
        </div>
        <div class="field">
            <label>Target URL</label>
            <input type="url" id="adUrl" placeholder="https://...">
        </div>
        <div class="field">
            <label>Ad Duration</label>
            <select id="durationType" onchange="calc()">
                <option value="10">10 Seconds (50 BFP/Day)</option>
                <option value="20">20 Seconds (100 BFP/Day)</option>
            </select>
        </div>
        <div class="field">
            <label>Campaign Period</label>
            <select id="adDays" onchange="calc()">
                <option value="1">1 Day (24H)</option>
                <option value="7">1 Week</option>
                <option value="30">1 Month</option>
            </select>
        </div>
        <div class="price-box">Total Cost: <b id="total">50</b> BFP</div>
        <button class="btn" id="launchBtn" onclick="launch()">Launch Now</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function calc() {
            const p = document.getElementById('durationType').value == "20" ? 100 : 50;
            const d = document.getElementById('adDays').value;
            const total = p * d;
            document.getElementById('total').innerText = total;
            return total;
        }

        async function launch() {
            const btn = document.getElementById('launchBtn');
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;
            if(!title || !url) return alert("Fill all fields");

            btn.disabled = true; btn.innerText = "Processing...";
            
            const { data: { session } } = await _supabase.auth.getSession();
            const { data: profile } = await _supabase.from('blackflowerproart').select('balance').eq('user_id', session.user.id).single();
            const cost = calc();

            if(profile.balance < cost) {
                alert("Insufficient Balance");
                btn.disabled = false; return;
            }

            const expiry = new Date();
            expiry.setHours(expiry.getHours() + (document.getElementById('adDays').value * 24));

            await _supabase.from('blackflowerproart').update({ balance: profile.balance - cost }).eq('user_id', session.user.id);
            await _supabase.from('ads').insert([{
                title, url, duration: parseInt(document.getElementById('durationType').value),
                expiry_at: expiry.toISOString(), user_id: session.user.id
            }]);

            alert("Campaign Active!"); window.location.href='home.html';
        }
    </script>
</body>
</html>
