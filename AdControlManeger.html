<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Control Manager | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-black: #050505;
            --card-black: #0a0a0a;
            --accent: #ffffff;
            --dim-gray: #888888;
            --success: #00ff00;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .manager-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-black);
            padding: 40px;
            border: 1px solid #222;
            border-radius: 2px;
            text-align: center;
        }

        /* الشعار والعنوان */
        .logo-small { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; display: block; border: 1px solid #333; object-fit: cover; }
        .brand { font-family: 'Times New Roman', serif; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; }
        .pro-art-sub { font-size: 0.7rem; letter-spacing: 4px; color: var(--dim-gray); text-transform: uppercase; display: block; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--dim-gray); margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .price-display {
            background: #111;
            padding: 15px;
            border: 1px solid #222;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-display b { color: var(--success); font-size: 1.2rem; }

        .promo-section {
            margin-top: 10px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #ccc; }
        .submit-btn:disabled { background: #444; cursor: not-allowed; }
        
        .back-link { display: block; margin-top: 20px; color: var(--dim-gray); text-decoration: none; font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="manager-container">
        <img src="wight.jpg" alt="Logo" class="logo-small">
        <h1 class="brand">The Black Flower</h1>
        <span class="pro-art-sub">professional art</span>

        <div class="input-group">
            <label>Campaign Title</label>
            <input type="text" id="adTitle" placeholder="Enter ad title...">
        </div>

        <div class="input-group">
            <label>Target URL</label>
            <input type="url" id="adUrl" placeholder="https://example.com">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Duration</label>
                <select id="durationType" onchange="calculatePrice()">
                    <option value="10">10 Seconds</option>
                    <option value="20">20 Seconds</option>
                </select>
            </div>
            <div class="input-group">
                <label>Period</label>
                <select id="adDays" onchange="calculatePrice()">
                    <option value="1">24 Hours</option>
                    <option value="7">1 Week</option>
                    <option value="30">1 Month</option>
                </select>
            </div>
        </div>

        <div class="price-display">
            <span style="font-size: 11px; letter-spacing: 1px;">ESTIMATED COST:</span>
            <span><b id="totalCostDisplay">50</b> BFP</span>
        </div>

        <div class="promo-section">
            <div class="input-group">
                <label>Promo Code</label>
                <input type="text" id="promoCode" placeholder="Enter code for FREE ad" oninput="calculatePrice()">
            </div>
        </div>

        <button class="submit-btn" id="launchBtn" onclick="processCampaign()">Launch Campaign</button>
        <a href="home.html" class="back-link">← CANCEL & RETURN</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const FREE_CODE = "9861003993";

        function calculatePrice() {
            const duration = document.getElementById('durationType').value;
            const days = document.getElementById('adDays').value;
            const promoInput = document.getElementById('promoCode').value.trim();
            
            let dailyPrice = (duration === "20") ? 100 : 50;
            let total = dailyPrice * days;

            if (promoInput === FREE_CODE) {
                document.getElementById('totalCostDisplay').innerText = "FREE";
                return 0;
            } else {
                document.getElementById('totalCostDisplay').innerText = total;
                return total;
            }
        }

        async function processCampaign() {
            const btn = document.getElementById('launchBtn');
            const title = document.getElementById('adTitle').value.trim();
            const url = document.getElementById('adUrl').value.trim();
            const duration = parseInt(document.getElementById('durationType').value);
            const days = parseInt(document.getElementById('adDays').value);
            const promoInput = document.getElementById('promoCode').value.trim();
            const totalCost = calculatePrice();

            if (!title || !url) { alert("Please fill all fields"); return; }

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) throw new Error("Authentication required");

                // التحقق من الرصيد والخصم (فقط إذا لم يكن مجانياً)
                if (promoInput !== FREE_CODE) {
                    const { data: profile } = await _supabase.from('blackflowerproart').select('balance').eq('user_id', session.user.id).single();
                    if (profile.balance < totalCost) {
                        alert("Insufficient BFP Balance");
                        btn.disabled = false; btn.innerText = "Launch Campaign";
                        return;
                    }
                    await _supabase.from('blackflowerproart').update({ balance: profile.balance - totalCost }).eq('user_id', session.user.id);
                }

                // حساب تاريخ الانتهاء
                const expiryDate = new Date();
                expiryDate.setHours(expiryDate.getHours() + (days * 24));

                // إضافة الإعلان مع كافة الخصائص لضمان ظهورها في الهوم
                const { error } = await _supabase.from('ads').insert([{
                    title: title,
                    url: url,
                    duration: duration,
                    expiry_at: expiryDate.toISOString(),
                    user_id: session.user.id,
                    cost: totalCost // حفظ التكلفة المدفوعة
                }]);

                if (error) throw error;

                alert("Campaign successfully launched!");
                window.location.href = 'home.html';

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Launch Campaign";
            }
        }
    </script>
</body>
</html>
