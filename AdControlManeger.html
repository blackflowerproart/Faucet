<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS Publishing | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #0a0a0a;
            --accent: #fff;
            --border: #222;
            --danger: #ff4444;
        }

        body { 
            font-family: Arial, sans-serif; 
            background-color: var(--bg-color); color: #fff; padding: 40px 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-main {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 1px solid #333; margin-bottom: 15px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-family: 'Times New Roman', serif; letter-spacing: 2px; 
            text-transform: uppercase; margin: 0; font-size: 26px; 
        }
        .pro-art-sub {
            font-family: Arial, sans-serif; font-size: 0.7rem;
            letter-spacing: 4px; color: #888; text-transform: uppercase;
            margin-top: 5px; display: block;
        }

        .container { 
            width: 100%; max-width: 500px; background: var(--card-bg); 
            border: 1px solid var(--border); padding: 30px; border-radius: 4px; 
        }
        
        .price-info { 
            background: #111; padding: 15px; border-radius: 2px; 
            text-align: center; margin-bottom: 25px; border: 1px dashed #444; 
            color: #fff; font-size: 12px; line-height: 1.6;
        }

        label { display: block; margin-bottom: 8px; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #000; 
            border: 1px solid #333; color: #fff; border-radius: 2px; box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-publish { 
            width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-back { 
            display: block; text-align: center; color: #444; text-decoration: none; 
            font-size: 10px; text-transform: uppercase; margin-top: 20px;
        }

        /* رسالة التأكيد السوداء */
        #customAlert {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #000; 
            border: 2px solid #fff; padding: 30px; z-index: 1000;
            text-align: center; min-width: 300px; box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        #customAlert h3 { font-family: 'Times New Roman', serif; margin-top: 0; text-transform: uppercase; }
        #customAlert button { 
            background: #fff; color: #000; border: none; padding: 10px 20px; 
            margin-top: 20px; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }

        .ad-item { 
            background: #050505; border: 1px solid var(--border); padding: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 500px; margin-top: 10px;
        }
    </style>
</head>
<body>

    <img src="wight.jpg" alt="Logo" class="logo-main">

    <div class="header">
        <h1>ADS Publishing</h1>
        <span class="pro-art-sub">professional art</span>
    </div>

    <div class="container">
        <div class="price-info">
            20 SECONDS = 100 BFP<br>
            10 SECONDS = 50 BFP
        </div>

        <label>Ad Title</label>
        <input type="text" id="adTitle">

        <label>Target URL</label>
        <input type="url" id="adUrl">

        <label>Duration</label>
        <select id="adDuration">
            <option value="50">10 Seconds (50 BFP)</option>
            <option value="100">20 Seconds (100 BFP)</option>
        </select>

        <label>Promo Code</label>
        <input type="text" id="promoCode">

        <button class="btn-publish" id="publishBtn" onclick="processAd()">Publish Ad</button>
        <a href="home.html" class="btn-back">Back to Dashboard</a>
    </div>

    <div id="customAlert">
        <h3 id="alertTitle">Success</h3>
        <p id="alertMsg">Published successfully.</p>
        <button onclick="closeAlert()">Done</button>
    </div>

    <div id="managerList" style="margin-top: 30px; width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

    <script>
        const SECRET_PROMO = "9861003993";
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function processAd() {
            const title = document.getElementById('adTitle').value;
            const url = document.getElementById('adUrl').value;
            const cost = parseInt(document.getElementById('adDuration').value);
            const code = document.getElementById('promoCode').value;
            const btn = document.getElementById('publishBtn');

            if (!title || !url) {
                alert("PLEASE FILL ALL FIELDS");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PUBLISHING...";

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) throw new Error("No active session");

                if (code === SECRET_PROMO) {
                    await saveAdToSupabase(title, url, session.user.id);
                    showSuccessAlert("PROMO CODE ACCEPTED", "YOUR AD HAS BEEN PUBLISHED FOR FREE SUCCESSFULLY.");
                } else {
                    // التحقق من الرصيد
                    const { data: profile, error: profileErr } = await _supabase
                        .from('blackflowerproart')
                        .select('balance')
                        .eq('user_id', session.user.id)
                        .single();

                    if (profileErr || profile.balance < cost) {
                        alert("INSUFFICIENT BALANCE!");
                        btn.disabled = false;
                        btn.innerText = "PUBLISH AD";
                        return;
                    }

                    // خصم الرصيد ونشر الإعلان
                    const newBalance = profile.balance - cost;
                    await _supabase.from('blackflowerproart').update({ balance: newBalance }).eq('user_id', session.user.id);
                    await saveAdToSupabase(title, url, session.user.id);
                    showSuccessAlert("AD PUBLISHED", "THE COST HAS BEEN DEDUCTED FROM YOUR BALANCE.");
                }
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "PUBLISH AD";
            }
        }

        async function saveAdToSupabase(title, url, userId) {
            const { error } = await _supabase
                .from('ads')
                .insert([{ title, url, user_id: userId }]);

            if (error) throw error;
        }

        function showSuccessAlert(title, msg) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('customAlert').style.display = 'none';
            window.location.href = "home.html"; // العودة للهوم لرؤية الإعلان
        }

        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) window.location.href = "login.html";
        };
    </script>
</body>
</html>
