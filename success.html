<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | The BlackFlower</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-card {
            padding: 60px 40px;
            border: 1px solid #fff;
            max-width: 400px;
        }
        .icon-box {
            width: 60px; height: 60px; border: 1px solid #fff;
            display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 30px;
        }
        .icon-box svg { fill: #fff; width: 30px; }
        
        h1 { margin-bottom: 15px; font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        p { color: #a0a0a0; margin-bottom: 40px; font-size: 14px; letter-spacing: 1px; }

        .btn-home {
            border: 1px solid #fff;
            color: #000; background-color: #fff; text-decoration: none; 
            padding: 15px 40px; font-weight: bold; display: inline-block;
            transition: 0.3s; margin-bottom: 25px; text-transform: uppercase; font-size: 12px;
        }
        .btn-home:hover { background-color: #000; color: #fff; }

        .timer-text { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        #seconds { color: #fff; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h1>Success</h1>
        <p>Registration complete. Check your inbox to verify your access.</p>
        
        <a href="index.html" class="btn-home">Back to Home</a>
        
        <div class="timer-text">
            Redirecting in <span id="seconds">10</span>
        </div>
    </div>

    <script>
        let count = 10;
        const display = document.getElementById('seconds');
        const timer = setInterval(() => {
            count--;
            display.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";
            }
        }, 1000);
    </script>
</body>
</html>
