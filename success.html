
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-card {
            background-color: #161b22;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 450px;
        }
        .icon { font-size: 60px; color: #f7931a; margin-bottom: 20px; }
        h1 { margin-bottom: 15px; color: #fff; }
        p { color: #8b949e; line-height: 1.6; margin-bottom: 25px; }
        .timer-box {
            font-size: 14px;
            color: #f7931a;
            font-weight: bold;
            background: rgba(247, 147, 26, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">✔️</div>
        <h1>Registration Successful!</h1>
        <p>
            Welcome to <b>The BlackFlower</b> elite community.<br>
            A confirmation link has been sent to your email address (if registered via form).
        </p>
        
        <div class="timer-box">
            Redirecting to home page in <span id="countdown">10</span> seconds...
        </div>
    </div>

    <script>
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = "index.html"; // Redirect to your home/login page
            }
        }, 1000);
    </script>
</body>
</html>
