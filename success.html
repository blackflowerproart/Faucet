<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | The BlackFlower</title>
    <style>
        :root {
            --brand-orange: #f7931a;
            --dark-bg: #0d1117;
            --card-bg: #161b22;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-card {
            background-color: var(--card-bg);
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            max-width: 400px;
            border: 1px solid #30363d;
        }
        .icon-box {
            width: 80px; height: 80px; background: rgba(247, 147, 26, 0.1);
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 25px;
            border: 2px solid var(--brand-orange);
        }
        .icon-box svg { fill: var(--brand-orange); width: 40px; }
        
        h1 { color: white; margin-bottom: 10px; font-size: 28px; }
        p { color: #8b949e; margin-bottom: 30px; line-height: 1.5; }

        .btn-home {
            background-color: var(--brand-orange);
            color: black; text-decoration: none; padding: 12px 30px;
            border-radius: 6px; font-weight: bold; display: inline-block;
            transition: 0.3s; margin-bottom: 20px;
        }
        .btn-home:hover { background-color: #e58510; transform: scale(1.05); }

        .timer-text { font-size: 13px; color: #484f58; }
        #seconds { color: var(--brand-orange); font-weight: bold; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h1>Registration Sent!</h1>
        <p>Your account has been created successfully. If you used email, please verify your inbox to continue.</p>
        
        <a href="index.html" class="btn-home">Back to Home Now</a>
        
        <div class="timer-text">
            Auto-redirecting in <span id="seconds">10</span> seconds
        </div>
    </div>

    <script>
        let count = 10;
        const display = document.getElementById('seconds');
        const timer = setInterval(() => {
            count--;
            display.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";
            }
        }, 1000);
    </script>
</body>
</html>
