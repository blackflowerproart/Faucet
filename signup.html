<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackFlower | إنشاء حساب</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h2 { text-align: center; margin-bottom: 20px; color: #f8fafc; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 5px rgba(99, 102, 241, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #4f46e5; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>إنشاء حساب جديد</h2>
        <form id="registrationForm">
            <input type="text" id="fullName" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required minlength="6">
            <button type="submit" id="submitBtn">إنشاء الحساب</button>
        </form>
        <div id="message"></div>
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>

    <script>
        // إعدادات Supabase الخاصة بك
        // ملاحظة: تأكد من استبدال رابط URL برابط مشروعك الحقيقي من إعدادات Supabase
        const SUPABASE_URL = 'https://zhvpvpvgpvgpvgpvgpvg.supabase.co'; // ضع رابط المشروع هنا
        const SUPABASE_KEY = 'sb_publishable_ptJBXjhSB4KgV0O0bb5Urw_cg28I7Tl';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('registrationForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            messageDiv.innerText = "جاري معالجة الطلب...";
            messageDiv.style.color = "#94a3b8";

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // تنفيذ عملية التسجيل في Supabase Auth
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                if (error) throw error;

                // إذا نجح التسجيل
                messageDiv.innerText = "تم التسجيل بنجاح! جاري الانتقال...";
                messageDiv.style.color = "#10b981";

                // توجيه المستخدم لصفحة واجهة المستخدم بعد 2 ثانية
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 2000);

            } catch (error) {
                // في حال حدوث خطأ
                messageDiv.innerText = "فشل التسجيل: " + (error.message || "تأكد من البيانات");
                messageDiv.style.color = "#ef4444";
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
