<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهدة الإعلان - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* الهيدر العلوي */
        .header-bar { 
            background: #111; 
            padding: 10px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #28a745;
            height: 80px;
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-section img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .logo-section h2 { margin: 0; font-size: 1.4rem; color: #fff; }

        .timer-container { display: flex; align-items: center; gap: 20px; }
        
        #countdown { 
            font-size: 2.8rem; 
            font-weight: bold; 
            color: #28a745; 
            background: #000;
            padding: 5px 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        #confirm-btn { 
            background: #28a745; 
            color: #fff; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; /* مخفي حتى ينتهي الوقت */
            font-size: 1.2rem; 
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.4);
            transition: 0.3s;
        }
        #confirm-btn:hover { background: #218838; transform: scale(1.05); }

        /* منطقة الإعلان العريضة */
        .ad-viewport { flex-grow: 1; width: 100%; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-section">
            <img src="wight.jpg" alt="Logo">
            <h2>The Black Flower</h2>
        </div>
        
        <div class="timer-container">
            <div id="countdown">--</div>
            <button id="confirm-btn" onclick="claimReward()">✅ تأكيد واستلام المكافأة</button>
        </div>
    </div>

    <div class="ad-viewport">
        <iframe id="ad-iframe" src="about:blank"></iframe>
    </div>

    <script>
        // إعدادات Supabase
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // جلب البيانات من الرابط (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const adUrl = urlParams.get('url');
        const seconds = parseInt(urlParams.get('sec')) || 10;
        const rewardAmount = parseInt(urlParams.get('rew')) || 0;

        let timeLeft = seconds;
        const countdownEl = document.getElementById('countdown');
        const confirmBtn = document.getElementById('confirm-btn');

        window.onload = async () => {
            // التأكد من تسجيل الدخول
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("يرجى تسجيل الدخول أولاً");
                window.location.href = 'login.html';
                return;
            }

            // تشغيل الإعلان
            if (adUrl) {
                document.getElementById('ad-iframe').src = adUrl;
            }

            // بدء العداد التنازلي
            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    countdownEl.style.display = 'none'; // إخفاء العداد
                    confirmBtn.style.display = 'block'; // إظهار زر التوكيد
                }
            }, 1000);
        };

        // الدالة التي تنفذ عند الضغط على زر "تأكيد"
        async function claimReward() {
            confirmBtn.innerText = "جاري الحفظ...";
            confirmBtn.disabled = true;

            const { data: { user } } = await _supabase.auth.getUser();

            // استدعاء دالة زيادة الرصيد في قاعدة البيانات
            const { error } = await _supabase.rpc('increment_balance', { 
                user_id: user.id, 
                amount: rewardAmount 
            });

            if (!error) {
                alert(`أحسنت! تم إضافة ${rewardAmount} BFP إلى حسابك.`);
                window.location.href = 'home.html'; // العودة للرئيسية لرؤية الرصيد الجديد
            } else {
                alert("حدث خطأ أثناء إضافة المكافأة: " + error.message);
                confirmBtn.innerText = "✅ تأكيد واستلام المكافأة";
                confirmBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
