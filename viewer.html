<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        :root { --bg: #000; --accent: #fff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        #topHeader { 
            height: 80px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; color: #fff; z-index: 1000; position: relative; 
        }

        .brand-section { display: flex; align-items: center; gap: 12px; }
        .logo-mini { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #333; }
        .brand-name { font-family: 'Times New Roman', serif; letter-spacing: 2px; text-transform: uppercase; font-size: 13px; }

        .timer-display { font-size: 14px; font-weight: bold; color: #fff; background: #111; padding: 8px 15px; border: 1px solid #333; min-width: 140px; text-align: center; }

        .viewport { width: 100%; height: calc(100% - 80px); }
        #targetFrame { width: 100%; height: 100%; border: none; background: #fff; }

        #captchaOverlay, #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-box { background: #000; padding: 35px; border: 1px solid #333; text-align: center; color: #fff; width: 320px; }
        
        .btn-main { 
            background: #111; color: #444; border: 1px solid #222; padding: 14px; 
            font-weight: bold; text-transform: uppercase; margin-top: 20px; 
            cursor: not-allowed; width: 100%; letter-spacing: 2px;
        }
        .btn-main.enabled { background: #fff; color: #000; border: 1px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="brand-section">
            <img src="wight.jpg" alt="Logo" class="logo-mini">
            <span class="brand-name">The Black Flower</span>
        </div>
        <div id="timerBox" class="timer-display">Initializing...</div>
    </div>

    <div class="viewport">
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <div id="captchaOverlay">
        <div class="modal-box">
            <p style="font-size: 10px; color: #888; letter-spacing: 2px; margin-bottom:20px;">VERIFY HUMANITY</p>
            <div id="mt-container" class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaVerified"></div>
            <button id="confirmBtn" class="btn-main" disabled onclick="handleShowSuccess()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="modal-box">
            <h2 style="letter-spacing: 4px;">COMPLETED</h2>
            <p id="rewardTxt" style="color: #888; font-size: 12px; margin-bottom:25px;"></p>
            <button id="finalBtn" class="btn-main enabled" onclick="finalizeAll()">CONTINUE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const adData = JSON.parse(localStorage.getItem('active_ad'));
        if (!adData) window.location.href = 'home.html';

        // --- التعديل الأهم لاحتساب الزيارة ---
        // فتح رابط Rotate4All في نافذة جديدة لضمان احتساب الزيارة كزيارة حقيقية
        const ptpUrl = "https://www.rotate4all.com/promote/pmq0c6xfa7wk";
        window.open(ptpUrl, '_blank', 'width=800,height=600');

        document.getElementById('targetFrame').src = adData.url;
        let timeLeft = parseInt(adData.seconds);

        const countdown = setInterval(() => {
            if (timeLeft > 0) {
                document.getElementById('timerBox').innerText = `${timeLeft}s REMAINING`;
                timeLeft--;
            } else {
                clearInterval(countdown);
                document.getElementById('timerBox').innerText = "DONE";
                document.getElementById('captchaOverlay').style.display = 'flex';
                
                const check = setInterval(() => {
                    if (window.mtcaptcha && mtcaptcha.getVerifiedToken()) {
                        const btn = document.getElementById('confirmBtn');
                        btn.disabled = false;
                        btn.classList.add('enabled');
                        clearInterval(check);
                    }
                }, 500);
            }
        }, 1000);

        function handleShowSuccess() {
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('rewardTxt').innerText = `Reward: ${adData.reward} BFP`;
            document.getElementById('successModal').style.display = 'flex';
        }

        async function finalizeAll() {
            const btn = document.getElementById('finalBtn');
            btn.innerText = "SYNCHRONIZING...";
            btn.disabled = true;

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    const userId = session.user.id;
                    const { data: profile } = await _supabase.from('blackflowerproart').select('balance').eq('user_id', userId).single();
                    await _supabase.from('blackflowerproart').update({ balance: (profile?.balance || 0) + adData.reward }).eq('user_id', userId);

                    await _supabase.from('ad_views').insert([{ 
                        user_id: userId, 
                        ad_id: adData.id,
                        viewed_at: new Date().toISOString() 
                    }]);
                }
            } catch (e) { console.error(e); }

            localStorage.removeItem('active_ad');
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
