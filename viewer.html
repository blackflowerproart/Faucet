<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        /* شريط التحكم العلوي */
        #topHeader { 
            height: 85px; 
            background: #000; 
            border-bottom: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 30px; 
            color: #fff; 
            z-index: 1000; 
            position: relative; 
            box-sizing: border-box;
        }

        .brand-logo { font-family: serif; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; font-size: 18px; }
        .timer-display { font-size: 15px; font-weight: bold; color: #fff; background: #111; padding: 10px 25px; border: 1px solid #333; border-radius: 2px; }

        /* طبقة الكابتشا المظلمة */
        #captchaOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }

        .captcha-box { background: #000; padding: 40px; border: 1px solid #333; text-align: center; min-width: 320px; }

        #confirmBtn {
            margin-top: 25px; width: 100%; padding: 15px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; border: 1px solid #222;
            cursor: not-allowed; background: #111; color: #444; transition: 0.3s;
        }

        .ready-to-confirm { background: #fff !important; color: #000 !important; border: 1px solid #fff !important; cursor: pointer !important; }

        /* نافذة النجاح */
        #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .success-box { background: #000; border: 1px solid #fff; padding: 40px; text-align: center; max-width: 400px; }
        .success-icon { font-size: 40px; color: #fff; margin-bottom: 20px; }
        .success-title { color: #fff; font-size: 18px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
        .success-text { color: #bbb; line-height: 1.6; margin-bottom: 25px; font-size: 14px; }
        
        .continue-btn { background: #fff; color: #000; border: none; padding: 12px 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* حاوية الإعلان المستهدف */
        .ad-container { width: 100%; height: calc(100% - 85px); position: relative; }
        #targetFrame { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div id="timerBox" class="timer-display">Loading...</div>
    </div>

    <div id="captchaOverlay">
        <div class="captcha-box">
            <div style="color:#fff; margin-bottom:20px; font-size:11px; letter-spacing:2px; opacity:0.6;">VERIFICATION REQUIRED</div>
            <div class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaSuccess"></div>
            <button id="confirmBtn" disabled onclick="showSuccessMessage()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="success-box">
            <div class="success-icon">✧</div>
            <div class="success-title">Verified</div>
            <p id="rewardInfo" class="success-text">Tokens have been added to your balance.</p>
            <button class="continue-btn" onclick="processFinalReward()">CONTINUE</button>
        </div>
    </div>

    <div class="ad-container">
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        // إعدادات Supabase
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // جلب بيانات الإعلان النشط من الذاكرة
        const adData = JSON.parse(localStorage.getItem('active_ad'));

        if (!adData) {
            alert("Session expired or invalid ad.");
            window.location.href = 'home.html';
        }

        // تشغيل الإعلان
        document.getElementById('targetFrame').src = adData.url;
        let timeLeft = adData.seconds;

        // دالة نجاح الكابتشا
        window.onCaptchaSuccess = function() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = false;
            btn.classList.add('ready-to-confirm');
        };

        // العداد الزمني
        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('captchaOverlay').style.display = 'flex';
                // فحص دوري في حال نجاح الكابتشا تلقائياً
                const checkStatus = setInterval(() => {
                    if (window.mtcaptcha && window.mtcaptcha.getVerifiedToken()) {
                        window.onCaptchaSuccess();
                        clearInterval(checkStatus);
                    }
                }, 1000);
            }
        }, 1000);

        function showSuccessMessage() {
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('rewardInfo').innerText = `Congratulations! ${adData.reward} BFP Tokens have been successfully credited to your balance.`;
            document.getElementById('successModal').style.display = 'flex';
        }

        // الدالة الأهم: تحديث الرصيد في Supabase والعودة
        async function processFinalReward() {
            const btn = document.querySelector('.continue-btn');
            btn.innerText = "SAVING...";
            btn.disabled = true;

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                
                if (session) {
                    // جلب الرصيد الحالي أولاً
                    const { data: profile } = await _supabase
                        .from('blackflowerproart')
                        .select('balance')
                        .eq('user_id', session.user.id)
                        .single();

                    if (profile) {
                        const updatedBalance = profile.balance + adData.reward;
                        
                        // تحديث الرصيد في السحابة
                        await _supabase
                            .from('blackflowerproart')
                            .update({ balance: updatedBalance })
                            .eq('user_id', session.user.id);
                        
                        console.log("Balance updated successfully!");
                    }
                }
            } catch (err) {
                console.error("Critical Error updating balance:", err);
            } finally {
                // العودة لصفحة هوم في كل الأحوال
                localStorage.removeItem('active_ad'); // مسح بيانات الإعلان المنتهي
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
