<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Verified Profit System</title>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* شريط التحكم */
        #topHeader { height: 70px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; color: #fff; z-index: 1000; position: relative; }
        .brand-logo { font-family: serif; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; font-size: 16px; }
        .timer-display { font-size: 16px; font-weight: bold; color: #fff; background: #111; padding: 8px 20px; border: 1px solid #333; border-radius: 2px; }

        /* طبقة الكابتشا */
        #captchaOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }

        .captcha-box {
            background: #000; padding: 40px; border: 1px solid #333; border-radius: 2px;
            text-align: center; min-width: 350px;
        }

        #confirmBtn {
            margin-top: 25px; width: 100%; padding: 15px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; border: 1px solid #222;
            cursor: not-allowed; background: #111; color: #444; transition: 0.3s;
        }

        .ready-to-confirm {
            background: #fff !important; color: #000 !important;
            border: 1px solid #fff !important; cursor: pointer !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.3) !important;
        }

        /* نافذة النجاح المخصصة الأنيقة */
        #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .success-box {
            background: #000; border: 1px solid #fff; padding: 40px; text-align: center;
            max-width: 450px; border-radius: 4px; position: relative;
            animation: fadeInScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-icon { font-size: 50px; color: #fff; margin-bottom: 20px; }
        .success-title { color: #fff; font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .success-text { color: #888; line-height: 1.6; margin-bottom: 25px; font-size: 14px; }
        
        .close-success-btn {
            background: #fff; color: #000; border: none; padding: 12px 30px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .close-success-btn:hover { background: #ccc; }

        /* حاوية الإطارات */
        .ad-container { width: 100%; height: calc(100% - 70px); position: relative; }
        #ptcFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #targetFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 2; background: #fff; }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div id="timerBox" class="timer-display">Wait 20s</div>
    </div>

    <div id="captchaOverlay">
        <div class="captcha-box">
            <div style="color:#fff; margin-bottom:20px; font-size:12px; letter-spacing:2px;">IDENTITY VERIFICATION</div>
            <div class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaSuccess"></div>
            <button id="confirmBtn" disabled onclick="showSuccessMessage()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="success-box">
            <div class="success-icon">✧</div>
            <div class="success-title">Payment Verified</div>
            <p class="success-text">
                Congratulations! 15 BFP Tokens have been successfully credited to your account. 
                Enjoy exploring the curated content below.
            </p>
            <button class="close-success-btn" onclick="finalizeAllAndClose()">Enjoy the Site</button>
        </div>
    </div>

    <div id="mainContainer" class="ad-container">
        <iframe id="ptcFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        window.onCaptchaSuccess = function(token) {
            var btn = document.getElementById('confirmBtn');
            if (btn) {
                btn.disabled = false;
                btn.classList.add('ready-to-confirm');
            }
        };

        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const targetUrl = decodeURIComponent(params.get('url'));
        if (targetUrl && targetUrl !== 'null') { document.getElementById('targetFrame').src = targetUrl; }

        let timeLeft = 20;
        const countdown = setInterval(() => {
            timeLeft--;
            if(document.getElementById('timerBox')) document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('captchaOverlay').style.display = 'flex';
                // فحص احتياطي
                var manualCheck = setInterval(function() {
                    if (window.mtcaptcha && window.mtcaptcha.getVerifiedToken()) {
                        window.onCaptchaSuccess();
                        clearInterval(manualCheck);
                    }
                }, 1000);
            }
        }, 1000);

        // وظيفة تظهر رسالة النجاح الأنيقة
        function showSuccessMessage() {
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('successModal').style.display = 'flex';
        }

        // الوظيفة النهائية التي تحتسب الربح وتفتح الموقع بالكامل
        function finalizeAllAndClose() {
            // احتساب الربح
            let bfpBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
            bfpBalance += 15;
            localStorage.setItem('bfp_balance', bfpBalance.toFixed(2));

            let history = JSON.parse(localStorage.getItem('added_ads_history')) || {};
            history[adId] = Date.now();
            localStorage.setItem('added_ads_history', JSON.stringify(history));

            // التنفيذ البصري النهائي
            document.getElementById('successModal').style.display = 'none';
            document.getElementById('targetFrame').style.display = 'none';
            document.getElementById('topHeader').style.display = 'none';
            document.getElementById('mainContainer').style.height = '100vh';
        }
    </script>
</body>
</html>
