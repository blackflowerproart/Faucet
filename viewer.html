<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Ad Viewer</title>
    <style>
        /* Black & White Premium Theme */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; 
        }

        /* Header Bar */
        .header-bar {
            height: 70px;
            background: #000;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            color: #fff;
            position: relative;
            z-index: 1000;
        }

        .brand-name {
            font-family: serif;
            letter-spacing: 2px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #countdown {
            width: 40px;
            height: 40px;
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-claim {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* مخفي حتى ينتهي الوقت */
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-claim:hover {
            background-color: #ccc;
        }

        /* Ad Content Area */
        .ad-container {
            width: 100%;
            height: calc(100% - 70px);
            background: #fff;
            position: relative;
        }

        iframe#mainAdFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Invisible Profit Section (Rotate4All) */
        .hidden-profit {
            width: 1px;
            height: 1px;
            overflow: hidden;
            position: absolute;
            left: -9999px;
        }
    </style>
</head>
<body>

    <!-- Hidden Rotate4All Frame for Auto-Earning -->
    <div class="hidden-profit">
        <iframe src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
    </div>

    <div class="header-bar">
        <div class="brand-name">THE BLACK FLOWER</div>
        
        <div class="timer-container">
            <div id="countdown">20</div>
            <button id="claimBtn" class="btn-claim" onclick="processReward()">Claim 15 BFP</button>
        </div>
    </div>

    <div class="ad-container">
        <!-- الإعلان الأساسي الذي يشاهده المستخدم -->
        <iframe id="mainAdFrame" src="about:blank"></iframe>
    </div>

    <script>
        // الإعدادات
        const REWARD_AMOUNT = 15;
        const urlParams = new URLSearchParams(window.location.search);
        const adId = urlParams.get('id');
        const targetUrl = decodeURIComponent(urlParams.get('url'));

        // تحميل رابط الإعلان في الإطار الرئيسي
        if (targetUrl && targetUrl !== 'null') {
            document.getElementById('mainAdFrame').src = targetUrl;
        }

        // منطق العداد التنازلي
        let timeLeft = 20;
        const countdownEl = document.getElementById('countdown');
        const claimBtnEl = document.getElementById('claimBtn');

        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                countdownEl.style.display = 'none';
                claimBtnEl.style.display = 'block';
            }
        }, 1000);

        // وظيفة إضافة الرصيد
        function processReward() {
            try {
                // جلب الرصيد الحالي
                let bfpBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
                
                // إضافة المكافأة (15 BFP)
                bfpBalance += REWARD_AMOUNT;
                
                // حفظ الرصيد الجديد
                localStorage.setItem('bfp_balance', bfpBalance.toFixed(2));

                // تسجيل أن المستخدم شاهد هذا الإعلان
                let history = JSON.parse(localStorage.getItem('watchHistory')) || {};
                history[adId] = Date.now();
                localStorage.setItem('watchHistory', JSON.stringify(history));

                alert(`Great job! ${REWARD_AMOUNT} BFP added to your balance.`);
                window.location.href = 'home.html';
            } catch (error) {
                console.error("Error updating balance:", error);
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
