<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Secure Ad Viewer</title>
    <style>
        /* Black & White Premium Theme */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; 
        }

        /* Header Bar */
        .header-bar {
            height: 80px;
            background: #000;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            color: #fff;
            z-index: 1000;
            position: relative;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: serif;
            letter-spacing: 3px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .brand-tag {
            font-size: 9px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Controls */
        .viewer-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .timer-display {
            width: 45px;
            height: 45px;
            border: 1px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-claim {
            background-color: #fff;
            color: #000;
            border: 1px solid #fff;
            padding: 12px 25px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-claim:hover {
            background-color: #000;
            color: #fff;
        }

        /* Ad Container */
        .ad-content {
            width: 100%;
            height: calc(100% - 80px);
            background: #fff;
            position: relative;
        }

        iframe#adFrame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            z-index: 2;
        }

        /* Hidden Rotate4All Frame */
        iframe#profitFrame {
            width: 1px;
            height: 1px;
            position: absolute;
            opacity: 0.01;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="brand">
            <div class="brand-name">THE BLACK FLOWER</div>
            <div class="brand-tag">Premium Ad Visualization</div>
        </div>
        
        <div class="viewer-controls">
            <div id="countdown" class="timer-display">20</div>
            <button id="claimBtn" class="btn-claim" onclick="processReward()">Claim 15 BFP Reward</button>
        </div>
    </div>

    <div class="ad-content">
        <iframe id="profitFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        
        <iframe id="adFrame" src="about:blank"></iframe>
    </div>

    <script>
        // Data Configuration
        const BFP_REWARD = 15;
        const USD_REWARD = 0.00005;

        // URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const adId = urlParams.get('id');
        const targetUrl = decodeURIComponent(urlParams.get('url'));

        // Start Loading Ad
        if (targetUrl && targetUrl !== 'null') {
            document.getElementById('adFrame').src = targetUrl;
        }

        // Countdown Logic
        let timer = 20;
        const countdownEl = document.getElementById('countdown');
        const claimBtnEl = document.getElementById('claimBtn');

        const timerInterval = setInterval(() => {
            timer--;
            countdownEl.innerText = timer;

            if (timer <= 0) {
                clearInterval(timerInterval);
                countdownEl.style.display = 'none';
                claimBtnEl.style.display = 'block';
            }
        }, 1000);

        // Reward Processing
        function processReward() {
            try {
                // 1. Update BFP Balance
                let bfpBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
                bfpBalance += BFP_REWARD;
                localStorage.setItem('bfp_balance', bfpBalance.toFixed(2));

                // 2. Update USD Balance (Optional reference)
                let usdBalance = parseFloat(localStorage.getItem('user_balance')) || 0;
                usdBalance += USD_REWARD;
                localStorage.setItem('user_balance', usdBalance.toFixed(6));

                // 3. Mark ad as viewed for the day
                let history = JSON.parse(localStorage.getItem('watchHistory_v2')) || {};
                history[adId] = Date.now();
                localStorage.setItem('watchHistory_v2', JSON.stringify(history));

                alert(`Congratulations!\nYou earned ${BFP_REWARD} BFP tokens.`);
                window.location.href = 'home.html';
            } catch (e) {
                console.error("Error processing reward:", e);
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
