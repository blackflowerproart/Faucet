<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Verified Profit System</title>
    <!-- استدعاء مكتبة MTCaptcha -->
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" async defer></script>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; font-family: 'Inter', sans-serif; 
        }

        /* شريط التحكم العلوي */
        .header-bar { 
            height: 75px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; color: #fff; z-index: 1000; position: relative; 
        }

        .brand-logo {
            font-family: serif; letter-spacing: 3px; font-weight: bold;
            text-transform: uppercase; font-size: 18px;
        }

        .timer-display { 
            font-size: 18px; font-weight: bold; color: #fff; 
            background: #111; padding: 10px 25px; 
            border: 1px solid #333; border-radius: 2px;
        }

        /* زر المطالبة بالمكافأة في الهيدر */
        #confirmBtn { 
            background: #fff; color: #000; border: none; 
            padding: 12px 30px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; border-radius: 2px; 
            display: none; transition: 0.3s;
        }
        #confirmBtn:hover { background: #ccc; }

        /* طبقة الكابتشا */
        #captchaOverlay {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .captcha-box {
            background: #000;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 4px;
            text-align: center;
            max-width: 400px;
        }

        .captcha-title {
            color: #fff; margin-bottom: 20px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* زر الإنهاء داخل صندوق الكابتشا */
        #doneCaptchaBtn {
            margin-top: 20px;
            background: #2ecc71; /* لون أخضر للنجاح */
            color: #fff; border: none;
            padding: 10px 25px; font-weight: bold;
            cursor: pointer; display: none; /* يظهر بعد الحل فقط */
            text-transform: uppercase; width: 100%;
        }

        .ad-container { width: 100%; height: calc(100% - 75px); position: relative; background: #fff; }
        #ptcFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #targetFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 2; opacity: 0.96; background: #fff; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="timerBox" class="timer-display">Wait 20s</div>
            <button id="confirmBtn" onclick="finalizeAll()">Claim 15 BFP Reward</button>
        </div>
    </div>

    <div id="captchaOverlay">
        <div class="captcha-box">
            <div class="captcha-title">Human Verification</div>
            
            <div class="mtcaptcha" 
                 data-sitekey="MTPublic-e0hUm0HwS" 
                 data-theme="basic" 
                 data-callback="onCaptchaSuccess"></div>

            <button id="doneCaptchaBtn" onclick="closeCaptcha()">Confirm & Finish</button>
        </div>
    </div>

    <div class="ad-container">
        <iframe id="ptcFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

 <script>
        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const targetUrl = decodeURIComponent(params.get('url'));

        if (targetUrl && targetUrl !== 'null') {
            document.getElementById('targetFrame').src = targetUrl;
        }

        let timeLeft = 20;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timerBox').innerText = "Complete Captcha";
                // إظهار الأوفرلاي
                var overlay = document.getElementById('captchaOverlay');
                overlay.style.display = 'flex';
                // محاولة فرض إعادة تحميل الكابتشا لضمان ظهورها
                if (typeof mtcaptcha !== 'undefined') { mtcaptcha.render(); }
            }
        }, 1000);

        // --- التعديل الجذري هنا ---
        // هذه الدالة ستعمل تلقائياً وبشكل فوري عند النجاح
        function onCaptchaSuccess(validatedToken) {
            console.log("Captcha solved successfully!");
            
            // 1. إغلاق نافذة الكابتشا السوداء فوراً
            document.getElementById('captchaOverlay').style.display = 'none';
            
            // 2. إخفاء العداد العلوي
            document.getElementById('timerBox').style.display = 'none';
            
            // 3. إظهار زر المكافأة النهائي في الهيدر
            document.getElementById('confirmBtn').style.display = 'block';
        }

        function finalizeAll() {
            try {
                let bfpBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
                bfpBalance += 15;
                localStorage.setItem('bfp_balance', bfpBalance.toFixed(2));

                let history = JSON.parse(localStorage.getItem('added_ads_history')) || {};
                history[adId] = Date.now();
                localStorage.setItem('added_ads_history', JSON.stringify(history));

                alert("Success! 15 BFP tokens added.");
                window.location.href = 'home.html';
            } catch (e) {
                console.error("Error finalizing reward:", e);
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
