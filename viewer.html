<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة الإعلان - The Blackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-green: #28a745;
            --dark-bg: #000000;
            --header-bg: #111111;
        }

        body { 
            background: var(--dark-bg); 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* شريط التحكم العلوي (الهيدر) */
        .viewer-header { 
            background: var(--header-bg); 
            padding: 0 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--primary-green);
            height: 90px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .site-logo { display: flex; align-items: center; gap: 15px; }
        .site-logo img { width: 55px; height: 55px; border-radius: 8px; border: 1px solid #333; }
        .site-logo h2 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; color: #fff; }

        .control-panel { display: flex; align-items: center; gap: 25px; }
        
        /* تصميم العداد */
        #timer-display { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--primary-green); 
            background: #000;
            padding: 5px 25px;
            border-radius: 12px;
            border: 2px solid #222;
            min-width: 80px;
            text-align: center;
        }
        
        /* زر التأكيد */
        #confirm-btn { 
            background: var(--primary-green); 
            color: #fff; 
            border: none; 
            padding: 15px 45px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; /* يظهر بعد انتهاء الوقت */
            font-size: 1.2rem; 
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.4);
            transition: transform 0.2s, background 0.2s;
        }
        #confirm-btn:hover { background: #218838; transform: scale(1.03); }
        #confirm-btn:disabled { background: #555; cursor: not-allowed; }

        /* حاوية الإعلان (الإطار العريض) */
        .ad-container { 
            flex-grow: 1; 
            width: 100%; 
            background: #fff; 
            position: relative;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: #fff;
        }
    </style>
</head>
<body>

    <header class="viewer-header">
        <div class="site-logo">
            <!-- تأكد من وجود ملف الصورة wight.jpg في مجلد المشروع -->
            <img src="wight.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/55?text=BFP'">
            <h2>The Blackflower Pro Art</h2>
        </div>
        
        <div class="control-panel">
            <div id="timer-display">--</div>
            <button id="confirm-btn" onclick="claimReward()">✅ تأكيد المكافأة الآن</button>
        </div>
    </header>

    <main class="ad-container">
        <iframe id="ad-frame" src="about:blank"></iframe>
    </main>

    <script>
        // إعدادات Supabase
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // استخراج البيانات من الرابط (URL Parameters)
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url');
        const duration = parseInt(params.get('sec')) || 15;
        const reward = parseFloat(params.get('rew')) || 0;

        const timerEl = document.getElementById('timer-display');
        const btnEl = document.getElementById('confirm-btn');
        const frameEl = document.getElementById('ad-frame');

        let secondsLeft = duration;

        window.onload = async () => {
            // 1. التحقق من هوية المستخدم
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("يجب تسجيل الدخول أولاً!");
                window.location.href = 'login.html';
                return;
            }

            // 2. تحميل موقع الإعلان داخل الإطار
            if (targetUrl) {
                frameEl.src = targetUrl;
            } else {
                alert("رابط الإعلان غير صالح");
            }

            // 3. تشغيل العداد التنازلي
            const countdown = setInterval(() => {
                secondsLeft--;
                timerEl.innerText = secondsLeft;

                if (secondsLeft <= 0) {
                    clearInterval(countdown);
                    timerEl.style.display = 'none'; // إخفاء العداد
                    btnEl.style.display = 'block'; // إظهار زر التأكيد
                }
            }, 1000);
        };

        // دالة إضافة المكافأة
        async function claimReward() {
            btnEl.disabled = true;
            btnEl.innerText = "جاري المعالجة...";

            try {
                const { data: { user } } = await _supabase.auth.getUser();

                // استدعاء دالة الـ SQL بالترتيب الصحيح للمدخلات
                const { error } = await _supabase.rpc('increment_balance', { 
                    user_id: user.id, 
                    amount: reward 
                });

                if (error) throw error;

                alert(`تم بنجاح! حصلت على ${reward} BFP`);
                window.location.href = 'home.html'; // العودة للرئيسية لتحديث الرصيد

            } catch (err) {
                console.error("Error claiming reward:", err);
                alert("حدث خطأ: " + err.message);
                btnEl.disabled = false;
                btnEl.innerText = "✅ تأكيد المكافأة الآن";
            }
        }
    </script>
</body>
</html>
