<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Verified Profit System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        #topHeader { 
            height: 85px; 
            background: #000; 
            border-bottom: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 30px; 
            color: #fff; 
            z-index: 1000; 
            position: relative; 
        }

        .logo-container { display: flex; flex-direction: column; line-height: 1.2; }
        .brand-logo { font-family: serif; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; font-size: 18px; }
        .sub-logo { font-size: 9px; letter-spacing: 5.5px; text-transform: uppercase; color: #666; margin-top: 2px; }

        .timer-display { font-size: 15px; font-weight: bold; color: #fff; background: #111; padding: 10px 25px; border: 1px solid #333; border-radius: 2px; }

        #captchaOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }

        .captcha-box { background: #000; padding: 40px; border: 1px solid #333; border-radius: 2px; text-align: center; min-width: 350px; }

        #confirmBtn {
            margin-top: 25px; width: 100%; padding: 15px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; border: 1px solid #222;
            cursor: not-allowed; background: #111; color: #444; transition: 0.3s;
        }

        .ready-to-confirm { background: #fff !important; color: #000 !important; border: 1px solid #fff !important; cursor: pointer !important; box-shadow: 0 0 20px rgba(255,255,255,0.3) !important; }

        #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .success-box { background: #000; border: 1px solid #fff; padding: 40px; text-align: center; max-width: 450px; border-radius: 2px; }
        .success-icon { font-size: 40px; color: #fff; margin-bottom: 20px; }
        .success-title { color: #fff; font-size: 18px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
        .success-text { color: #bbb; line-height: 1.6; margin-bottom: 25px; font-size: 14px; }
        .continue-btn { background: #fff; color: #000; border: none; padding: 12px 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        .ad-container { width: 100%; height: calc(100% - 85px); position: relative; }
        #targetFrame { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="logo-container">
            <div class="brand-logo">THE BLACK FLOWER</div>
            <div class="sub-logo">PROFESSIONAL ART</div>
        </div>
        <div id="timerBox" class="timer-display">Initializing...</div>
    </div>

    <div id="captchaOverlay">
        <div class="captcha-box">
            <div style="color:#fff; margin-bottom:20px; font-size:11px; letter-spacing:2px; opacity:0.6;">VERIFICATION REQUIRED</div>
            <div class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaSuccess"></div>
            <button id="confirmBtn" disabled onclick="showSuccessMessage()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="success-box">
            <div class="success-icon">✧</div>
            <div class="success-title">Verified</div>
            <p id="rewardText" class="success-text">Loading reward details...</p>
            <button class="continue-btn" onclick="finalizeAndRedirect()">CONTINUE</button>
        </div>
    </div>

    <div class="ad-container">
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        // إعداد Supabase
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // جلب بيانات الإعلان من localStorage
        const activeAd = JSON.parse(localStorage.getItem('active_ad'));

        if (!activeAd) {
            alert("No active ad found. Returning to home.");
            window.location.href = 'home.html';
        }

        // إعداد الإطار والعداد
        document.getElementById('targetFrame').src = activeAd.url;
        let timeLeft = activeAd.seconds;
        document.getElementById('timerBox').innerText = `Wait ${timeLeft}s`;

        window.onCaptchaSuccess = function(token) {
            var btn = document.getElementById('confirmBtn');
            btn.disabled = false;
            btn.classList.add('ready-to-confirm');
        };

        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('captchaOverlay').style.display = 'flex';
                // فحص يدوي للكابتشا احتياطاً
                var manualCheck = setInterval(function() {
                    if (window.mtcaptcha && window.mtcaptcha.getVerifiedToken()) {
                        window.onCaptchaSuccess();
                        clearInterval(manualCheck);
                    }
                }, 1000);
            }
        }, 1000);

        function showSuccessMessage() {
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('rewardText').innerText = `Congratulations! ${activeAd.reward} BFP Tokens have been successfully credited to your account balance.`;
            document.getElementById('successModal').style.display = 'flex';
        }

        async function finalizeAndRedirect() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    // جلب الرصيد الحالي
                    const { data: profile } = await _supabase
                        .from('blackflowerproart')
                        .select('balance')
                        .eq('user_id', session.user.id)
                        .single();

                    // تحديث الرصيد في قاعدة البيانات
                    const newBalance = profile.balance + activeAd.reward;
                    await _supabase
                        .from('blackflowerproart')
                        .update({ balance: newBalance })
                        .eq('user_id', session.user.id);
                }
            } catch (err) {
                console.error("Error updating balance:", err);
            }

            // العودة لصفحة هوم بعد الانتهاء
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
