<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-black: #000;
            --card-black: #0a0a0a;
            --accent: #ffffff;
            --dim-gray: #888888;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        /* الهيدر المحتوي على الشعار والعنوان */
        #topHeader { 
            height: 85px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; color: #fff; z-index: 1000; position: relative; 
        }

        .brand-section { display: flex; align-items: center; gap: 15px; }
        .logo-mini { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }
        .brand-text { display: flex; flex-direction: column; }
        .brand-name { font-family: 'Times New Roman', serif; letter-spacing: 3px; text-transform: uppercase; font-size: 14px; margin: 0; }
        .brand-sub { font-size: 8px; letter-spacing: 3px; color: var(--dim-gray); text-transform: uppercase; }

        .timer-display { font-size: 14px; font-weight: bold; color: #fff; background: #111; padding: 8px 20px; border: 1px solid #333; letter-spacing: 1px; min-width: 120px; text-align: center; }

        .viewport { position: relative; width: 100%; height: calc(100% - 85px); }
        #r4allFrame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; opacity: 0.01; }
        #targetFrame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2; background: #fff; }

        /* تراكيب المودال */
        #captchaOverlay, #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-box { background: #000; padding: 40px; border: 1px solid #333; text-align: center; color: #fff; min-width: 320px; }
        
        .btn-main { 
            background: #111; color: #444; border: 1px solid #222; 
            padding: 14px 50px; font-weight: bold; text-transform: uppercase; 
            margin-top: 25px; cursor: not-allowed; transition: 0.3s; width: 100%; letter-spacing: 2px;
        }

        .btn-main.enabled { 
            background: #fff; color: #000; border: 1px solid #fff; 
            cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="brand-section">
            <img src="wight.jpg" alt="Logo" class="logo-mini">
            <div class="brand-text">
                <span class="brand-name">The Black Flower</span>
                <span class="brand-sub">professional art</span>
            </div>
        </div>
        <div id="timerBox" class="timer-display">Wait...</div>
    </div>

    <div class="viewport">
        <iframe id="r4allFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <div id="captchaOverlay">
        <div class="modal-box">
            <div style="margin-bottom:20px; font-size:10px; letter-spacing:3px; color:#888;">HUMAN VERIFICATION</div>
            <div id="mtcaptcha-container" class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaVerified"></div>
            <button id="confirmBtn" class="btn-main" disabled onclick="handleConfirmClick()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="modal-box">
            <h2 style="letter-spacing: 5px; color: #fff; margin-bottom:10px;">SUCCESS</h2>
            <p id="rewardTxt" style="color: #888; font-size: 13px; margin-bottom: 25px;"></p>
            <button class="btn-main enabled" onclick="finalizeAndBack()">CONTINUE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const adData = JSON.parse(localStorage.getItem('active_ad'));
        if (!adData) { window.location.href = 'home.html'; }

        // إعداد الإطار والعداد
        document.getElementById('targetFrame').src = adData.url;
        let timeLeft = parseInt(adData.seconds) || 10;
        const timerBox = document.getElementById('timerBox');

        // تشغيل العداد التنازلي
        const countdown = setInterval(() => {
            if (timeLeft > 0) {
                timerBox.innerText = `${timeLeft}s REMAINING`;
                timeLeft--;
            } else {
                clearInterval(countdown);
                timerBox.innerText = "COMPLETED";
                document.getElementById('captchaOverlay').style.display = 'flex';
                startCaptchaCheck(); // بدء فحص حالة الكابتشا
            }
        }, 1000);

        // دالة تفعيل الزر عند التحقق
        window.onCaptchaVerified = function(token) {
            if (token) {
                const btn = document.getElementById('confirmBtn');
                btn.disabled = false;
                btn.classList.add('enabled');
            }
        };

        // فحص احتياطي لحالة الكابتشا لضمان تفعيل الزر فور ظهور الصح
        function startCaptchaCheck() {
            const checkInterval = setInterval(() => {
                if (window.mtcaptcha && mtcaptcha.getVerifiedToken()) {
                    onCaptchaVerified(mtcaptcha.getVerifiedToken());
                    clearInterval(checkInterval);
                }
            }, 500);
        }

        function handleConfirmClick() {
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('rewardTxt').innerText = `You earned ${adData.reward} BFP!`;
            document.getElementById('successModal').style.display = 'flex';
        }

async function loadGlobalAds(userId) {
    const adsList = document.getElementById('ads-list');
    const now = new Date().toISOString();
    
    // حساب وقت "قبل 24 ساعة من الآن"
    const twentyFourHoursAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

    // 1. جلب الإعلانات النشطة فقط
    const { data: ads } = await _supabase
        .from('ads')
        .select('*')
        .gt('expiry_at', now);

    // 2. جلب المشاهدات التي تمت في آخر 24 ساعة لهذا المستخدم فقط
    const { data: views } = await _supabase
        .from('ad_views')
        .select('ad_id')
        .eq('user_id', userId)
        .gt('viewed_at', twentyFourHoursAgo); // فحص التوقيت

    const viewedIds = views ? views.map(v => v.ad_id) : [];

    // 3. فلترة الإعلانات (إخفاء أي إعلان ID الخاص به موجود في سجل المشاهدات)
    const availableAds = ads ? ads.filter(ad => !viewedIds.includes(ad.id)) : [];

    // عرض الإعلانات المتبقية فقط...
    if (availableAds.length > 0) {
        adsList.innerHTML = '';
        availableAds.forEach(ad => {
            // كود إنشاء بطاقة الإعلان هنا...
        });
    } else {
        adsList.innerHTML = '<div class="empty-state">No ads available. Frozen for 24h.</div>';
    }
}
    </script>
</body>
</html>
