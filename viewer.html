<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* الشريط العلوي للعداد */
        #timer-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 9999;
        }

        .brand-mini { color: #fff; font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; }
        
        .timer-wrapper { display: flex; align-items: center; gap: 15px; }
        
        #timer-display {
            background: #fff; color: #000; font-weight: bold;
            padding: 5px 15px; border-radius: 4px; min-width: 40px; text-align: center;
        }

        #confirm-btn {
            background: #00ff00; color: #000; border: none;
            padding: 8px 20px; font-weight: bold; cursor: pointer;
            display: none; text-transform: uppercase; border-radius: 2px;
        }

        /* حاوية الإطار التي تملأ الشاشة */
        .ad-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            padding-top: 60px; /* لإعطاء مساحة للشريط العلوي */
            box-sizing: border-box;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            background: #fff;
        }
    </style>
</head>
<body>

    <div id="timer-bar">
        <div class="brand-mini">THE BLACK FLOWER <span style="color: #666; font-size: 0.7rem;">| AD VIEWER</span></div>
        
        <div class="timer-wrapper">
            <div id="timer-display">--</div>
            <button id="confirm-btn" onclick="claimReward()">Confirm Reward</button>
        </div>
    </div>

    <div class="ad-container">
        <iframe 
            id="ad-frame" 
            sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts"
            src="about:blank">
        </iframe>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeAd = null;

        async function init() {
            const storedAd = localStorage.getItem('active_ad');
            if (!storedAd) {
                window.location.href = 'home.html';
                return;
            }

            activeAd = JSON.parse(storedAd);
            document.getElementById('ad-frame').src = activeAd.url;

            startTimer(activeAd.seconds);
        }

        function startTimer(seconds) {
            let timeLeft = seconds;
            const display = document.getElementById('timer-display');
            
            const interval = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    display.style.display = 'none';
                    document.getElementById('confirm-btn').style.display = 'block';
                }
            }, 1000);
        }

        async function claimReward() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true;
            btn.innerText = 'PROCESSING...';

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) throw new Error("No session found");

                // 1. تحديث الرصيد (زيادة الرصيد المخصص)
                const { data: profile } = await _supabase
                    .from('blackflowerproart')
                    .select('balance')
                    .eq('user_id', user.id)
                    .single();

                const newBalance = (parseFloat(profile.balance) || 0) + parseFloat(activeAd.reward);

                await _supabase
                    .from('blackflowerproart')
                    .update({ balance: newBalance })
                    .eq('user_id', user.id);

                // 2. تسجيل المشاهدة في جدول ad_views لمنع التكرار
                await _supabase.from('ad_views').insert([
                    { user_id: user.id, ad_id: activeAd.id, viewed_at: new Date().toISOString() }
                ]);

                // العودة للداشبورد
                localStorage.removeItem('active_ad');
                window.location.href = 'home.html';

            } catch (err) {
                console.error(err);
                alert("Error claiming reward. Please try again.");
                btn.disabled = false;
                btn.innerText = 'CONFIRM REWARD';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
