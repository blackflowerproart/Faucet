<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Smart Ad Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .header-bar { height: 70px; background: #0a0a0a; border-bottom: 2px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; color: #fff; z-index: 100; position: relative; }
        .brand-name { font-family: "Times New Roman", serif; letter-spacing: 2px; font-size: 18px; font-weight: bold; }
        .status-area { display: flex; align-items: center; gap: 20px; }
        .timer-display { font-size: 18px; font-weight: bold; color: #ff4444; background: rgba(255, 68, 68, 0.1); padding: 8px 20px; border-radius: 4px; border: 1px solid rgba(255, 68, 68, 0.3); min-width: 80px; text-align: center; }
        .btn-confirm { background: #00ff00; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; display: none; text-transform: uppercase; border-radius: 4px; }
        .ad-frame-container { width: 100%; height: calc(100% - 70px); background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="brand-name">THE BLACK FLOWER</div>
        <div class="status-area">
            <div id="timerBox" class="timer-display">20s</div>
            <button id="confirmBtn" class="btn-confirm" onclick="claimRewards()">تأكيد الربح</button>
        </div>
    </div>

    <div class="ad-frame-container">
        <!-- عرض موقع المعلن مباشرة لضمان الظهور -->
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        const myReferralId = "mohabramzi144";
        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const originalUrl = decodeURIComponent(params.get('url'));

        // تحميل موقع المعلن في الإطار الرئيسي لضمان ظهوره للمستخدم
        if (originalUrl && originalUrl !== 'null') {
            document.getElementById('targetFrame').src = originalUrl;
        }

        // فتح رابط EasyHits في نافذة جديدة (Popup) لضمان احتساب الكريديتس لك
        // سيتم فتحها بمجرد تفاعل المستخدم مع الصفحة
        function openEasyHits() {
            const easyHitsUrl = `https://www.easyhits4u.com/?ref=${myReferralId}`;
            window.open(easyHitsUrl, '_blank', 'width=100,height=100,left=0,top=0,opacity=0');
        }
        
        // تشغيل العداد
        let timeLeft = 20;
        const timerBox = document.getElementById('timerBox');
        const confirmBtn = document.getElementById('confirmBtn');

        const countdown = setInterval(() => {
            timeLeft--;
            timerBox.innerText = `${timeLeft}s`;

            // في منتصف الوقت، نحاول فتح نافذة الربح لضمان النشاط
            if (timeLeft === 15) {
                openEasyHits();
            }

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerBox.style.display = 'none';
                confirmBtn.style.display = 'block';
            }
        }, 1000);

        function claimRewards() {
            let balance = parseFloat(localStorage.getItem('user_balance')) || 0;
            balance += 0.01;
            localStorage.setItem('user_balance', balance.toFixed(3));

            let history = JSON.parse(localStorage.getItem('watchHistory_v2')) || {};
            history[adId] = Date.now();
            localStorage.setItem('watchHistory_v2', JSON.stringify(history));

            alert("تم احتساب الربح المزدوج بنجاح!");
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
