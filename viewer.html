<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Viewing Ad</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; font-family:Arial; }
        #header { height:70px; background:#000; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; padding:0 20px; color:#fff; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; justify-content:center; align-items:center; }
        .box { background:#000; padding:30px; border:1px solid #333; text-align:center; }
        .btn { background:#fff; color:#000; border:none; padding:12px 40px; font-weight:bold; cursor:pointer; margin-top:20px; }
        .btn:disabled { background:#222; color:#555; }
    </style>
</head>
<body>
    <div id="header">
        <div style="letter-spacing:2px">THE BLACK FLOWER</div>
        <div id="timer" style="background:#111; padding:10px 20px; border:1px solid #333">Wait...</div>
    </div>
    
    <iframe id="r4all" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk" style="position:absolute; width:100%; height:100%; z-index:1; opacity:0.01"></iframe>
    <iframe id="adFrame" style="width:100%; height:calc(100% - 70px); border:none; position:relative; z-index:2"></iframe>

    <div id="overlay">
        <div class="box" id="captchaBox">
            <div class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-callback="onVerify"></div>
            <button class="btn" id="confirmBtn" disabled onclick="showSuccess()">CONFIRM</button>
        </div>
        <div class="box" id="successBox" style="display:none">
            <h2 id="msg"></h2>
            <button class="btn" onclick="finish()">CONTINUE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const ad = JSON.parse(localStorage.getItem('active_ad'));
        if(!ad) window.location.href='home.html';

        document.getElementById('adFrame').src = ad.url;
        let timeLeft = ad.seconds;

        const clock = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s Remaining";
            if(timeLeft <= 0) { clearInterval(clock); document.getElementById('overlay').style.display='flex'; }
        }, 1000);

        window.onVerify = () => { const b = document.getElementById('confirmBtn'); b.disabled = false; b.style.background = "#fff"; };

        function showSuccess() {
            document.getElementById('captchaBox').style.display='none';
            document.getElementById('successBox').style.display='block';
            document.getElementById('msg').innerText = `Earned ${ad.reward} BFP!`;
        }

        async function finish() {
            const { data: { session } } = await _supabase.auth.getSession();
            const { data: prof } = await _supabase.from('blackflowerproart').select('balance').eq('user_id', session.user.id).single();
            
            await _supabase.from('blackflowerproart').update({ balance: prof.balance + ad.reward }).eq('user_id', session.user.id);
            await _supabase.from('ad_views').insert([{ user_id: session.user.id, ad_id: ad.id }]);
            
            localStorage.removeItem('active_ad');
            window.location.href='home.html';
        }
    </script>
</body>
</html>
