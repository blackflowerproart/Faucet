<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Verified Profit System</title>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" async defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        .header-bar { height: 70px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; color: #fff; z-index: 1000; position: relative; }
        .brand-logo { font-family: serif; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; font-size: 16px; }
        .timer-display { font-size: 16px; font-weight: bold; color: #fff; background: #111; padding: 8px 20px; border: 1px solid #333; border-radius: 2px; }

        /* طبقة الكابتشا */
        #captchaOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }

        .captcha-box {
            background: #000; padding: 30px; border: 1px solid #333; border-radius: 4px;
            text-align: center; min-width: 350px; display: flex; flex-direction: column; align-items: center;
        }

        .captcha-title { color: #fff; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; }

        /* زر المطالبة - يظهر تحت المربع */
        #claimRewardBtn {
            margin-top: 20px; background: #2ecc71; color: #fff; border: none;
            padding: 15px 40px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; width: 100%; 
            display: none; /* مخفي افتراضياً */
            transition: 0.3s; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        #claimRewardBtn:hover { background: #27ae60; transform: translateY(-2px); }

        .ad-container { width: 100%; height: calc(100% - 70px); position: relative; }
        #ptcFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #targetFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 2; background: #fff; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div id="timerBox" class="timer-display">Wait 20s</div>
    </div>

    <div id="captchaOverlay">
        <div class="captcha-box">
            <div class="captcha-title">Human Verification</div>
            
            <div id="mtcaptcha-container" class="mtcaptcha" 
                 data-sitekey="MTPublic-e0hUm0HwS" 
                 data-theme="basic" 
                 data-callback="onCaptchaSuccess"></div>

            <button id="claimRewardBtn" onclick="finalizeAndShowAd()">✓ Claim 15 BFP Reward</button>
        </div>
    </div>

    <div class="ad-container">
        <iframe id="ptcFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const targetUrl = decodeURIComponent(params.get('url'));

        if (targetUrl && targetUrl !== 'null') {
            document.getElementById('targetFrame').src = targetUrl;
        }

        let timeLeft = 20;
        const countdown = setInterval(() => {
            timeLeft--;
            if(document.getElementById('timerBox')) {
                document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            }
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timerBox').innerText = "Verify to Continue";
                document.getElementById('captchaOverlay').style.display = 'flex';
            }
        }, 1000);

        // الدالة التي يتم استدعاؤها فور حل الكابتشا
        function onCaptchaSuccess(validatedToken) {
            console.log("Captcha success token:", validatedToken);
            // إظهار الزر فوراً باستخدام JS المباشر
            const rewardBtn = document.getElementById('claimRewardBtn');
            if (rewardBtn) {
                rewardBtn.style.display = 'block';
            }
        }

        function finalizeAndShowAd() {
            try {
                // 1. احتساب الربح
                let bfpBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
                bfpBalance += 15;
                localStorage.setItem('bfp_balance', bfpBalance.toFixed(2));

                // 2. تحديث السجل
                let history = JSON.parse(localStorage.getItem('added_ads_history')) || {};
                history[adId] = Date.now();
                localStorage.setItem('added_ads_history', JSON.stringify(history));

                // 3. التنفيذ البصري: إغلاق الكابتشا وإظهار الموقع
                document.getElementById('captchaOverlay').style.display = 'none';
                document.getElementById('targetFrame').style.display = 'none';
                
                // تحديث الهيدر
                document.getElementById('timerBox').innerText = "15 BFP Claimed";
                document.getElementById('timerBox').style.background = "#2ecc71";
                document.getElementById('timerBox').style.borderColor = "#2ecc71";

                alert("Success! 15 BFP tokens have been added to your balance.");

            } catch (e) {
                console.error("Finalization error:", e);
                // في حال حدوث خطأ، نغلق النافذة على الأقل لكي لا يعلق المستخدم
                document.getElementById('captchaOverlay').style.display = 'none';
            }
        }
    </script>
</body>
</html>
