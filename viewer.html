<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        #topHeader { 
            height: 85px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; color: #fff; z-index: 1000; position: relative; 
        }

        .brand-logo { font-family: serif; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; font-size: 18px; }
        .timer-display { font-size: 15px; font-weight: bold; color: #fff; background: #111; padding: 10px 25px; border: 1px solid #333; }

        .viewport { position: relative; width: 100%; height: calc(100% - 85px); }
        #r4allFrame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }
        #targetFrame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2; background: #fff; }

        /* الكابتشا والنجاح */
        #captchaOverlay, #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-box { background: #000; padding: 40px; border: 1px solid #333; text-align: center; color: #fff; min-width: 300px; }
        .btn-main { background: #fff; color: #000; border: none; padding: 12px 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        #confirmBtn:disabled { background: #111; color: #444; cursor: not-allowed; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div id="timerBox" class="timer-display">Loading...</div>
    </div>

    <div class="viewport">
        <iframe id="r4allFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <div id="captchaOverlay">
        <div class="modal-box">
            <div style="margin-bottom:20px; font-size:11px; letter-spacing:2px; opacity:0.7;">VERIFY YOU ARE HUMAN</div>
            <div class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaSuccess"></div>
            <button id="confirmBtn" class="btn-main" disabled onclick="handleConfirmClick()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="modal-box">
            <h2 style="letter-spacing: 5px;">SUCCESS</h2>
            <p id="rewardTxt" style="color: #888; font-size: 14px;"></p>
            <button class="btn-main" onclick="finalizeAndBack()">CONTINUE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const adData = JSON.parse(localStorage.getItem('active_ad'));
        if (!adData) window.location.href = 'home.html';

        document.getElementById('targetFrame').src = adData.url;
        let timeLeft = adData.seconds;

        // عند نجاح حل الكابتشا
        window.onCaptchaSuccess = function() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = false;
            btn.style.backgroundColor = "#fff";
            btn.style.color = "#000";
        };

        // العداد الزمني
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('captchaOverlay').style.display = 'flex';
            }
        }, 1000);

        // وظيفة زر التاكيد المحدثة
        function handleConfirmClick() {
            // 1. إغلاق مربع الكابتشا فوراً
            document.getElementById('captchaOverlay').style.display = 'none';

            // 2. تحديد الربح بناءً على مدة الإعلان
            let reward = (adData.seconds >= 20) ? 15 : 8;
            adData.finalReward = reward; // حفظها للإرسال لقاعدة البيانات

            // 3. إظهار رسالة التأكيد
            document.getElementById('rewardTxt').innerText = `You earned ${reward} BFP for this ${adData.seconds}s visit.`;
            document.getElementById('successModal').style.display = 'flex';
        }

        // إرسال البيانات لـ Supabase والعودة للهوم
        async function finalizeAndBack() {
            const btn = document.querySelector('#successModal .btn-main');
            btn.innerText = "SAVING...";
            btn.disabled = true;

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    const { data: profile } = await _supabase.from('blackflowerproart').select('balance').eq('user_id', session.user.id).single();
                    if (profile) {
                        const newBalance = profile.balance + adData.finalReward;
                        await _supabase.from('blackflowerproart').update({ balance: newBalance }).eq('user_id', session.user.id);
                    }
                }
            } catch (e) {
                console.error("Error saving reward");
            }

            localStorage.removeItem('active_ad');
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
