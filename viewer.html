<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Premium Ad Viewer</title>
    <style>
        /* Modern Minimalist Black & White Theme */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Inter', 'Segoe UI', sans-serif; 
        }

        /* Top Navigation Bar */
        .header-bar {
            height: 80px;
            background: #000;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            color: #fff;
            z-index: 1000;
            position: relative;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
        }

        .logo-text {
            font-family: "Times New Roman", serif;
            letter-spacing: 4px;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 10px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Controls Section */
        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .timer-circle {
            width: 50px;
            height: 50px;
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-confirm {
            background-color: #fff;
            color: #000;
            border: 1px solid #fff;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            background-color: #000;
            color: #fff;
        }

        /* Frames Management */
        .main-container {
            width: 100%;
            height: calc(100% - 80px);
            background: #fff;
            position: relative;
        }

        #targetFrame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            z-index: 2;
        }

        /* Hidden Profit Frame for Rotate4All */
        #ptcFrame {
            width: 1px;
            height: 1px;
            position: absolute;
            opacity: 0.01;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-section">
            <div class="logo-text">THE BLACK FLOWER</div>
            <div class="tagline">Pro Art Visualization</div>
        </div>
        
        <div class="controls">
            <div id="timerBox" class="timer-circle">20</div>
            <button id="confirmBtn" class="btn-confirm" onclick="finalizeTransaction()">Confirm Reward</button>
        </div>
    </div>

    <div class="main-container">
        <!-- Rotate4All Tracking Frame -->
        <iframe id="ptcFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        
        <!-- Ad Content Frame -->
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        // Configuration
        const REWARD_USD = 0.00005; // USD Reward
        const REWARD_BFP = 15;      // BFP Token Equivalent
        
        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const targetUrl = decodeURIComponent(params.get('url'));

        // Load Ad Content
        if (targetUrl) {
            document.getElementById('targetFrame').src = targetUrl;
        }

        // Countdown Logic
        let seconds = 20;
        const timerBox = document.getElementById('timerBox');
        const confirmBtn = document.getElementById('confirmBtn');

        const interval = setInterval(() => {
            seconds--;
            timerBox.innerText = seconds;

            if (seconds <= 0) {
                clearInterval(interval);
                timerBox.style.display = 'none';
                confirmBtn.style.display = 'block';
            }
        }, 1000);

        // Transaction Finalization
        function finalizeTransaction() {
            // 1. Update USD Balance
            let currentBalanceUSD = parseFloat(localStorage.getItem('user_balance')) || 0;
            currentBalanceUSD += REWARD_USD;
            localStorage.setItem('user_balance', currentBalanceUSD.toFixed(6));

            // 2. Update BFP Crypto Balance
            let currentBalanceBFP = parseFloat(localStorage.getItem('bfp_balance')) || 0;
            currentBalanceBFP += REWARD_BFP;
            localStorage.setItem('bfp_balance', currentBalanceBFP.toFixed(2));

            // 3. Mark as Viewed (24h Lock)
            let watchHistory = JSON.parse(localStorage.getItem('watchHistory_v2')) || {};
            watchHistory[adId] = Date.now();
            localStorage.setItem('watchHistory_v2', JSON.stringify(watchHistory));

            alert(`Success!\n+ $${REWARD_USD} added to USD Wallet\n+ ${REWARD_BFP} BFP added to Crypto Wallet`);
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
