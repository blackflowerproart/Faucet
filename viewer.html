<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        :root { --bg: #000; --accent: #fff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #topHeader { height: 80px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; color: #fff; z-index: 1000; position: relative; }
        .brand-section { display: flex; align-items: center; gap: 12px; }
        .logo-mini { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #333; }
        .timer-display { font-size: 14px; font-weight: bold; color: #fff; background: #111; padding: 8px 15px; border: 1px solid #333; min-width: 140px; text-align: center; }
        .viewport { width: 100%; height: calc(100% - 80px); }
        #targetFrame { width: 100%; height: 100%; border: none; background: #fff; }
        #captchaOverlay, #successModal, #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal-box { background: #000; padding: 35px; border: 1px solid #333; text-align: center; color: #fff; width: 320px; }
        .btn-main { background: #fff; color: #000; border: 1px solid #fff; padding: 14px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 2px; margin-top: 10px; }
        .btn-main:disabled { background: #111; color: #444; border-color: #222; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <div class="modal-box">
            <h3 style="letter-spacing: 2px;">READY TO START?</h3>
            <p style="font-size: 11px; color: #888;">Click below to initialize the safe viewer and start the timer.</p>
            <button class="btn-main" onclick="startViewing()">START AD</button>
        </div>
    </div>

    <div id="topHeader">
        <div class="brand-section">
            <img src="wight.jpg" alt="Logo" class="logo-mini">
            <span class="brand-name">The Black Flower</span>
        </div>
        <div id="timerBox" class="timer-display">Waiting...</div>
    </div>

    <div class="viewport">
        <iframe id="targetFrame" src=""></iframe>
    </div>

    <div id="captchaOverlay" style="display: none;">
        <div class="modal-box">
            <p style="font-size: 10px; color: #888; letter-spacing: 2px; margin-bottom:20px;">VERIFY HUMANITY</p>
            <div id="mt-container" class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic"></div>
            <button id="confirmBtn" class="btn-main" disabled onclick="processReward()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal" style="display: none;">
        <div class="modal-box">
            <h2 style="letter-spacing: 4px;">COMPLETED</h2>
            <p id="rewardTxt" style="color: #888; font-size: 12px; margin-bottom:25px;"></p>
            <button class="btn-main" onclick="exitViewer()">CONTINUE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const adData = JSON.parse(localStorage.getItem('active_ad'));
        if (!adData) window.location.href = 'home.html';

        let ptpWindow;

        function startViewing() {
            // 1. فتح رابط Rotate4All (سيسمح المتصفح بهذا لأنه ناتج عن نقرة)
            const ptpUrl = "https://www.rotate4all.com/promote/pmq0c6xfa7wk";
            ptpWindow = window.open(ptpUrl, '_blank', 'width=400,height=400');
            
            // إخفاء طبقة البدء وتشغيل الإعلان
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('targetFrame').src = adData.url;
            runTimer();
        }

        function runTimer() {
            let timeLeft = parseInt(adData.seconds);
            const countdown = setInterval(() => {
                if (timeLeft > 0) {
                    document.getElementById('timerBox').innerText = `${timeLeft}s REMAINING`;
                    timeLeft--;
                } else {
                    clearInterval(countdown);
                    document.getElementById('timerBox').innerText = "DONE";
                    document.getElementById('captchaOverlay').style.display = 'flex';
                    
                    const checkCaptcha = setInterval(() => {
                        if (window.mtcaptcha && mtcaptcha.getVerifiedToken()) {
                            const btn = document.getElementById('confirmBtn');
                            btn.disabled = false;
                            clearInterval(checkCaptcha);
                        }
                    }, 500);
                }
            }, 1000);
        }

        async function processReward() {
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.innerText = "SAVING...";
            confirmBtn.disabled = true;

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) throw new Error("User not logged in");

                // تحديث الرصيد باستخدام rpc أو استعلام مباشر
                // ملاحظة: قمنا باستخدام parseFloat لضمان معاملة الأرقام بشكل صحيح
                const { data: profile } = await _supabase
                    .from('blackflowerproart')
                    .select('balance')
                    .eq('user_id', user.id)
                    .single();

                const currentBalance = parseFloat(profile?.balance || 0);
                const rewardAmount = parseFloat(adData.reward);

                const { error: updateError } = await _supabase
                    .from('blackflowerproart')
                    .update({ balance: currentBalance + rewardAmount })
                    .eq('user_id', user.id);

                if (updateError) throw updateError;

                // تسجيل الزيارة لتجميد الإعلان
                await _supabase.from('ad_views').insert([{ 
                    user_id: user.id, 
                    ad_id: adData.id,
                    viewed_at: new Date().toISOString() 
                }]);

                // إغلاق نافذة Rotate4All
                if (ptpWindow) ptpWindow.close();

                document.getElementById('captchaOverlay').style.display = 'none';
                document.getElementById('rewardTxt').innerText = `REWARD: +${rewardAmount} BFP`;
                document.getElementById('successModal').style.display = 'flex';

            } catch (err) {
                console.error(err);
                alert("Error updating balance: " + err.message);
                confirmBtn.disabled = false;
                confirmBtn.innerText = "CONFIRM";
            }
        }

        function exitViewer() {
            localStorage.removeItem('active_ad');
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
