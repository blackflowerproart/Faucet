<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Verified Profit System</title>
    <!-- استدعاء مكتبة MTCaptcha -->
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" async defer></script>
    <style>
        /* نظام الألوان: أسود وأبيض فاخر */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; font-family: 'Inter', sans-serif; 
        }

        /* شريط التحكم العلوي */
        .header-bar { 
            height: 75px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; color: #fff; z-index: 1000; position: relative; 
        }

        .brand-logo {
            font-family: serif; letter-spacing: 3px; font-weight: bold;
            text-transform: uppercase; font-size: 18px;
        }

        .timer-display { 
            font-size: 18px; font-weight: bold; color: #fff; 
            background: #111; padding: 10px 25px; 
            border: 1px solid #333; border-radius: 2px;
        }

        /* طبقة التعتيم (Overlay) للكابتشا - تظهر فوق الإعلان */
        #captchaOverlay {
            display: none; /* مخفية حتى انتهاء العداد */
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* خلفية سوداء شبه شفافة */
            z-index: 9999; /* أعلى شيء في الصفحة */
            justify-content: center; /* توسيط أفقي */
            align-items: center; /* توسيط عمودي */
        }

        /* حاوية الكابتشا الأنيقة */
        .captcha-box {
            background: #000;
            padding: 30px;
            border: 2px solid #333; /* إطار أبيض خفيف */
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255,255,255,0.05); /* ظل ناعم */
        }

        .captcha-title {
            color: #fff;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 16px;
        }

        .btn-action { 
            background: #fff; color: #000; border: none; 
            padding: 12px 30px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; border-radius: 2px; 
            display: none; /* مخفي حتى حل الكابتشا */
            transition: 0.3s;
            margin-top: 15px; /* مسافة فوق الزر */
        }
        .btn-action:hover { background: #ccc; }

        /* حاوية الإطارات */
        .ad-container { width: 100%; height: calc(100% - 75px); position: relative; background: #fff; }
        #ptcFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #targetFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 2; opacity: 0.96; background: #fff; }
    </style>
</head>
<body>

    <!-- شريط التحكم -->
    <div class="header-bar">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div id="timerBox" class="timer-display">Wait 20s</div>
    </div>

    <!-- طبقة الكابتشا وسط الصفحة -->
    <div id="captchaOverlay">
        <div class="captcha-box">
            <div class="captcha-title">Verification Required</div>
            
            <!-- أداة MTCaptcha مع الثيم 'basic' ليتناسب مع الأبيض والأسود -->
          
<div class="mtcaptcha" 
     data-sitekey="MTPublic-e0hUm0HwS" 
     data-theme="basic" 
     data-lang="en"
     data-callback="onCaptchaSuccess"></div>

            <!-- زر الحصول على المكافأة يظهر هنا بعد الحل -->
            <button id="confirmBtn" class="btn-action" onclick="finalizeAll()">Claim 15 BFP Reward</button>
        </div>
    </div>

    <!-- حاوية الإعلانات -->
    <div class="ad-container">
        <iframe id="ptcFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const targetUrl = decodeURIComponent(params.get('url'));

        if (targetUrl && targetUrl !== 'null') {
            document.getElementById('targetFrame').src = targetUrl;
        }

        let timeLeft = 20;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timerBox').innerText = "Verify Below";
                // إظهار طبقة الكابتشا وسط الصفحة
                document.getElementById('captchaOverlay').style.display = 'flex';
            }
        }, 1000);

        // هذه الدالة تعمل تلقائياً عند حل الكابتشا بنجاح
        function onCaptchaSuccess(validatedToken) {
            // إظهار زر استلام المكافأة داخل صندوق الكابتشا
            document.getElementById('confirmBtn').style.display = 'inline-block';
        }

        function finalizeAll() {
            try {
                let bfpBalance = parseFloat(localStorage.getItem('bfp_balance')) || 0;
                bfpBalance += 15;
                localStorage.setItem('bfp_balance', bfpBalance.toFixed(2));

                let history = JSON.parse(localStorage.getItem('added_ads_history')) || {};
                history[adId] = Date.now();
                localStorage.setItem('added_ads_history', JSON.stringify(history));

                alert("Success! 15 BFP tokens added to your account.");
                // إخفاء الأوفرلاي وإعادة التوجيه
                document.getElementById('captchaOverlay').style.display = 'none';
                window.location.href = 'home.html';
            } catch (e) {
                console.error("Error finalizing reward:", e);
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
