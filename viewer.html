<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Viewer | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://service.mtcaptcha.com/mtcv1/client/mtcaptcha.min.js" defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        /* الهيدر العلوي */
        #topHeader { 
            height: 85px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; color: #fff; z-index: 1000; position: relative; 
        }

        .brand-logo { font-family: serif; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; font-size: 18px; }
        .timer-display { font-size: 15px; font-weight: bold; color: #fff; background: #111; padding: 10px 25px; border: 1px solid #333; }

        /* الكابتشا */
        #captchaOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center;
        }
        .captcha-box { background: #000; padding: 40px; border: 1px solid #333; text-align: center; }
        #confirmBtn {
            margin-top: 25px; width: 100%; padding: 15px; font-weight: bold;
            text-transform: uppercase; border: 1px solid #222;
            cursor: not-allowed; background: #111; color: #444;
        }
        .ready-to-confirm { background: #fff !important; color: #000 !important; cursor: pointer !important; }

        /* نافذة النجاح */
        #successModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 10000; justify-content: center; align-items: center;
        }
        .success-box { background: #000; border: 1px solid #fff; padding: 40px; text-align: center; color: #fff; }
        .continue-btn { background: #fff; color: #000; border: none; padding: 12px 50px; font-weight: bold; cursor: pointer; }

        /* حاويات العرض */
        .ad-container { width: 100%; height: calc(100% - 85px); position: relative; }
        
        /* إطار الإعلان الذي يشاهده المستخدم */
        #targetFrame { width: 100%; height: 100%; border: none; background: #fff; position: absolute; z-index: 5; }
        
        /* إطار Rotate4All المخفي لاحتساب الزيارة تلقائياً */
        #r4allFrame { width: 1px; height: 1px; opacity: 0.01; position: absolute; bottom: 0; right: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="topHeader">
        <div class="brand-logo">THE BLACK FLOWER</div>
        <div id="timerBox" class="timer-display">Loading Ad...</div>
    </div>

    <div id="captchaOverlay">
        <div class="captcha-box">
            <div style="color:#fff; margin-bottom:20px; font-size:11px; letter-spacing:2px;">HUMAN VERIFICATION</div>
            <div class="mtcaptcha" data-sitekey="MTPublic-e0hUm0HwS" data-theme="basic" data-callback="onCaptchaSuccess"></div>
            <button id="confirmBtn" disabled onclick="showSuccess()">CONFIRM</button>
        </div>
    </div>

    <div id="successModal">
        <div class="success-box">
            <h2>VERIFIED</h2>
            <p id="rewardTxt">Reward is being processed...</p>
            <button class="continue-btn" onclick="finalizeAndBack()">CONTINUE</button>
        </div>
    </div>

    <div class="ad-container">
        <iframe id="targetFrame" src="about:blank"></iframe>
        
        <iframe id="r4allFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const adData = JSON.parse(localStorage.getItem('active_ad'));
        if (!adData) window.location.href = 'home.html';

        document.getElementById('targetFrame').src = adData.url;
        let timeLeft = adData.seconds;

        window.onCaptchaSuccess = function() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = false;
            btn.classList.add('ready-to-confirm');
        };

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timerBox').innerText = `${timeLeft}s Remaining`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('captchaOverlay').style.display = 'flex';
            }
        }, 1000);

        function showSuccess() {
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('rewardTxt').innerText = `Success! ${adData.reward} BFP credited.`;
            document.getElementById('successModal').style.display = 'flex';
        }

        async function finalizeAndBack() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data: profile } = await _supabase.from('blackflowerproart').select('balance').eq('user_id', session.user.id).single();
                await _supabase.from('blackflowerproart').update({ balance: profile.balance + adData.reward }).eq('user_id', session.user.id);
            }
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
