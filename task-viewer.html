<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المهام الذكية - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #2ecc71;
            --primary-hover: #27ae60;
            --danger-red: #e74c3c;
            --warning-gold: #f1c40f;
            --dark-bg: #09090b;
            --card-bg: #141417;
            --border-color: #232329;
            --text-color: #fafafa;
            --muted-text: #a1a1aa;
            --sidebar-width: 290px;
            --glow-green: rgba(46, 204, 113, 0.15);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            display: flex;
            min-height: 100vh;
        }

        /* ----------------- Sidebar Modernized ----------------- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-left: 1px solid var(--border-color);
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            bottom: 0;
            right: 0;
            z-index: 100;
        }

        .brand-zone {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .brand-logo {
            width: 85px;
            height: 85px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            object-fit: cover;
        }

        .brand-title {
            font-family: 'Georgia', serif;
            font-size: 1.5rem;
            margin: 5px 0 2px 0;
            font-weight: bold;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .user-profile {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            margin-bottom: 25px;
        }

        .user-avatar {
            font-size: 2.2rem;
            color: var(--primary-green);
            margin-bottom: 5px;
        }

        .username {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
        }

        .balance-card {
            background: #1c1c21;
            border-radius: 10px;
            padding: 10px;
            margin-top: 12px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            box-shadow: 0 4px 12px var(--glow-green);
        }

        .balance-label {
            font-size: 0.75rem;
            color: var(--muted-text);
            margin-bottom: 2px;
        }

        .balance-bfp {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted-text);
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-btn:hover, .menu-btn.active {
            background: #1c1c21;
            border-color: var(--border-color);
            color: #fff;
        }
        .menu-btn:hover i {
            color: var(--primary-green);
            transform: scale(1.1);
        }
        .menu-btn i { transition: transform 0.2s; }

        /* ----------------- Main Workspace ----------------- */
        .main-content {
            margin-right: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 1100px;
        }

        .back-link {
            color: var(--muted-text);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-green);
        }

        /* Task Details Card */
        .task-details-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .task-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
            color: #fff;
        }

        .reward-badge {
            background: rgba(46, 204, 113, 0.08);
            color: var(--primary-green);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 1px solid rgba(46, 204, 113, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-description {
            font-size: 1.05rem;
            color: #d1d1d6;
            line-height: 1.7;
            white-space: pre-line;
        }

        .task-url-box {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .url-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .url-btn:hover {
            background: #e4e4e7;
            transform: translateY(-1px);
        }

        /* Submission Dynamic Box */
        #submission-container {
            animation: fadeIn 0.4s ease-out;
        }

        .submission-form {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-control {
            background: #09090b;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 16px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
            width: 100%;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .submit-btn {
            background: var(--primary-green);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }
        .submit-btn:disabled {
            background: var(--border-color);
            color: var(--muted-text);
            cursor: not-allowed;
        }

        /* Live Status Alerts */
        .status-card {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 24px;
            border-radius: 14px;
            border: 1px solid transparent;
            position: relative;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .status-card i {
            font-size: 1.8rem;
            margin-top: 2px;
        }

        .status-card.pending {
            background: rgba(241, 194, 15, 0.04);
            border-color: rgba(241, 194, 15, 0.15);
            color: #f39c12;
        }
        /* نبض مؤشر قيد المراجعة الفوري */
        .status-card.pending::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 8px;
            height: 8px;
            background: var(--warning-gold);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-card.approved {
            background: rgba(46, 204, 113, 0.05);
            border-color: rgba(46, 204, 113, 0.15);
            color: var(--primary-green);
        }

        .status-card.rejected {
            background: rgba(231, 76, 60, 0.05);
            border-color: rgba(231, 76, 60, 0.15);
            color: var(--danger-red);
        }

        /* Keyframes Animations */
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Media Responsive */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; border-left: none; border-bottom: 1px solid var(--border-color); padding: 25px; }
            .main-content { margin-right: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand-zone">
                <img src="wight.jpg" alt="Logo" class="brand-logo">
                <h1 class="brand-title">The Black Flower</h1>
                <p class="brand-sub">Professional art</p>
            </div>

            <div class="user-profile">
                <div class="user-avatar"><i class="fa-solid fa-circle-user"></i></div>
                <div id="user-display-name" class="username">جاري المزامنة...</div>
                
                <div class="balance-card">
                    <div class="balance-label">رصيدك الحالي المتاح</div>
                    <div id="user-balance-bfp" class="balance-bfp">0.00 BFP</div>
                </div>
            </div>

            <div class="sidebar-menu">
                <a href="index.html" class="menu-btn">
                    <i class="fa-solid fa-house-user"></i> لوحة التحكم الرئيسية
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
        
        <div>
            <a href="index.html" class="back-link">
                <i class="fa-solid fa-arrow-right-long"></i> العودة لقائمة المهام النشطة
            </a>
        </div>

        <div id="task-details-container" class="task-details-card">
            <div style="text-align: center; color: var(--muted-text); padding: 20px;">
                <i class="fas fa-spinner fa-spin" style="margin-left: 10px;"></i> يتم استدعاء تفاصيل المهمة الحالية...
            </div>
        </div>

        <div id="submission-container"></div>

    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OY0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let CURRENT_USER_ID = null;
        let TASK_ID = null;
        let TASK_REWARD = 0;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawId = urlParams.get('id');
            TASK_ID = rawId ? rawId.trim() : null;

            if (!TASK_ID || TASK_ID === "undefined" || TASK_ID === "null") {
                alert("لم يتم العثور على معرف صحيح للمهمة المحددة.");
                window.location.href = "index.html";
                return;
            }

            await initSession();
        };

        async function initSession() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user) {
                    CURRENT_USER_ID = user.id;
                    document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                } else {
                    alert("انتهت الجلسة أو لم يتم تسجيل الدخول، يرجى تسجيل الدخول مجدداً.");
                    window.location.href = "login.html";
                    return;
                }

                // سحب البيانات الأولية
                await fetchWalletData();
                await loadTaskAndSubmissionStatus();

                // ربط المستمع اللحظي (Realtime Webhook Client) فوراً لربط العميل والآدمن معاً
                subscribeToSubmissionChanges();

            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }

        // دالة الـ Realtime اللحظية لتحديث الصفحة تلقائياً بمجرد نقرة الأدمن
        function subscribeToSubmissionChanges() {
            _supabase
                .channel('public:task_submissions')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'task_submissions',
                    filter: `user_id=eq.${CURRENT_USER_ID}`
                }, (payload) => {
                    console.log('تحديث لحظي مكتشف:', payload);
                    // جلب الرصيد الجديد وحالة الواجهة بدون عمل Reload ممل للمتصفح
                    fetchWalletData();
                    loadTaskAndSubmissionStatus();
                })
                .subscribe();
        }

        async function fetchWalletData() {
            try {
                const { data: wallet } = await _supabase
                    .from('wallets')
                    .select('balance')
                    .eq('user_id', CURRENT_USER_ID)
                    .maybeSingle();

                if (wallet) {
                    document.getElementById('user-balance-bfp').innerText = `${wallet.balance || 0} BFP`;
                }
            } catch (err) { console.error("Wallet Fetch Error:", err); }
        }

        async function loadTaskAndSubmissionStatus() {
            const detailsContainer = document.getElementById('task-details-container');
            const submissionContainer = document.getElementById('submission-container');

            try {
                // 1. جلب تفاصيل المهمة الأساسية
                const { data: task, error: taskErr } = await _supabase
                    .from('tasks')
                    .select('*')
                    .eq('id', TASK_ID)
                    .maybeSingle();

                if (taskErr || !task) {
                    detailsContainer.innerHTML = `
                        <div style="color:var(--danger-red); text-align:center; padding: 20px;">
                            <i class="fa-solid fa-circle-exclamation fa-2x" style="margin-bottom:10px;"></i><br>
                            عذراً، هذه المهمة لم تعد متاحة أو تم أرشفتها بنجاح من النظام.
                        </div>`;
                    submissionContainer.innerHTML = '';
                    return;
                }

                TASK_REWARD = task.points_reward || 0;

                detailsContainer.innerHTML = `
                    <div class="task-header">
                        <h2 class="task-title">${task.title}</h2>
                        <span class="reward-badge"><i class="fa-solid fa-coins"></i> +${TASK_REWARD} BFP</span>
                    </div>
                    <p class="task-description">${task.description || 'لا يتوفر وصف توضيحي إضافي لهذه المهمة في الوقت الحالي.'}</p>
                    ${task.task_url ? `
                        <div class="task-url-box">
                            <span style="color: var(--muted-text); font-size: 0.9rem;"><i class="fa-solid fa-circle-info"></i> يرجى زيارة الرابط أدناه لإكمال العمل ثم العودة لرفع الإثبات:</span>
                            <a href="${task.task_url}" target="_blank" class="url-btn">انقر هنا لفتح الرابط <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.8rem; margin-right:5px;"></i></a>
                        </div>
                    ` : ''}
                `;

                // 2. فحص حالات الإرسال اللحظية
                const { data: submission } = await _supabase
                    .from('task_submissions')
                    .select('*')
                    .eq('task_id', TASK_ID)
                    .eq('user_id', CURRENT_USER_ID)
                    .maybeSingle();

                if (submission) {
                    let statusHtml = '';
                    if (submission.status === 'pending') {
                        statusHtml = `
                            <div class="status-card pending">
                                <i class="fa-regular fa-clock"></i>
                                <div>
                                    <div style="font-size: 1.1rem; font-weight:600;">طلبك قيد الفحص المباشر</div>
                                    <div style="font-size: 0.88rem; margin-top: 6px; opacity:0.85;">يقوم المسؤول بمراجعة إثباتك حالياً: "${submission.proof_text}"</div>
                                </div>
                            </div>`;
                    } else if (submission.status === 'approved') {
                        statusHtml = `
                            <div class="status-card approved">
                                <i class="fa-solid fa-circle-check"></i>
                                <div>
                                    <div style="font-size: 1.1rem; font-weight:600;">تم قبول إثبات العمل بنجاح!</div>
                                    <div style="font-size: 0.88rem; margin-top: 6px; opacity:0.85;">تم إيداع مكافأة المهمة بنجاح، وتحويل قيمتها البالغة +${TASK_REWARD} BFP إلى محفظتك المباشرة.</div>
                                </div>
                            </div>`;
                    } else if (submission.status === 'rejected') {
                        statusHtml = `
                            <div class="status-card rejected" style="margin-bottom:25px;">
                                <i class="fa-solid fa-circle-xmark"></i>
                                <div>
                                    <div style="font-size: 1.1rem; font-weight:600;">تم رفض الإثبات المقدم</div>
                                    <div style="font-size: 0.88rem; margin-top: 6px; opacity:0.85; color:#fbcbcb;">سبب الرفض الموجه من الأدمن: "${submission.rejection_reason || 'يرجى مراجعة الخطوات وتعديل صياغة الإثبات بدقة ثانية.'}"</div>
                                </div>
                            </div>
                            ${getFormHtml(submission.proof_text, true)}`;
                    }
                    submissionContainer.innerHTML = statusHtml;
                } else {
                    submissionContainer.innerHTML = getFormHtml();
                }

            } catch (error) {
                console.error("Error Loading View Architecture:", error);
            }
        }

        function getFormHtml(previousText = '', isResubmission = false) {
            return `
                <form id="proofForm" onsubmit="handleSubmitProof(event)" class="submission-form">
                    <h3 class="form-title">
                        <i class="fa-solid fa-paper-plane" style="color:var(--primary-green)"></i> 
                        ${isResubmission ? 'تعديل وإعادة إرسال إثبات العمل' : 'تقديم إثبات تنفيذ المهمة'}
                    </h3>
                    <div class="form-group">
                        <label for="proofText">اكتب إثبات العمل المطلوب بوضوح (مثال: اسم حسابك الذي تابعت به، لقطة أو نص تأكيدي):</label>
                        <textarea id="proofText" class="form-control" rows="4" placeholder="اكتب البيانات بوضوح ليتم فحصها فوراً من قبل الإدارة..." required>${previousText}</textarea>
                    </div>
                    <button type="submit" id="btnSubmit" class="submit-btn">
                        <i class="fa-solid fa-circle-check"></i> ${isResubmission ? 'تحديث وإرسال الطلب المعدل' : 'إرسال الإثبات للمراجعة والتدقيق'}
                    </button>
                </form>
            `;
        }

        async function handleSubmitProof(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            const proofText = document.getElementById('proofText').value.trim();

            if (!proofText) {
                alert("يرجى كتابة البيانات أولاً.");
                return;
            }

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري بث البيانات للأدمن...`;

                const { error } = await _supabase
                    .from('task_submissions')
                    .upsert({
                        user_id: CURRENT_USER_ID,
                        task_id: TASK_ID,
                        proof_text: proofText,
                        status: 'pending',
                        rejection_reason: null 
                    }, { onConflict: 'user_id,task_id' });

                if (error) throw error;

                alert("تم إرسال مستند الإثبات بنجاح وبدأت المراجعة الفورية!");
                await loadTaskAndSubmissionStatus();

            } catch (err) {
                console.error("Submission Upload error:", err);
                alert("حدثت مشكلة أثناء محاولة الإرسال: " + err.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-circle-check"></i> إرسال الإثبات للمراجعة والتدقيق`;
            }
        }
    </script>
</body>
</html>
