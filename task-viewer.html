<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل وتنفيذ المهمة - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #28a745;
            --danger-red: #dc3545;
            --dark-bg: #0b0b0b;
            --card-bg: #141414;
            --hover-bg: #1c1c1c;
            --text-color: #ffffff;
            --muted-text: #888888;
            --sidebar-width: 280px;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            display: flex;
            min-height: 100vh;
        }

        /* ----------------- واجهة المستخدم الجانبية (Sidebar) ----------------- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-left: 1px solid #222;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            bottom: 0;
            right: 0;
            z-index: 100;
        }

        .brand-zone {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
            margin-bottom: 15px;
        }

        .brand-logo {
            width: 80px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .brand-title {
            font-family: 'Times New Roman', serif;
            font-size: 1.4rem;
            margin: 5px 0 2px 0;
            letter-spacing: 1px;
        }

        .brand-sub {
            font-size: 0.8rem;
            color: var(--muted-text);
            text-transform: uppercase;
            margin: 0;
        }

        .user-profile {
            text-align: center;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .user-avatar {
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 8px;
        }

        .username {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 5px 0;
            word-break: break-all;
        }

        .balance-card {
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
        }

        .balance-bfp {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-green);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            margin-top: 10px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #181818;
            border: 1px solid #252525;
            color: var(--text-color);
            padding: 14px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .menu-btn:hover, .menu-btn.active {
            background: var(--hover-bg);
            border-color: #444;
            color: var(--primary-green);
        }

        /* ----------------- المحتوى الأساسي ----------------- */
        .main-content {
            margin-right: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .back-link {
            color: var(--muted-text);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--primary-green);
        }

        .task-details-card {
            background: var(--card-bg);
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .task-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 0;
            color: #fff;
        }

        .reward-badge {
            background: rgba(40, 167, 69, 0.1);
            color: var(--primary-green);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .task-description {
            font-size: 1.05rem;
            color: #ccc;
            line-height: 1.6;
            white-space: pre-line;
        }

        .task-url-box {
            background: #181818;
            border: 1px solid #252525;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .url-btn {
            background: var(--primary-green);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .url-btn:hover {
            background: #218838;
        }

        /* ----------------- نموذج تقديم الإثبات ----------------- */
        .submission-form {
            background: var(--card-bg);
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--muted-text);
        }

        .form-control {
            background: #0b0b0b;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--primary-green);
            outline: none;
        }

        .submit-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: #218838;
        }

        /* رسائل الحالات المختفلة للطلبات */
        .status-alert {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
        }
        .status-alert.pending {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        .status-alert.approved {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: var(--primary-green);
        }
        .status-alert.rejected {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: var(--danger-red);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; border-left: none; border-bottom: 1px solid #222; }
            .main-content { margin-right: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand-zone">
                <img src="wight.jpg" alt="Logo" class="brand-logo">
                <h1 class="brand-title">The Black Flower</h1>
                <p class="brand-sub">Professional art</p>
            </div>

            <div class="user-profile">
                <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                <div id="user-display-name" class="username">جاري التحميل...</div>
                
                <div class="balance-card">
                    <div id="user-balance-bfp" class="balance-bfp">0.00 BFP</div>
                </div>
            </div>

            <div class="sidebar-menu">
                <a href="index.html" class="menu-btn active">
                    <i class="fas fa-home"></i> العودة للرئيسية
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
        
        <div>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-right"></i> العودة للوحة المهام المتاحة
            </a>
        </div>

        <div id="task-details-container" class="task-details-card">
            <div class="loading-text" style="text-align: center; color: var(--muted-text);">جاري تحميل تفاصيل المهمة...</div>
        </div>

        <div id="submission-container"></div>

    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OY0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let CURRENT_USER_ID = null;
        let TASK_ID = null;
        let TASK_REWARD = 0;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawId = urlParams.get('id');
            TASK_ID = rawId ? rawId.trim() : null;

            if (!TASK_ID || TASK_ID === "undefined" || TASK_ID === "null") {
                alert("لم يتم العثور على معرف صحيح للمهمة المحددة.");
                window.location.href = "index.html";
                return;
            }

            await initSession();
        };

        async function initSession() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user) {
                    CURRENT_USER_ID = user.id;
                    document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                } else {
                    alert("لم يتم العثور على جلسة تسجيل دخول نشطة، يرجى تسجيل الدخول أولاً.");
                    window.location.href = "login.html";
                    return;
                }

                await fetchWalletData();
                await loadTaskAndSubmissionStatus();

            } catch (err) {
                console.error("خطأ في التهيئة:", err);
            }
        }

        async function fetchWalletData() {
            try {
                const { data: wallet } = await _supabase
                    .from('wallets')
                    .select('balance')
                    .eq('user_id', CURRENT_USER_ID)
                    .maybeSingle();

                if (wallet) {
                    document.getElementById('user-balance-bfp').innerText = `${wallet.balance || 0} BFP`;
                }
            } catch (err) { console.error(err); }
        }

        async function loadTaskAndSubmissionStatus() {
            const detailsContainer = document.getElementById('task-details-container');
            const submissionContainer = document.getElementById('submission-container');

            try {
                // 1. جلب تفاصيل المهمة
                const { data: task, error: taskErr } = await _supabase
                    .from('tasks')
                    .select('*')
                    .eq('id', TASK_ID)
                    .maybeSingle();

                if (taskErr || !task) {
                    console.error("Supabase Error or Empty:", taskErr);
                    detailsContainer.innerHTML = `
                        <div style="color:var(--danger-red); text-align:center;">
                            عذراً، لم يتم العثور على هذه المهمة أو أنها انتهت.<br>
                            <small style="color:gray;">المعرف المطلوب: ${TASK_ID}</small>
                        </div>`;
                    submissionContainer.innerHTML = '';
                    return;
                }

                TASK_REWARD = task.points_reward || 0;

                // عرض تفاصيل المهمة
                detailsContainer.innerHTML = `
                    <div class="task-header">
                        <h2 class="task-title">${task.title}</h2>
                        <span class="reward-badge">+${TASK_REWARD} BFP</span>
                    </div>
                    <p class="task-description">${task.description || 'لا يوجد وصف تفصيلي للمهمة.'}</p>
                    ${task.task_url ? `
                        <div class="task-url-box">
                            <span style="color: var(--muted-text); font-size: 0.9rem;"><i class="fas fa-link"></i> الرابط المطلوب للعمل:</span>
                            <a href="${task.task_url}" target="_blank" class="url-btn">انقر هنا لفتح الرابط <i class="fas fa-external-link-alt" style="font-size:0.8rem; margin-right:5px;"></i></a>
                        </div>
                    ` : ''}
                `;

                // 2. التحقق من حالة الإثبات المقدم لهذه المهمة
                const { data: submission } = await _supabase
                    .from('task_submissions')
                    .select('*')
                    .eq('task_id', TASK_ID)
                    .eq('user_id', CURRENT_USER_ID)
                    .maybeSingle();

                if (submission) {
                    let statusHtml = '';
                    if (submission.status === 'pending') {
                        statusHtml = `
                            <div class="status-alert pending">
                                <i class="fas fa-clock fa-2x"></i>
                                <div>
                                    <div style="font-size: 1.1rem;">تم إرسال الإثبات وهو قيد المراجعة حالياً</div>
                                    <div style="font-size: 0.85rem; font-weight: normal; margin-top: 4px; color: #aaa;">نص الإثبات المرسل: "${submission.proof_text}"</div>
                                </div>
                            </div>`;
                    } else if (submission.status === 'approved') {
                        statusHtml = `
                            <div class="status-alert approved">
                                <i class="fas fa-check-circle fa-2x"></i>
                                <div>
                                    <div style="font-size: 1.1rem;">تهانينا! تمت الموافقة على المهمة واحتساب المكافأة</div>
                                    <div style="font-size: 0.85rem; font-weight: normal; margin-top: 4px; color: #ccc;">أُضيف لملفك المالي +${TASK_REWARD} BFP.</div>
                                </div>
                            </div>`;
                    } else if (submission.status === 'rejected') {
                        // إعادة إظهار الـ Form بالأسفل ليتمكن من المحاولة ثانية وتحديث الإثبات في حال الرفض
                        statusHtml = `
                            <div class="status-alert rejected" style="margin-bottom:20px;">
                                <i class="fas fa-times-circle fa-2x"></i>
                                <div>
                                    <div style="font-size: 1.1rem;">للأسف، تم رفض طلبك السابق من قِبل المسؤول</div>
                                    <div style="font-size: 0.85rem; font-weight: normal; margin-top: 4px; color: #f5b3b3;">سبب الرفض: "${submission.rejection_reason || 'لم يتم تحديد سبب مخصص'}"</div>
                                </div>
                            </div>
                            ${getFormHtml(submission.proof_text)}`;
                    }
                    submissionContainer.innerHTML = statusHtml;
                } else {
                    // عرض نموذج جديد تماماً إذا لم يسبق للمستخدم الإرسال
                    submissionContainer.innerHTML = getFormHtml();
                }

            } catch (error) {
                console.error("خطأ في جلب بيانات المهمة والاستمارة:", error);
            }
        }

        // دالة مساعدة لإنشاء وعرض الـ Form بطريقة مرنة
        function getFormHtml(previousText = '') {
            return `
                <form id="proofForm" onsubmit="handleSubmitProof(event)" class="submission-form">
                    <h3 class="form-title"><i class="fas fa-paper-plane" style="color:var(--primary-green)"></i> تقديم إثبات تنفيذ المهمة</h3>
                    <div class="form-group">
                        <label for="proofText">اكتب إثبات العمل الجديد هنا بوضوح (اسم حسابك، أو تفاصيل المتابعة):</label>
                        <textarea id="proofText" class="form-control" rows="4" placeholder="اكتب هنا التفاصيل بوضوح لكي يراجعها الأدمن..." required>${previousText}</textarea>
                    </div>
                    <button type="submit" id="btnSubmit" class="submit-btn">
                        <i class="fas fa-check"></i> إرسال المراجعة للأدمن
                    </button>
                </form>
            `;
        }

        async function handleSubmitProof(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            const proofText = document.getElementById('proofText').value.trim();

            if (!proofText) {
                alert("يرجى كتابة نص الإثبات أولاً.");
                return;
            }

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري الإرسال للمسؤول...`;

                // استخدام دالة upsert لتحديث الطلب المرفوض القديم بدلاً من عمل صفوف مكررة
                const { error } = await _supabase
                    .from('task_submissions')
                    .upsert({
                        user_id: CURRENT_USER_ID,
                        task_id: TASK_ID,
                        proof_text: proofText,
                        status: 'pending',
                        rejection_reason: null 
                    }, { onConflict: 'user_id,task_id' });

                if (error) throw error;

                alert("تم إرسال إثباتك للمسؤول بنجاح! سيتم فحص الطلب واحتساب الأرباح قريباً.");
                await loadTaskAndSubmissionStatus();

            } catch (err) {
                console.error("خطأ أثناء إرسال الإثبات:", err);
                alert("حدث خطأ أثناء عملية الإرسال: " + err.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fas fa-check"></i> إرسال المراجعة للأدمن`;
            }
        }
    </script>
</body>
</html>
