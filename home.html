<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-black: #050505;
            --card-black: #0a0a0a;
            --text-white: #f0f0f0;
            --accent: #ffffff;
            --dim-gray: #888888;
            --sidebar-width: 280px;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            display: flex;
            min-height: 100vh;
            visibility: hidden; /* مخفي حتى التحقق من الهوية */
        }

        /* الشريط الجانبي - Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-black);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
        }

        .brand {
            font-family: 'Times New Roman', serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* معلومات المستخدم والرصيد */
        .user-info {
            border-bottom: 1px solid #222;
            padding-bottom: 25px;
            margin-bottom: 25px;
        }

        .username {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
        }

        .balance-box {
            background-color: #111;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .bfp-balance {
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
        }

        .usd-value {
            font-size: 0.85rem;
            color: #00ff00;
            margin-top: 5px;
            display: block;
        }

        /* أزرار القائمة الجانبية */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-white);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .nav-btn:hover {
            background-color: var(--accent);
            color: #000;
        }

        .withdraw-section { margin-top: 15px; }
        .min-withdraw { font-size: 0.7rem; color: var(--dim-gray); display: block; margin-top: 5px; }

        /* المحتوى الرئيسي */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-msg {
            text-align: center;
            max-width: 600px;
        }

        h2 { font-family: 'Times New Roman', serif; font-size: 2.5rem; text-transform: uppercase; }

        .logout-btn {
            margin-top: auto;
            color: #ff4444;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">The Black Flower</div>
        
        <div class="user-info">
            <span class="username" id="display-name">Loading...</span>
            <div class="balance-box">
                <span style="font-size: 0.7rem; color: #888; text-transform: uppercase;">Current Balance</span>
                <span class="bfp-balance"><span id="bfp-val">0</span> BFP</span>
                <span class="usd-value" id="usd-val">$0.00</span>
            </div>
        </div>

        <div class="nav-menu">
            <div class="withdraw-section">
                <button class="nav-btn" onclick="handleWithdraw()">Withdraw Assets</button>
                <span class="min-withdraw">Minimum: 30,000 BFP</span>
            </div>

            <a href="ADcontrolmaneger.html" class="nav-btn">AD Control Manager</a>
            <button class="nav-btn" onclick="alert('Task system is being designed...')">Add Tasks</button>
        </div>

        <div class="logout-btn" onclick="handleLogout()">Secure Logout</div>
    </div>

    <div class="main-content">
        <div class="welcome-msg">
            <h2>Dashboard Active</h2>
            <p style="color: #888; line-height: 1.6;">Your professional art ecosystem and financial assets are fully synchronized. Use the sidebar to manage your earnings.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // حساب القيمة المالية: 15 BFP = 0.00005 USD
        function calculateUSD(bfp) {
            return (bfp / 15) * 0.00005;
        }

        async function loadDashboard() {
            const { data: { session } } = await _supabase.auth.getSession();

            if (!session) {
                window.location.replace("login.html");
                return;
            }

            try {
                // جلب البيانات من جدول blackflowerproart
                const { data: profile, error } = await _supabase
                    .from('blackflowerproart')
                    .select('username, balance')
                    .eq('user_id', session.user.id)
                    .single();

                if (profile) {
                    const balance = profile.balance || 0;
                    document.getElementById('display-name').innerText = profile.username;
                    document.getElementById('bfp-val').innerText = balance.toLocaleString();
                    
                    // تحديث القيمة بالدولار (سنتات)
                    const usdValue = calculateUSD(balance);
                    document.getElementById('usd-val').innerText = `$${usdValue.toFixed(6)}`;
                }

                document.body.style.visibility = "visible";
            } catch (err) {
                console.error(err);
                window.location.replace("login.html");
            }
        }

        function handleWithdraw() {
            const currentBFP = parseInt(document.getElementById('bfp-val').innerText.replace(/,/g, ''));
            if (currentBFP < 30000) {
                alert(`Insufficient Balance. Minimum withdrawal is 30,000 BFP.\nYour current balance is ${currentBFP} BFP.`);
            } else {
                alert("Withdrawal request initiated. Processing...");
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace("login.html");
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
