<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #28a745; --dark-bg: #050505; --sidebar-bg: #111; --card-bg: #1a1a1a; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; order: 2; }
        .user-profile { text-align: center; padding-bottom: 30px; border-bottom: 1px solid #222; margin-bottom: 30px; }
        .user-avatar { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }
        
        .balance-box { background: #000; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); margin-bottom: 20px; }
        .balance-box h3 { margin: 0; font-size: 0.8rem; color: #888; }
        .balance-box .bfp-amount { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }
        .balance-box .usd-amount { font-size: 0.9rem; color: #aaa; }

        .create-ad-btn { background: #fff; color: #000; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; display: block; }
        .nav-links { list-style: none; padding: 0; flex-grow: 1; }
        .nav-links a { color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 8px; }
        .nav-links a.active { background: #222; border-right: 3px solid var(--primary); }

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; order: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .action-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .logout-btn { color: #ff4444; cursor: pointer; text-align: center; padding: 10px; border-top: 1px solid #222; }
    </style>
</head>
