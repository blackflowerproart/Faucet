<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Blackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #28a745; --dark-bg: #050505; --sidebar-bg: #111; --card-bg: #1a1a1a; --text-main: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; order: 2; }
        .user-profile { text-align: center; padding-bottom: 30px; border-bottom: 1px solid #222; margin-bottom: 30px; }
        .user-avatar { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }
        
        .balance-box { background: #000; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); margin-bottom: 20px; }
        .balance-box h3 { margin: 0; font-size: 0.8rem; color: #888; }
        .balance-box .bfp-amount { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }
        .balance-box .usd-amount { font-size: 0.9rem; color: #aaa; }

        .create-ad-btn { background: #fff; color: #000; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 12px; display: block; transition: 0.2s; }
        .create-ad-btn:hover { background: #e6e6e6; }
        
        .create-task-btn { background: var(--primary); color: #fff; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; display: block; transition: 0.2s; }
        .create-task-btn:hover { background: #218838; }

        .nav-links { list-style: none; padding: 0; flex-grow: 1; }
        .nav-links a { color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 8px; }
        .nav-links a.active { background: #222; border-right: 3px solid var(--primary); }

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; order: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .action-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .logout-btn { color: #ff4444; cursor: pointer; text-align: center; padding: 10px; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="user-profile">
            <div class="user-avatar" id="avatar-char">?</div>
            <h3 id="user-display-name">جاري التحميل...</h3>
            <span id="user-display-email" style="font-size: 0.8rem; color: #666;"></span>
        </div>

        <div class="balance-box">
            <h3>رصيدك</h3>
            <span class="bfp-amount" id="bfp-val">0.00</span>
            <span class="usd-amount" id="usd-val">≈ $0.0000</span>
        </div>

        <a href="create-ad.html" class="create-ad-btn"><i class="fas fa-plus-circle"></i> إضافة إعلان جديد</a>
        <a href="create-task.html" class="create-task-btn"><i class="fas fa-tasks"></i> إضافة مهمة جديدة</a>

        <ul class="nav-links">
            <li><a href="home.html" class="active"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="settings.html"><i class="fas fa-user-cog"></i> الإعدادات</a></li>
        </ul>

        <div class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
        </div>
    </aside>

    <main class="main-content">
        <h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px;">📺 الإعلانات المتاحة</h2>
        <div class="grid" id="ads-grid"></div>

        <h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 40px;">🛠️ المهام المتاحة</h2>
        <div class="grid" id="tasks-grid"></div>
    </main>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const CONVERSION_RATE = 0.0005 / 15;

        window.onload = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            document.getElementById('user-display-email').innerText = user.email;

            // 1. جلب بيانات البروفايل للتحقق من اسم المستخدم وعرضه
            const { data: profile } = await _supabase
                .from('profiles')
                .select('username')
                .eq('id', user.id)
                .single();

            if (profile) {
                document.getElementById('user-display-name').innerText = profile.username || "مستخدم";
                document.getElementById('avatar-char').innerText = (profile.username || "U").charAt(0).toUpperCase();
            }

            // 2. جلب الرصيد المحدّث للمستخدم من جدول المحافظ
            const { data: wallet, error: walletError } = await _supabase
                .from('wallets')
                .select('balance')
                .eq('user_id', user.id)
                .single();

            if (wallet) {
                const balance = wallet.balance || 0;
                document.getElementById('bfp-val').innerText = balance.toFixed(2);
                document.getElementById('usd-val').innerText = `≈ $${(balance * CONVERSION_RATE).toFixed(6)}`;
            } else if (walletError) {
                console.error("Wallet Error:", walletError.message);
            }

            // 3. جلب الإعلانات النشطة وعرض المكافآت ديناميكياً
            const { data: ads } = await _supabase.from('ads').select('*');
            const adsGrid = document.getElementById('ads-grid');
            if (ads) {
                adsGrid.innerHTML = ''; 
                ads.forEach(ad => {
                    const currentReward = ad.reward !== undefined ? ad.reward : (ad.reward_amount || 0);
                    
                    adsGrid.innerHTML += `
                        <div class="card">
                            <h3>${ad.title}</h3>
                            <span style="color:var(--primary); font-weight:bold; font-size:1.2rem; margin: 5px 0;">+ ${currentReward} BFP</span>
                            <p style="font-size:0.8rem; color:#888; margin: 5px 0 15px 0;">المدة: ${ad.duration_seconds || ad.duration || 0} ثانية</p>
                            <button class="action-btn" onclick="openAd('${ad.id}', '${ad.link || ad.ad_link}', ${ad.duration_seconds || ad.duration || 10}, ${currentReward})">مشاهدة الإعلان</button>
                        </div>`;
                });
            }

            // 4. جلب المهام وعرضها في شبكة المهام المتاحة وتوجيه المستخدم لصفحة العرض التفاعلية بالتمرير السليم للمعّرف
            const { data: tasks } = await _supabase.from('tasks').select('*');
            const tasksGrid = document.getElementById('tasks-grid');
            if (tasks) {
                tasksGrid.innerHTML = ''; 
                tasks.forEach(task => {
                    tasksGrid.innerHTML += `
                        <div class="card">
                            <h3>${task.title}</h3>
                            <span style="color:var(--primary); font-weight:bold; font-size:1.2rem; margin: 5px 0;">+ ${task.points_reward} BFP</span>
                            <p style="font-size:0.8rem; color:#888; margin: 5px 0 15px 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${task.description || 'مهمة تفاعلية معلقة'}</p>
                            <button class="action-btn" style="background-color: #007bff;" onclick="window.location.href='task-viewer.html?id=${task.id}'">عرض وتنفيذ المهمة</button>
                        </div>`;
                });
            }
        };

        function openAd(id, url, sec, rew) {
            window.location.href = `viewer.html?id=${id}&url=${encodeURIComponent(url)}&sec=${sec}&rew=${rew}`;
        }

        async function logout() { 
            await _supabase.auth.signOut(); 
            window.location.href = 'login.html'; 
        }
    </script>
</body>
</html>
