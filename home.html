<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-black: #050505;
            --card-black: #0a0a0a;
            --text-white: #f0f0f0;
            --accent: #ffffff;
            --dim-gray: #888888;
            --sidebar-width: 280px;
            --danger: #ff4444;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            display: flex;
            min-height: 100vh;
            visibility: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-black);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo-small {
            width: 80px; height: 80px;
            border-radius: 50%; margin: 0 auto 10px;
            display: block; border: 1px solid #333; object-fit: cover;
        }

        .brand {
            font-family: 'Times New Roman', serif;
            font-size: 1.4rem; text-transform: uppercase;
            letter-spacing: 2px; text-align: center; margin: 0;
        }

        .pro-art-sub {
            font-family: Arial, sans-serif; font-size: 0.7rem;
            letter-spacing: 4px; color: var(--dim-gray);
            text-transform: uppercase; text-align: center;
            margin-bottom: 30px; display: block;
        }

        .balance-box {
            background-color: #111; padding: 15px; border-radius: 4px;
            border: 1px solid #333; margin-bottom: 25px;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }

        .nav-btn {
            background: transparent; border: 1px solid #333;
            color: var(--text-white); padding: 12px 15px;
            text-align: left; cursor: pointer; text-transform: uppercase;
            font-size: 0.8rem; transition: 0.3s; width: 100%;
        }

        .nav-btn:hover { background-color: var(--accent); color: #000; }

        .btn-logout { border: 1px solid var(--danger); color: var(--danger); margin-top: 20px; }
        .btn-logout:hover { background-color: var(--danger); color: white; }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 50px;
            width: calc(100% - var(--sidebar-width));
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        /* حاوية الإعلان النشط */
        .ad-container {
            width: 100%; max-width: 728px; height: 90px;
            background: #000; border: 1px dashed #444;
            display: flex; align-items: center; justify-content: center;
            margin: 40px 0; overflow: hidden;
        }

        .ad-link {
            color: var(--accent); text-decoration: none;
            font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; font-size: 14px;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="wight.jpg" alt="Logo" class="logo-small">
        <h1 class="brand">The Black Flower</h1>
        <span class="pro-art-sub">professional art</span>
        
        <div class="balance-box">
            <span id="display-name" style="display:block; margin-bottom:10px; font-weight:bold;">LOADING...</span>
            <span style="font-size: 1.2rem; font-weight: bold;"><span id="bfp-val">0</span> BFP</span>
            <span id="usd-val" style="display:block; color:#00ff00; font-size:0.8rem;">$0.00</span>
        </div>

        <div class="nav-menu">
            <button class="nav-btn" onclick="handleWithdraw()">Withdraw</button>
            <button class="nav-btn" onclick="goToAds()">ADD AD</button>
            <button class="nav-btn" onclick="alert('Coming soon...')">Add Tasks</button>
            <button class="nav-btn btn-logout" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div id="ad-space" class="ad-container">
            <span style="color: #444;">WAITING FOR ADS...</span>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <h2 style="font-family: 'Times New Roman', serif; font-size: 2.5rem; letter-spacing: 3px;">DASHBOARD ACTIVE</h2>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function goToAds() {
            window.location.href = "AdControlManeger.html";
        }

        // دالة جلب الإعلان العالمي من جدول ads
        async function fetchGlobalAd() {
            const adSpace = document.getElementById('ad-space');
            try {
                const { data, error } = await _supabase
                    .from('ads')
                    .select('title, url')
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .single();

                if (data) {
                    adSpace.innerHTML = `
                        <a href="${data.url}" target="_blank" class="ad-link">
                            ${data.title}
                        </a>
                    `;
                } else {
                    adSpace.innerHTML = '<span style="color:#444;">empty</span>';
                }
            } catch (e) {
                adSpace.innerHTML = '<span style="color:#444;">empty</span>';
            }
        }

        async function initDashboard() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace("login.html"); return; }

            const { data: profile } = await _supabase
                .from('blackflowerproart')
                .select('username, balance')
                .eq('user_id', session.user.id)
                .single();

            if (profile) {
                document.getElementById('display-name').innerText = profile.username.toUpperCase();
                document.getElementById('bfp-val').innerText = profile.balance.toLocaleString();
                document.getElementById('usd-val').innerText = `$${((profile.balance / 15) * 0.00005).toFixed(6)}`;
            }

            // تشغيل جلب الإعلانات
            await fetchGlobalAd();
            document.body.style.visibility = "visible";
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace("login.html");
        }

        function handleWithdraw() { alert("Min withdrawal: 30,000 BFP"); }

        window.onload = initDashboard;
    </script>
</body>
</html>
