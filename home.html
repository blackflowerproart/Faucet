<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - The Blackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .balance-card { 
            background: #111; border: 2px solid #28a745; 
            display: inline-block; padding: 20px 40px; border-radius: 15px; 
        }
        .balance-card h1 { color: #28a745; margin: 10px 0; font-size: 3rem; }
        .logout-btn { margin-top: 20px; cursor: pointer; color: #ff4444; }
    </style>
</head>
<body>

    <div class="balance-card">
        <h3>رصيدك الحالي</h3>
        <h1 id="user-balance">0.00</h1>
        <p>BFP</p>
    </div>

    <br><br>
    <div id="user-email">تحميل...</div>
    <div class="logout-btn" onclick="logout()">تسجيل الخروج</div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = async () => {
            // 1. التأكد من تسجيل الدخول
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-email').innerText = user.email;

            // 2. جلب رصيد المستخدم من جدول profiles
            const { data: profile, error } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', user.id)
                .single();

            if (profile) {
                document.getElementById('user-balance').innerText = profile.balance.toFixed(2);
            } else if (error) {
                console.error("خطأ في جلب الرصيد:", error.message);
            }
        };

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
