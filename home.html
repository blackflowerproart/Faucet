<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-black: #050505; --card-black: #0a0a0a; --text-white: #f0f0f0; --accent: #ffffff; --dim-gray: #888888; --sidebar-width: 260px; --success: #00ff00; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-black); color: var(--text-white); display: flex; min-height: 100vh; visibility: hidden; }
        .sidebar { width: var(--sidebar-width); background-color: var(--card-black); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        .logo-small { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px; display: block; border: 1px solid #333; object-fit: cover; }
        .brand { font-family: 'Times New Roman', serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin: 0; }
        .balance-box { background-color: #111; padding: 15px; border: 1px solid #333; margin-bottom: 25px; text-align: center; }
        .nav-btn { background: transparent; border: 1px solid #333; color: var(--text-white); padding: 12px; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; width: 100%; transition: 0.3s; }
        .nav-btn:hover { background-color: var(--accent); color: #000; }
        .main-content { margin-left: var(--sidebar-width); padding: 40px; width: calc(100% - var(--sidebar-width)); box-sizing: border-box; }
        .ad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ad-item { background: var(--card-black); border: 1px solid #222; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .ad-item:hover { border-color: #fff; }
        .reward-val { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="wight.jpg" alt="Logo" class="logo-small">
        <h1 class="brand">The Black Flower</h1>
        <div class="balance-box">
            <span id="user-name" style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 5px;">LOADING...</span>
            <span style="font-size: 1.2rem; font-weight: bold;"><span id="bfp-val">0</span> BFP</span>
        </div>
        <button class="nav-btn" onclick="window.location.href='AdControlManeger.html'">Create Ad</button>
        <button class="nav-btn" style="margin-top: auto; border-color: #ff4444; color: #ff4444;" onclick="handleLogout()">Logout</button>
    </div>

    <div class="main-content">
        <span style="color:var(--dim-gray); text-transform:uppercase; letter-spacing:2px; font-size:0.8rem; border-left:3px solid #fff; padding-left:10px; margin-bottom:20px; display:block;">Available Campaigns</span>
        <div id="ads-list" class="ad-grid"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            _supabase.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    const user = session.user;
                    let { data: profile } = await _supabase.from('blackflowerproart').select('*').eq('user_id', user.id).single();

                    if (!profile) {
                        const name = user.user_metadata.full_name || user.email.split('@')[0];
                        const { data: newProfile } = await _supabase.from('blackflowerproart').insert([{ user_id: user.id, username: name, balance: 0 }]).select().single();
                        profile = newProfile;
                    }

                    document.getElementById('user-name').innerText = profile.username.toUpperCase();
                    document.getElementById('bfp-val').innerText = profile.balance.toLocaleString();
                    document.body.style.visibility = "visible";
                    await loadAds(user.id);
                } else {
                    window.location.replace("login.html");
                }
            });
        }

        async function loadAds(userId) {
            const adsList = document.getElementById('ads-list');
            const now = new Date().toISOString();
            const { data: ads } = await _supabase.from('ads').select('*').gt('expiry_at', now);
            
            if (ads && ads.length > 0) {
                adsList.innerHTML = '';
                ads.forEach(ad => {
                    const item = document.createElement('div');
                    item.className = 'ad-item';
                    item.innerHTML = `<div><b>${ad.title}</b></div><div class="reward-val">VIEW</div>`;
                    adsList.appendChild(item);
                });
            } else {
                adsList.innerHTML = '<div style="color:#444">No ads.</div>';
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace("login.html");
        }

        window.onload = init;
    </script>
</body>
</html>
