<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display | The Black Flower</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; color: #fff; padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .brand-header { text-align: center; margin-bottom: 40px; margin-top: 20px; position: relative; width: 100%; max-width: 600px; }
        
        /* الزر المرتبط بصفحة Adcontrol */
        .btn-admin-link {
            position: absolute;
            top: 0;
            right: 0;
            background: transparent;
            color: #444; 
            border: 1px solid #222;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-admin-link:hover { border-color: #fff; color: #fff; }

        .logo { 
            width: 140px; 
            height: auto; 
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));
        }
        
        .brand-title { 
            font-family: "Times New Roman", Times, serif;
            font-size: 32px; letter-spacing: 5px; text-transform: uppercase; margin: 0; 
        }
        
        .brand-subtitle { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-top: 5px; }
        
        .ads-container { width: 100%; max-width: 600px; display: grid; gap: 20px; }

        .ad-card { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            padding: 25px; 
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .ad-card:hover { border-color: #fff; background: #111; }

        .ad-title { font-size: 18px; margin: 0 0 10px 0; letter-spacing: 1px; font-family: "Times New Roman", serif; }
        .ad-url { color: #444; font-size: 11px; text-decoration: none; word-break: break-all; display: block; }
        
        .btn-watch { 
            width: 100%; padding: 14px; background: #fff; color: #000; 
            border: none; margin-top: 15px; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px;
        }

        .btn-watch:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        
        .timer { font-size: 10px; color: #ff0000; margin-top: 10px; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="brand-header">
        <!-- الربط بصفحة Adcontrol المطلوبة -->
        <a href="Adcontrol" class="btn-admin-link">Admin Panel</a>
        
        <!-- استخدام شعار wight.jpg -->
        <img src="wight.jpg" alt="The Black Flower Logo" class="logo">
        <h1 class="brand-title">The Black Flower</h1>
        <div class="brand-subtitle">Professional Art</div>
    </div>

    <div class="ads-container" id="ads-list">
        <!-- الإعلانات المضافة من لوحة التحكم ستظهر هنا -->
    </div>

    <script>
        const COOL_DOWN = 24 * 60 * 60 * 1000;
        let ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
        let watchHistory = JSON.parse(localStorage.getItem('watchHistory_v2')) || {};

        function renderAds() {
            const list = document.getElementById('ads-list');
            list.innerHTML = "";
            const now = Date.now();

            ads.forEach(ad => {
                const lastView = watchHistory[ad.id] || 0;
                if (now - lastView >= COOL_DOWN) {
                    const card = document.createElement('div');
                    card.className = 'ad-card';
                    card.innerHTML = `
                        <h3 class="ad-title">${ad.title}</h3>
                        <a href="${ad.url}" target="_blank" class="ad-url">${ad.url}</a>
                        <button id="btn-${ad.id}" class="btn-watch" onclick="startWatch('${ad.id}')">View Artwork (20s)</button>
                        <div id="timer-${ad.id}" class="timer"></div>
                    `;
                    list.appendChild(card);
                }
            });

            if (list.innerHTML === "") {
                list.innerHTML = "<p style='text-align:center; color:#333; text-transform:uppercase; font-size:11px;'>No new art displays for now</p>";
            }
        }

        function startWatch(adId) {
            const btn = document.getElementById(`btn-${adId}`);
            const timerDiv = document.getElementById(`timer-${adId}`);
            let seconds = 20;
            btn.disabled = true;

            const countdown = setInterval(() => {
                timerDiv.innerText = `PROCESSING: ${seconds}s`;
                seconds--;
                if (seconds < 0) {
                    clearInterval(countdown);
                    watchHistory[adId] = Date.now();
                    localStorage.setItem('watchHistory_v2', JSON.stringify(watchHistory));
                    alert("Art verification complete!");
                    renderAds();
                }
            }, 1000);
        }

        renderAds();
    </script>
</body>
</html>
