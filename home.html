<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | BlackFlower Pro Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
            --accent-gold: #d4af37; /* لون ذهبي خفيف للفخامة */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر العلوي */
        header {
            width: 100%;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            text-align: center;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* حاوية البيانات الشخصية */
        .user-stats {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .stat-card {
            border: 1px solid #333;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--pure-white); }

        .stat-label {
            font-size: 10px;
            color: var(--light-gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 24px;
            font-family: 'Times New Roman', serif;
            letter-spacing: 1px;
        }

        /* قسم الإعلانات */
        .section-title {
            width: 90%;
            max-width: 1000px;
            text-align: left;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-left: 2px solid var(--pure-white);
            padding-left: 15px;
        }

        .ads-grid {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .ad-item {
            border: 1px solid #222;
            padding: 20px;
            background: #050505;
            transition: 0.3s;
        }

        .ad-item:hover { transform: translateY(-5px); border-color: #444; }

        .no-data {
            grid-column: 1 / -1;
            padding: 50px;
            color: #444;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* زر تسجيل الخروج */
        .btn-logout {
            background: transparent;
            color: var(--light-gray);
            border: 1px solid #333;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-logout:hover { color: red; border-color: red; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">PROCESSING...</div>

    <header>
        <div class="brand-logo">The Black Flower</div>
    </header>

    <div class="user-stats">
        <div class="stat-card">
            <div class="stat-label">Welcome Artist</div>
            <div class="stat-value" id="user-name">---</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Available Balance</div>
            <div class="stat-value" id="user-balance">$0.00</div>
        </div>
    </div>

    <h3 class="section-title">Your Active Ads</h3>
    
    <div class="ads-grid" id="ads-container">
        <!-- الإعلانات ستظهر هنا برمجياً -->
        <div class="no-data">Searching for active campaigns...</div>
    </div>

    <button class="btn-logout" onclick="handleLogout()">Logout Session</button>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function initHome() {
            try {
                // 1. التحقق من المستخدم الحالي
                const { data: { user } } = await _supabase.auth.getUser();

                if (!user) {
                    window.location.href = "index.html"; // ارجعه لصفحة التسجيل إذا لم يسجل
                    return;
                }

                // 2. جلب بيانات المستخدم من الجدول المخصص
                const { data: profile, error: profileError } = await _supabase
                    .from('blackflowerproart')
                    .select('username, balance')
                    .eq('user_id', user.id)
                    .single();

                if (profile) {
                    document.getElementById('user-name').innerText = profile.username.toUpperCase();
                    document.getElementById('user-balance').innerText = `$${profile.balance.toFixed(2)}`;
                }

                // 3. جلب الإعلانات النشطة (افترضنا وجود جدول باسم ads)
                const { data: ads, error: adsError } = await _supabase
                    .from('ads') 
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('status', 'active');

                renderAds(ads);

            } catch (err) {
                console.error("Initialization error:", err);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderAds(ads) {
            const container = document.getElementById('ads-container');
            if (!ads || ads.length === 0) {
                container.innerHTML = '<div class="no-data">No active ads for your account at the moment.</div>';
                return;
            }

            container.innerHTML = ads.map(ad => `
                <div class="ad-item">
                    <div class="stat-label">Campaign ID: #${ad.id.toString().slice(0,5)}</div>
                    <div style="margin: 10px 0; font-weight: bold;">${ad.title || 'Untitled Art'}</div>
                    <div class="stat-label" style="color: var(--accent-gold);">Status: ACTIVE</div>
                </div>
            `).join('');
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = "index.html";
        }

        document.addEventListener('DOMContentLoaded', initHome);
    </script>
</body>
</html>
