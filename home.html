<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-black: #050505; --card-black: #0a0a0a; --text-white: #f0f0f0; --sidebar-width: 260px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-black); color: var(--text-white); display: flex; min-height: 100vh; visibility: hidden; }
        .sidebar { width: var(--sidebar-width); background-color: var(--card-black); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        .main-content { margin-left: var(--sidebar-width); padding: 40px; width: calc(100% - var(--sidebar-width)); }
        .balance-box { background-color: #111; padding: 15px; border: 1px solid #333; text-align: center; margin-top: 20px; }
        .nav-btn { background: transparent; border: 1px solid #333; color: white; padding: 12px; margin-top: 10px; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="wight.jpg" style="width:70px; border-radius:50%; margin: 0 auto; display:block;">
        <h1 style="font-family:serif; font-size:1rem; text-align:center; letter-spacing:2px;">THE BLACK FLOWER</h1>
        <div class="balance-box">
            <span id="user-name" style="font-size:0.7rem; color:#888;">LOADING...</span>
            <div style="font-size:1.2rem;"><span id="bfp-val">0</span> BFP</div>
        </div>
        <button class="nav-btn" style="margin-top:auto; border-color:red; color:red;" onclick="logout()">Logout</button>
    </div>
    <div class="main-content">
        <h2 style="border-left:3px solid #fff; padding-left:10px; font-size:0.9rem; letter-spacing:2px;">DASHBOARD</h2>
        <div id="ads-list" style="margin-top:20px; color:#444;">Checking for available tasks...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            // مراقبة الجلسة (لجوجل والعادي)
            _supabase.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    const user = session.user;
                    let { data: profile } = await _supabase.from('blackflowerproart').select('*').eq('user_id', user.id).single();

                    // إذا كان مستخدم جوجل جديد غير موجود في قاعدة البيانات
                    if (!profile) {
                        const name = user.user_metadata.full_name || user.email.split('@')[0];
                        const { data: newP } = await _supabase.from('blackflowerproart').insert([{ user_id: user.id, username: name, balance: 0 }]).select().single();
                        profile = newP;
                    }

                    document.getElementById('user-name').innerText = profile.username.toUpperCase();
                    document.getElementById('bfp-val').innerText = profile.balance;
                    document.body.style.visibility = "visible";
                } else {
                    window.location.replace("index.html");
                }
            });
        }

        async function logout() { await _supabase.auth.signOut(); window.location.replace("index.html"); }
        window.onload = init;
    </script>
</body>
</html>
