<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #fff; font-family: Arial; margin: 0; padding: 20px; }
        .ad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .ad-card { background: #0f0f0f; border: 1px solid #222; padding: 20px; cursor: pointer; transition: 0.3s; }
        .ad-card:hover { border-color: #fff; }
        .reward { color: #00ff00; font-weight: bold; font-size: 18px; }
        .meta { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Available Ads</h1>
    <div id="ads-list" class="ad-grid">Loading Ads...</div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadAds() {
            const { data: { session } } = await _supabase.auth.getSession();
            const now = new Date().toISOString();
            const oneDayAgo = new Date(Date.now() - 24*60*60*1000).toISOString();

            const { data: ads } = await _supabase.from('ads').select('*').gt('expiry_at', now);
            const { data: views } = await _supabase.from('ad_views').select('ad_id').eq('user_id', session.user.id).gt('viewed_at', oneDayAgo);
            
            const viewedIds = views.map(v => v.ad_id);
            const listEl = document.getElementById('ads-list');
            listEl.innerHTML = '';

            ads.filter(a => !viewedIds.includes(a.id)).forEach(ad => {
                const reward = ad.duration >= 20 ? 15 : 8;
                const div = document.createElement('div');
                div.className = 'ad-card';
                div.onclick = () => {
                    localStorage.setItem('active_ad', JSON.stringify({ id: ad.id, url: ad.url, seconds: ad.duration, reward: reward }));
                    window.location.href = 'viewer.html';
                };
                div.innerHTML = `<div>${ad.title}</div><div class="reward">+${reward} BFP</div><div class="meta">${ad.duration} Seconds</div>`;
                listEl.appendChild(div);
            });
        }
        loadAds();
    </script>
</body>
</html>
