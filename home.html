<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرئيسية - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        .nav { display: flex; justify-content: space-between; background: #111; padding: 15px; border-radius: 10px; }
        .status-box { background: #1a1a1a; padding: 10px; border: 1px solid #28a745; border-radius: 8px; margin-top: 20px; }
        a { color: #28a745; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <span>مرحباً بك في Black Flower</span>
        <a href="settings.html">إعدادات الحساب</a>
    </div>

    <div class="status-box">
        الحالة: <span style="color: #28a745;">● متصل</span> | 
        مدة التواجد في الجلسة: <span id="timer">0 ثانية</span>
    </div>

    <script>
        const _supabase = supabase.createClient('https://qxtubfnbbqnxteoocqrg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU');
        
        let startTime = Date.now();

        async function updatePresence() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                await _supabase.from('user_presence').upsert({ 
                    user_id: user.id, 
                    last_seen: new Date().toISOString(),
                    is_online: true 
                });
            } else {
                window.location.href = "login.html"; // حماية: إذا لم يسجل دخول يطرد
            }
        }

        // تحديث الحالة كل 30 ثانية
        setInterval(updatePresence, 30000);
        updatePresence();

        // تحديث العداد في الشاشة
        setInterval(() => {
            const seconds = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = seconds + " ثانية";
        }, 1000);
    </script>
</body>
</html>
