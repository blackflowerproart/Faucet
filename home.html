<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --accent: #888888;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* إخفاء المحتوى حتى يتم التحقق من المستخدم لمنع الوميض */
            visibility: hidden; 
        }

        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        h1 { font-family: 'Times New Roman', serif; font-size: 2rem; letter-spacing: 2px; }
        p { color: var(--accent); margin-bottom: 30px; }

        .btn-logout {
            padding: 10px 25px;
            background-color: transparent;
            color: white;
            border: 1px solid white;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Your Dashboard</h1>
        <p id="user-email">Loading user profile...</p>
        
        <div style="margin-top: 20px;">
            <p>Your assets and professional art ecosystem are now active.</p>
        </div>

        <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>

    <script>
        // 1. إعدادات Supabase الخاصة بك
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. دالة حماية الصفحة
        async function protectPage() {
            // جلب بيانات الجلسة الحالية
            const { data: { session }, error } = await _supabase.auth.getSession();

            if (error || !session) {
                // إذا لم يوجد مستخدم مسجل، قم بتحويله فوراً لصفحة الدخول
                console.log("Access Denied. Redirecting to login...");
                window.location.replace("login.html");
            } else {
                // إذا كان المستخدم موجوداً، أظهر المحتوى واعرض بريده
                document.body.style.visibility = "visible";
                document.getElementById('user-email').innerText = `Logged in as: ${session.user.email}`;
            }
        }

        // 3. دالة تسجيل الخروج
        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace("login.html");
        }

        // تشغيل الحماية فور تحميل الصفحة
        window.onload = protectPage;
    </script>
</body>
</html>
