<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Premium Ad Viewer</title>
    <style>
        /* Modern Minimalist Black & White Theme */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Inter', 'Segoe UI', sans-serif; 
        }

        /* Top Navigation Bar */
        .header-bar {
            height: 90px;
            background: #000;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            color: #fff;
            z-index: 1000;
            position: relative;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
        }

        .logo-text {
            font-family: "Times New Roman", serif;
            letter-spacing: 4px;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 9px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* User Profile Section */
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            padding: 0 25px;
            height: 50%;
        }

        .user-details {
            text-align: right;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            display: block;
        }

        .user-contact {
            font-size: 11px;
            color: #666;
            display: block;
        }

        .balance-badge {
            background: #fff;
            color: #000;
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 13px;
        }

        /* Controls Section */
        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .timer-circle {
            width: 45px;
            height: 45px;
            border: 1px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-confirm {
            background-color: #fff;
            color: #000;
            border: 1px solid #fff;
            padding: 10px 25px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            background-color: #000;
            color: #fff;
        }

        /* Frames Management */
        .main-container {
            width: 100%;
            height: calc(100% - 90px);
            background: #fff;
            position: relative;
        }

        #targetFrame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            z-index: 2;
        }

        #ptcFrame {
            width: 1px;
            height: 1px;
            position: absolute;
            opacity: 0.01;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-text">THE BLACK FLOWER</div>
            <div class="tagline">Pro Art Visualization</div>
        </div>

        <!-- User Data Display -->
        <div class="user-info">
            <div class="user-details">
                <span class="user-name" id="displayUserName">Mohammad Ramzi</span>
                <span class="user-contact" id="displayUserContact">designer.ramzi@example.com</span>
            </div>
            <div class="balance-badge">
                <span id="bfpBalanceDisplay">0.00</span> BFP
            </div>
        </div>
        
        <!-- Action Controls -->
        <div class="controls">
            <div id="timerBox" class="timer-circle">20</div>
            <button id="confirmBtn" class="btn-confirm" onclick="finalizeTransaction()">Confirm Reward</button>
        </div>
    </div>

    <div class="main-container">
        <!-- Rotate4All Tracking -->
        <iframe id="ptcFrame" src="https://www.rotate4all.com/promote/pmq0c6xfa7wk"></iframe>
        
        <!-- Ad Content -->
        <iframe id="targetFrame" src="about:blank"></iframe>
    </div>

    <script>
        // Configuration
        const REWARD_USD = 0.00005; 
        const REWARD_BFP = 15;      
        
        const params = new URLSearchParams(window.location.search);
        const adId = params.get('id');
        const targetUrl = decodeURIComponent(params.get('url'));

        // Load Initial Data
        window.onload = function() {
            // Display current BFP balance
            const savedBFP = localStorage.getItem('bfp_balance') || "0.00";
            document.getElementById('bfpBalanceDisplay').innerText = savedBFP;

            // Load User Info (Future placeholder logic)
            // document.getElementById('displayUserName').innerText = localStorage.getItem('username') || "Guest User";
        };

        // Load Ad Content
        if (targetUrl && targetUrl !== 'null') {
            document.getElementById('targetFrame').src = targetUrl;
        }

        // Countdown Logic
        let seconds = 20;
        const timerBox = document.getElementById('timerBox');
        const confirmBtn = document.getElementById('confirmBtn');

        const interval = setInterval(() => {
            seconds--;
            timerBox.innerText = seconds;

            if (seconds <= 0) {
                clearInterval(interval);
                timerBox.style.display = 'none';
                confirmBtn.style.display = 'block';
            }
        }, 1000);

        // Transaction Finalization
        function finalizeTransaction() {
            // 1. Update USD Balance
            let currentBalanceUSD = parseFloat(localStorage.getItem('user_balance')) || 0;
            currentBalanceUSD += REWARD_USD;
            localStorage.setItem('user_balance', currentBalanceUSD.toFixed(6));

            // 2. Update BFP Balance
            let currentBalanceBFP = parseFloat(localStorage.getItem('bfp_balance')) || 0;
            currentBalanceBFP += REWARD_BFP;
            localStorage.setItem('bfp_balance', currentBalanceBFP.toFixed(2));

            // 3. Mark as Viewed
            let watchHistory = JSON.parse(localStorage.getItem('watchHistory_v2')) || {};
            watchHistory[adId] = Date.now();
            localStorage.setItem('watchHistory_v2', JSON.stringify(watchHistory));

            alert(`Transaction Complete!\n+ ${REWARD_BFP} BFP earned.`);
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
