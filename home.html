<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #28a745;
            --bg-dark: #000000;
            --sidebar-bg: #111111;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* القائمة الجانبية على اليسار */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-section img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .username { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        .user-email { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; word-break: break-all; }

        .balance-card {
            background: linear-gradient(135deg, #1e7e34, #28a745);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2);
        }
        .balance-card span { font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .balance-card b { font-size: 1.8rem; }

        .edit-profile-box {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .edit-profile-box input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }
        .edit-profile-box button {
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .edit-profile-box button:hover { background: var(--primary-color); }

        /* المحتوى الرئيسي */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header-title {
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .content-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #222;
            min-height: 400px;
        }

        .content-card h2 {
            margin-top: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ستايل الإعلانات داخل الكارد */
        .ad-item {
            background: #1f1f1f;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .ad-item:hover { border-color: var(--primary-color); background: #252525; }
        
        .ad-info b { color: var(--primary-color); display: block; margin-bottom: 4px; }
        .ad-info small { color: var(--text-dim); }

        .btn-view {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ستايل المهام (قيد الإنشاء) */
        .tasks-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 250px;
            color: #444;
            text-align: center;
        }

        .logout-btn {
            margin-top: auto;
            background: none;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #ff4444; color: white; }

    </style>
</head>
<body>

    <!-- القائمة الجانبية (Sidebar) -->
    <div class="sidebar">
        <div class="profile-section">
            <img src="wight.jpg" alt="User Profile" onerror="this.src='https://via.placeholder.com/90'">
            <div class="username" id="display-name">جاري التحميل...</div>
            <div class="user-email" id="display-email">...</div>
            
            <div class="balance-card">
                <span>رصيدك الحالي</span>
                <b id="balance">0.00</b> <small>BFP</small>
            </div>
        </div>

        <div class="edit-profile-box">
            <label style="font-size: 0.8rem; color: #666;">تحديث اسم المستخدم:</label>
            <input type="text" id="new-username" placeholder="اكتب الاسم الجديد">
            <button onclick="updateUserName()">حفظ التغييرات</button>
        </div>

        <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج</button>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="header-title">
            <h1>لوحة التحكم الرئيسية</h1>
            <a href="create-ad.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">+ إضافة إعلان جديد</a>
        </div>

        <div class="sections-grid">
            <!-- قسم مشاهدة الإعلانات -->
            <div class="content-card">
                <h2 style="color: #28a745;">📺 إعلانات متوفرة</h2>
                <div id="ads-list">
                    <p style="color:#555; text-align:center;">جاري البحث عن إعلانات...</p>
                </div>
            </div>

            <!-- قسم المهام -->
            <div class="content-card">
                <h2 style="color: #ffc107;">🛠️ المهام اليومية</h2>
                <div class="tasks-placeholder">
                    <p>قسـم المهام قيد التطوير حالياً<br>انتظرونا في التحديث القادم!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Supabase
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUserId = null;

        window.onload = async function() {
            const { data: { user } } = await _supabase.auth.getUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUserId = user.id;
            fetchUserProfile();
            fetchAds();
        };

        // جلب بيانات البروفايل والرصيد
        async function fetchUserProfile() {
            const { data, error } = await _supabase
                .from('profiles')
                .select('username, email, wallets(balance)')
                .eq('id', currentUserId)
                .single();

            if (data) {
                document.getElementById('display-name').innerText = data.username;
                document.getElementById('display-email').innerText = data.email;
                document.getElementById('balance').innerText = data.wallets ? data.wallets.balance : "0.00";
            }
        }

        // تحديث اسم المستخدم
        async function updateUserName() {
            const newName = document.getElementById('new-username').value;
            if (!newName) return alert("الرجاء إدخال اسم");

            const { error } = await _supabase.rpc('update_username', { 
                user_id: currentUserId, 
                new_name: newName 
            });

            if (error) {
                alert("خطأ أثناء التحديث: " + error.message);
            } else {
                alert("تم تحديث الاسم بنجاح");
                fetchUserProfile();
                document.getElementById('new-username').value = "";
            }
        }

        // جلب الإعلانات من القاعدة
        async function fetchAds() {
            const { data: ads, error } = await _supabase
                .from('ads')
                .select('*')
                .order('created_at', { ascending: false });

            const listContainer = document.getElementById('ads-list');
            listContainer.innerHTML = "";

            if (ads && ads.length > 0) {
                ads.forEach(ad => {
                    listContainer.innerHTML += `
                        <div class="ad-item">
                            <div class="ad-info">
                                <b>${ad.title}</b>
                                <small>${ad.duration_seconds} ثانية | مكافأة ${ad.reward_amount} BFP</small>
                            </div>
                            <button class="btn-view" onclick="openAdViewer('${ad.ad_link}', ${ad.duration_seconds}, ${ad.reward_amount})">مشاهدة</button>
                        </div>
                    `;
                });
            } else {
                listContainer.innerHTML = "<p style='text-align:center; color:#555;'>لا توجد إعلانات نشطة حالياً.</p>";
            }
        }

        // الانتقال لصفحة المشاهدة الجديدة
        function openAdViewer(url, sec, rew) {
            // نمرر البيانات عبر الـ URL لصفحة viewer.html
            window.location.href = `viewer.html?url=${encodeURIComponent(url)}&sec=${sec}&rew=${rew}`;
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
