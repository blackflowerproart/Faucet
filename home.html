<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display | The Black Flower</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; color: #fff; padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .brand-header { text-align: center; margin-bottom: 40px; margin-top: 20px; position: relative; width: 100%; max-width: 600px; }
        
        /* زر Admin Panel */
        .btn-admin-link {
            position: absolute;
            top: 0;
            right: 0;
            background: transparent;
            color: #444; 
            border: 1px solid #222;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-admin-link:hover { border-color: #fff; color: #fff; }

        .logo { width: 140px; height: auto; margin-bottom: 15px; }
        
        .brand-title { 
            font-family: "Times New Roman", Times, serif;
            font-size: 32px; letter-spacing: 5px; text-transform: uppercase; margin: 0; 
        }
        
        .brand-subtitle { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-top: 5px; }
        
        .ads-container { width: 100%; max-width: 600px; display: grid; gap: 20px; }
        .ad-card { background: #0a0a0a; border: 1px solid #222; padding: 25px; border-radius: 2px; }
        .ad-title { font-size: 18px; margin: 0 0 10px 0; font-family: "Times New Roman", serif; }
        .btn-watch { width: 100%; padding: 14px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

    <div class="brand-header">
        <!-- التعديل هنا: استخدام ./ للتأكد من البحث في نفس المجلد -->
        <a href="./AdControlManager.html" class="btn-admin-link">Admin Panel</a>
        
        <img src="wight.jpg" alt="The Black Flower Logo" class="logo">
        <h1 class="brand-title">The Black Flower</h1>
        <div class="brand-subtitle">Professional Art</div>
    </div>

    <div class="ads-container" id="ads-list"></div>

    <script>
        // كود عرض الإعلانات المستمد من النظام
        function renderAds() {
            const list = document.getElementById('ads-list');
            const ads = JSON.parse(localStorage.getItem('ads_v2')) || [];
            list.innerHTML = "";
            
            if (ads.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#333; text-transform:uppercase; font-size:11px;'>No new art displays for now</p>";
                return;
            }

            ads.forEach(ad => {
                const card = document.createElement('div');
                card.className = 'ad-card';
                card.innerHTML = `<h3 class="ad-title">${ad.title}</h3><button class="btn-watch">View Artwork</button>`;
                list.appendChild(card);
            });
        }
        renderAds();
    </script>
</body>
</html>
