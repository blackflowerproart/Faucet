<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - TheBlackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #28a745; --bg: #000; --sidebar: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); padding: 20px; display: flex; flex-direction: column; border-left: 1px solid #222; }
        .balance-card { background: var(--primary); padding: 15px; border-radius: 10px; text-align: center; margin: 20px 0; }
        .nav-btn { background: #1a1a1a; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .nav-btn:hover { border-color: var(--primary); }
        .main { flex-grow: 1; padding: 40px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3 id="display-name">جاري التحميل...</h3>
        <div class="balance-card">الرصيد: <b id="balance">0.00</b> BFP</div>
        
        <!-- الزر الذي يوجه المستخدم حسب نوعه -->
        <div class="nav-btn" onclick="goToCorrectSettings()">⚙️ إعدادات الحساب</div>
    </div>

    <div class="main">
        <h1>مرحباً بك في مشروع Faucet</h1>
    </div>

    <script>
        const _supabase = supabase.createClient('https://qxtubfnbbqnxteoocqrg.supabase.co', 'YOUR_KEY_HERE');

        window.onload = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) window.location.href = 'login.html';

            const { data: profile } = await _supabase.from('profiles').select('username, wallets(balance)').eq('id', user.id).single();
            if (profile) {
                document.getElementById('display-name').innerText = profile.username;
                document.getElementById('balance').innerText = profile.wallets?.balance.toFixed(2) || "0.00";
            }
        };

        async function goToCorrectSettings() {
            const { data: { user } } = await _supabase.auth.getUser();
            // الفحص: إذا كان جيميل يذهب لـ settings، إذا كان يدوي يذهب لـ user_settings
            if (user.app_metadata.provider === 'google') {
                window.location.href = 'settings.html';
            } else {
                window.location.href = 'user_settings.html';
            }
        }
    </script>
</body>
</html>
