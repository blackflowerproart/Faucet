<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-black: #050505;
            --card-black: #0a0a0a;
            --text-white: #f0f0f0;
            --accent: #ffffff;
            --dim-gray: #888888;
            --sidebar-width: 280px;
            --danger: #ff4444;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            display: flex;
            min-height: 100vh;
            visibility: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-black);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
        }

        .logo-small {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: block;
            border: 1px solid #333;
            object-fit: cover;
        }

        .brand {
            font-family: 'Times New Roman', serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin: 0;
        }

        .pro-art-sub {
            font-family: Arial, sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--dim-gray);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
            display: block;
        }

        .balance-box {
            background-color: #111;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #333;
            margin-bottom: 25px;
        }

        .nav-menu { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            flex-grow: 1; /* لجعل القائمة تأخذ المساحة المتاحة */
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-white);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .nav-btn:hover { background-color: var(--accent); color: #000; }

        /* زر تسجيل الخروج المخصص */
        .btn-logout {
            border: 1px solid var(--danger);
            color: var(--danger);
            margin-top: 20px;
        }

        .btn-logout:hover {
            background-color: var(--danger);
            color: white;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ad-container {
            width: 100%;
            max-width: 728px;
            height: 90px;
            background: #000;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            color: var(--dim-gray);
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="wight.jpg" alt="Logo" class="logo-small">
        <h1 class="brand">The Black Flower</h1>
        <span class="pro-art-sub">professional art</span>
        
        <div class="balance-box">
            <span id="display-name" style="display:block; margin-bottom:10px; font-weight:bold;">LOADING...</span>
            <span style="font-size: 1.2rem; font-weight: bold;"><span id="bfp-val">0</span> BFP</span>
            <span id="usd-val" style="display:block; color:#00ff00; font-size:0.8rem;">$0.00</span>
        </div>

        <div class="nav-menu">
            <button class="nav-btn" onclick="handleWithdraw()">Withdraw</button>
           <a href="ADcontrolmaneger.html" class="nav-btn">add AD</a>
            <button class="nav-btn" onclick="alert('Tasks coming soon...')">Add Tasks</button>
            
            <button class="nav-btn btn-logout" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div id="ad-space" class="ad-container">
            empty
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <h2 style="font-family: 'Times New Roman', serif;">DASHBOARD ACTIVE</h2>
            <p style="color: #666; font-family: Arial;">Manage your professional crypto assets and ads from here.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function initDashboard() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace("login.html"); return; }

            try {
                const { data: profile } = await _supabase
                    .from('blackflowerproart')
                    .select('username, balance')
                    .eq('user_id', session.user.id)
                    .single();

                if (profile) {
                    document.getElementById('display-name').innerText = profile.username.toUpperCase();
                    document.getElementById('bfp-val').innerText = profile.balance.toLocaleString();
                    document.getElementById('usd-val').innerText = `$${((profile.balance / 15) * 0.00005).toFixed(6)}`;
                }

                const adSpace = document.getElementById('ad-space');
                if (adSpace.innerHTML.trim() === "" || adSpace.innerHTML.includes("empty")) {
                    adSpace.innerText = "empty";
                }

                document.body.style.visibility = "visible";
            } catch (err) {
                window.location.replace("login.html");
            }
        }

        async function handleLogout() {
            const { error } = await _supabase.auth.signOut();
            if (error) {
                alert("Error logging out");
            } else {
                window.location.replace("login.html");
            }
        }

        function handleWithdraw() {
            alert("Minimum withdrawal is 30,000 BFP.");
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
