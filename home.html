<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .user-info {
            text-align: left;
        }

        .user-name {
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .balance-box {
            margin-top: 50px;
            text-align: center;
            border: 1px solid var(--pure-white);
            padding: 40px;
            width: 300px;
        }

        .balance-label {
            font-size: 10px;
            color: var(--light-gray);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 36px;
            margin: 15px 0;
            font-family: 'Times New Roman', serif;
        }

        .btn-action {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: var(--pure-white);
            color: var(--pure-black);
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-action:hover {
            background-color: #ccc;
        }

        .logout-btn {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 10px;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="loading-screen">LOADING...</div>

<div class="header">
    <div class="user-info">
        <div class="user-name" id="display-username">GUEST</div>
        <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
    </div>
    <div style="letter-spacing: 2px; font-weight: bold;">BLACKFLOWER</div>
</div>

<div class="balance-box">
    <div class="balance-label">Current Balance</div>
    <div class="balance-amount">$<span id="display-balance">0.00</span></div>
    <button class="btn-action" onclick="location.href='add-ads.html'">Add ADS</button>
</div>

<script>
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadUserData() {
        try {
            // 1. التحقق من وجود مستخدم مسجل
            const { data: { user } } = await _supabase.auth.getUser();

            if (!user) {
                window.location.href = "login.html";
                return;
            }

            // 2. جلب بيانات المستخدم من جدول blackflowerproart باستخدام user_id
            const { data, error } = await _supabase
                .from('blackflowerproart')
                .select('username, balance')
                .eq('user_id', user.id)
                .single();

            if (error) throw error;

            if (data) {
                document.getElementById('display-username').innerText = data.username;
                document.getElementById('display-balance').innerText = parseFloat(data.balance).toFixed(2);
            }

        } catch (err) {
            console.error("Error loading data:", err.message);
        } finally {
            document.getElementById('loading-screen').style.display = 'none';
        }
    }

    async function handleLogout() {
        await _supabase.auth.signOut();
        window.location.href = "login.html";
    }

    // تشغيل الدالة عند تحميل الصفحة
    window.onload = loadUserData;
</script>

</body>
</html>
