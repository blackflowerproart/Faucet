<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --accent: #888888;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            visibility: hidden; /* مخفي حتى يتم التأكد من هوية المستخدم */
        }

        .welcome-card {
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            width: 80%;
            max-width: 600px;
        }

        /* تنسيق اسم المستخدم */
        #username-display {
            font-family: Arial, sans-serif;
            color: var(--text-white);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 20px 0;
            display: block;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        .logout-link {
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--accent);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <p style="letter-spacing: 5px; color: #888;">WELCOME BACK</p>
        
        <h1 id="username-display">Loading...</h1>
        
        <div>
            <span class="status-dot"></span>
            <span style="font-size: 0.9rem; font-family: Arial;">Account Verified</span>
        </div>

        <p style="margin-top: 40px; line-height: 1.6;">Your professional art ecosystem is ready.</p>
        
        <div onclick="handleLogout()" class="logout-link">SECURE LOGOUT</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUserData() {
            // 1. التحقق من الجلسة
            const { data: { session } } = await _supabase.auth.getSession();

            if (!session) {
                // إذا لم يسجل دخول، يطرد لصفحة login
                window.location.replace("login.html");
                return;
            }

            const user = session.user;

            try {
                // 2. جلب اسم المستخدم من جدول البيانات blackflowerproart
                const { data: profile, error } = await _supabase
                    .from('blackflowerproart')
                    .select('username')
                    .eq('user_id', user.id)
                    .single();

                if (profile && profile.username) {
                    // عرض الاسم الموجود في قاعدة البيانات
                    document.getElementById('username-display').innerText = profile.username;
                } else {
                    // إذا لم يوجد اسم في الجدول، نعرض الجزء الأول من الإيميل كخيار بديل
                    document.getElementById('username-display').innerText = user.email.split('@')[0];
                }

                // إظهار الصفحة بعد انتهاء التحميل
                document.body.style.visibility = "visible";

            } catch (err) {
                console.error("Error loading profile:", err);
                window.location.replace("login.html");
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace("login.html");
        }

        // تشغيل الوظيفة فور التحميل
        window.onload = loadUserData;
    </script>
</body>
</html>
