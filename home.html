<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - منصة الأرباح والمهام</title>
    <!-- ربط مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- ربط مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #28a745;
            --danger-red: #dc3545;
            --dark-bg: #0b0b0b;
            --card-bg: #141414;
            --hover-bg: #1c1c1c;
            --text-color: #ffffff;
            --muted-text: #888888;
            --sidebar-width: 280px;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            display: flex;
            min-height: 100vh;
        }

        /* ----------------- واجهة المستخدم الجانبية (Sidebar) ----------------- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-left: 1px solid #222;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            bottom: 0;
            right: 0;
            z-index: 100;
        }

        .user-profile {
            text-align: center;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .user-avatar {
            font-size: 3.5rem;
            color: var(--primary-green);
            margin-bottom: 10px;
        }

        .username {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 5px 0;
        }

        /* عرض الرصيد المالي المزدوج */
        .balance-card {
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
        }

        .balance-bfp {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-green);
        }

        .balance-usd {
            font-size: 0.9rem;
            color: var(--muted-text);
            margin-top: 4px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            margin-top: 10px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #181818;
            border: 1px solid #252525;
            color: var(--text-color);
            padding: 14px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: 0.2s;
            position: relative;
        }

        .menu-btn:hover {
            background: var(--hover-bg);
            border-color: #444;
            color: var(--primary-green);
        }

        .menu-btn.logout {
            background: rgba(220, 53, 69, 0.1);
            border-color: rgba(220, 53, 69, 0.2);
            color: var(--danger-red);
            margin-top: auto;
        }

        .menu-btn.logout:hover {
            background: var(--danger-red);
            color: white;
        }

        .sidebar-badge {
            position: absolute;
            left: 15px;
            background: var(--danger-red);
            color: white;
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 10px;
            display: none;
        }

        /* ----------------- المحتوى الأساسي للصفحة ----------------- */
        .main-content {
            margin-right: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
        }

        .section-header {
            font-size: 1.4rem;
            color: #fff;
            margin: 35px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .section-header i {
            color: var(--primary-green);
        }

        /* شبكة عرض العناصر */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* تصميم الكرت الأساسي */
        .item-card {
            background: var(--card-bg);
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: 0.2s;
        }

        .item-card:hover {
            border-color: #383838;
            transform: translateY(-2px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: bold;
            margin: 0;
            color: #eee;
        }

        .reward-badge {
            background: rgba(40, 167, 69, 0.1);
            color: var(--primary-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--muted-text);
            margin: 0;
            line-height: 1.4;
        }

        .action-link {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: auto;
            transition: 0.2s;
        }

        .action-link:hover {
            background: var(--primary-green);
            border-color: var(--primary-green);
        }

        /* تأثير الحجب والمربع الشفاف الأسود مع الصح الأخضر */
        .completed-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 10;
            color: var(--primary-green);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .completed-overlay i {
            font-size: 2.2rem;
            background: rgba(40, 167, 69, 0.15);
            padding: 12px;
            border-radius: 50%;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .loading-text {
            color: var(--muted-text);
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; border-left: none; border-bottom: 1px solid #222; }
            .main-content { margin-right: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- ================= واجهة المستخدم الجانبية ================= -->
    <div class="sidebar">
        <div>
            <div class="user-profile">
                <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                <div id="user-display-name" class="username">جاري التحميل...</div>
                
                <!-- عرض الرصيد المحدث بسعر الصرف الجديد -->
                <div class="balance-card">
                    <div id="user-balance-bfp" class="balance-bfp">0.00 BFP</div>
                    <div id="user-balance-usd" class="balance-usd">=$0.00 دولار</div>
                </div>
            </div>

            <div class="sidebar-menu">
                <a href="create-task.html" class="menu-btn">
                    <i class="fas fa-tasks"></i> إضافة مهمة جديدة
                </a>
                <a href="create-ad.html" class="menu-btn">
                    <i class="fas fa-bullhorn"></i> إضافة إعلان جديد
                </a>
                <a href="messages.html" class="menu-btn">
                    <i class="fas fa-envelope"></i> البريد والرسائل الإلكترونية
                    <span id="msg-badge" class="sidebar-badge">0</span>
                </a>
            </div>
        </div>

        <a href="#" class="menu-btn logout" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
        </a>
    </div>

    <!-- ================= المحتوى الرئيسي الأساسي ================= -->
    <div class="main-content">
        
        <!-- قسم الإعلانات النشطة المربوطة بـ viewer.html -->
        <div class="section-header">
            <i class="fas fa-play-circle"></i> الإعلانات المتوفرة (المشاهدة المتاحة)
        </div>
        <div id="ads-container" class="items-grid">
            <div class="loading-text">جاري تحميل الإعلانات...</div>
        </div>

        <!-- قسم المهام النشطة -->
        <div class="section-header">
            <i class="fas fa-clipboard-list"></i> المهام المتاحة للعمل
        </div>
        <div id="tasks-container" class="items-grid">
            <div class="loading-text">جاري تحميل المهام المتاحة...</div>
        </div>

    </div>

    <script>
        // إعدادات الاتصال بـ Supabase
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let CURRENT_USER_ID = null;
        
        // تعديل: سعر الـ BFP الواحد يساوي 0.50 دولار (نصف دولار)
        const BFP_TO_USD_RATE = 0.50; 

        window.onload = async () => {
            await initSession();
        };

        async function initSession() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user) {
                    CURRENT_USER_ID = user.id;
                    document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                } else {
                    CURRENT_USER_ID = "test-user-id";
                    document.getElementById('user-display-name').innerText = "مستخدم تجريبي";
                }

                await Promise.all([
                    fetchWalletData(),
                    fetchUnreadMessagesCount(),
                    loadAds(),
                    loadTasks()
                ]);

            } catch (err) {
                console.error("خطأ أثناء تهيئة البيانات:", err);
            }
        }

        // جلب رصيد المحفظة واحتساب قيمته بالدولار بناءً على التحديث الجديد مع دعم الكسور الصغيرة
        async function fetchWalletData() {
            try {
                const { data: wallet, error } = await _supabase
                    .from('wallets')
                    .select('balance')
                    .eq('user_id', CURRENT_USER_ID)
                    .maybeSingle();

                if (wallet) {
                    const bfpBalance = wallet.balance || 0;
                    const usdBalance = (bfpBalance * BFP_TO_USD_RATE).toFixed(4); // زيادة دقة الكسور للدولار بسبب القيم الصغيرة

                    // عرض الرصيد بشكل مناسب للأرقام العشرية الصغرى
                    document.getElementById('user-balance-bfp').innerText = `${bfpBalance} BFP`;
                    document.getElementById('user-balance-usd').innerText = `=$${usdBalance} دولار`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchUnreadMessagesCount() {
            try {
                const { data, error } = await _supabase
                    .from('user_messages')
                    .select('id')
                    .eq('user_id', CURRENT_USER_ID)
                    .eq('is_read', false);

                const badge = document.getElementById('msg-badge');
                if (data && data.length > 0) {
                    badge.innerText = data.length;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            } catch (err) { console.error(err); }
        }

        // جلب الإعلانات وتوجيهها لصفحة viewer.html مع التحقق من الحظر لمدة 24 ساعة
        async function loadAds() {
            const container = document.getElementById('ads-container');
            try {
                // جلب الإعلانات النشطة
                const { data: ads } = await _supabase.from('ads').select('*');
                
                // ✨ التعديل الجديد: جلب سجلات المشاهدات الفعليّة من جدول ads_views للمستخدم الحالي
                const { data: watched } = await _supabase
                    .from('ads_views')
                    .select('ad_id, created_at')
                    .eq('user_id', CURRENT_USER_ID);

                if (!ads || ads.length === 0) {
                    container.innerHTML = `<div class="loading-text">لا توجد إعلانات متوفرة حالياً.</div>`;
                    return;
                }

                container.innerHTML = '';
                ads.forEach(ad => {
                    // البحث عن آخر مشاهدة لهذا الإعلان بالتحديد
                    const watchRecords = watched?.filter(w => w.ad_id === ad.id);
                    let isLocked = false;

                    if (watchRecords && watchRecords.length > 0) {
                        // جلب تاريخ أحدث مشاهدة للإعلان
                        const latestWatch = watchRecords.reduce((latest, current) => {
                            return new Date(current.created_at) > new Date(latest.created_at) ? current : latest;
                        });

                        const watchedTime = new Date(latestWatch.created_at).getTime();
                        const currentTime = new Date().getTime();
                        const hoursPassed = (currentTime - watchedTime) / (1000 * 60 * 60);
                        
                        // ✨ إذا لم يمر 24 ساعة يتم تفعيل الحظر
                        if (hoursPassed < 24) {
                            isLocked = true; 
                        }
                    }

                    // عرض الإعلان مع المكافأة المخصصة والمحددة له بجانبه بدقة واحتساب طبقة الحظر الشفافة السوداء
                    container.innerHTML += `
                        <div class="item-card">
                            ${isLocked ? `
                            <div class="completed-overlay">
                                <i class="fas fa-check-circle"></i>
                                <span>تمت المشاهدة (مغلق 24 ساعة)</span>
                            </div>` : ''}
                            <div class="card-top">
                                <h4 class="card-title">${ad.title}</h4>
                                <!-- ✨ تعديل: عرض سعر المكافأة المخزن في جدول ads مباشرة بجانب الاسم -->
                                <span class="reward-badge">+${ad.reward || 0.001} BFP</span>
                            </div>
                            <p class="card-desc">${ad.description || 'شاهد هذا الإعلان الترويجي السريع لكسب النقاط مجاناً.'}</p>
                            <a href="${isLocked ? '#' : `viewer.html?id=${ad.id}`}" class="action-link" ${isLocked ? 'style="pointer-events: none; opacity: 0.4;"' : ''}>
                                <i class="fas fa-eye"></i> بدء المشاهدة
                            </a>
                        </div>
                    `;
                });
            } catch (err) { 
                console.error(err);
                container.innerHTML = 'حدث خطأ أثناء تحميل الإعلانات.'; 
            }
        }

        async function loadTasks() {
            const container = document.getElementById('tasks-container');
            try {
                const { data: tasks } = await _supabase.from('tasks').select('*');
                const { data: submissions } = await _supabase
                    .from('task_submissions')
                    .select('task_id, status')
                    .eq('user_id', CURRENT_USER_ID);

                if (!tasks || tasks.length === 0) {
                    container.innerHTML = `<div class="loading-text">لا توجد مهام متاحة حالياً.</div>`;
                    return;
                }

                container.innerHTML = '';
                tasks.forEach(task => {
                    const hasSubmitted = submissions?.some(s => s.task_id === task.id);

                    container.innerHTML += `
                        <div class="item-card">
                            ${hasSubmitted ? `
                            <div class="completed-overlay">
                                <i class="fas fa-check-circle"></i>
                                <span>🔒 تم الإنجاز بنجاح</span>
                            </div>` : ''}
                            <div class="card-top">
                                <h4 class="card-title">${task.title}</h4>
                                <span class="reward-badge">+${task.points_reward} BFP</span>
                            </div>
                            <p class="card-desc">${task.description || 'نفذ الشروط المطلوبة للمهمة وقدم الإثبات الصحيح لتنال المكافأة.'}</p>
                            <a href="${hasSubmitted ? '#' : `task-details.html?id=${task.id}`}" class="action-link" ${hasSubmitted ? 'style="pointer-events: none; opacity: 0.4;"' : ''}>
                                <i class="fas fa-external-link-alt"></i> تفاصيل المهمة
                            </a>
                        </div>
                    `;
                });
            } catch (err) { container.innerHTML = 'حدث خطأ أثناء تحميل المهام.'; }
        }

        async function handleLogout() {
            if (confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) {
                await _supabase.auth.signOut();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
