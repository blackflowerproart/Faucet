<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Member Home</title>
    <style>
        /* Black & White Professional Theme */
        body, html { 
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif; 
        }

        /* Top Navigation Bar */
        .header-bar {
            height: 90px;
            background: #000;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-section { display: flex; flex-direction: column; }
        .logo-text { font-family: "Times New Roman", serif; letter-spacing: 4px; font-size: 20px; font-weight: 700; text-transform: uppercase; }
        .tagline { font-size: 9px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

        /* User Dashboard Info */
        .user-stats {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .stat-item { text-align: right; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 14px; font-weight: 600; color: #fff; }

        .balance-card {
            background: #fff;
            color: #000;
            padding: 8px 18px;
            border-radius: 2px;
            text-align: center;
        }
        .balance-value { font-size: 18px; font-weight: 900; }
        .balance-unit { font-size: 10px; font-weight: bold; margin-left: 4px; }

        /* Main Content */
        .content-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 24px;
            font-family: "Times New Roman", serif;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Ads Grid */
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .ad-card {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .ad-card:hover {
            border-color: #fff;
            background: #111;
        }

        .ad-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #fff; }
        .ad-reward { color: #888; font-size: 12px; margin-bottom: 20px; display: block; }

        .btn-view {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: 1px solid #444;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-view:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .footer {
            margin-top: 100px;
            padding: 40px;
            text-align: center;
            border-top: 1px solid #111;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <div class="logo-section">
            <div class="logo-text">THE BLACK FLOWER</div>
            <div class="tagline">Pro Art Visualization</div>
        </div>

        <div class="user-stats">
            <div class="stat-item">
                <span class="stat-label">User ID</span>
                <span class="stat-value" id="userName">Mohammad Ramzi</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Network</span>
                <span class="stat-value">BFP Chain</span>
            </div>
            <div class="balance-card">
                <span class="stat-label" style="color: #666;">Current Balance</span>
                <span class="balance-value" id="bfpBalance">0.00</span>
                <span class="balance-unit">BFP</span>
            </div>
        </div>
    </header>

    <main class="content-container">
        <h2 class="section-title">Available Ads</h2>
        
        <div class="ads-grid" id="adsContainer">
            <!-- Ads will be loaded here dynamically -->
        </div>
    </main>

    <footer class="footer">
        © 2026 THE BLACK FLOWER PRO ART | DESIGNED BY MOHAMMAD RAMZI
    </footer>

    <script>
        // Load User Data on Page Load
        window.onload = function() {
            const savedBFP = localStorage.getItem('bfp_balance') || "0.00";
            document.getElementById('bfpBalance').innerText = savedBFP;
            loadAds();
        };

        function loadAds() {
            // This would typically come from your database
            const ads = [
                { id: "ad1", title: "Modern 3D Visualization", url: "https://example.com/1", reward: "15 BFP" },
                { id: "ad2", title: "AutoCAD Project Showcase", url: "https://example.com/2", reward: "15 BFP" },
                { id: "ad3", title: "Interior Design Concepts", url: "https://example.com/3", reward: "15 BFP" }
            ];

            const container = document.getElementById('adsContainer');
            container.innerHTML = '';

            ads.forEach(ad => {
                const card = document.createElement('div');
                card.className = 'ad-card';
                card.innerHTML = `
                    <div class="ad-title">${ad.title}</div>
                    <span class="ad-reward">Reward: ${ad.reward}</span>
                    <button class="btn-view" onclick="openAd('${ad.id}', '${encodeURIComponent(ad.url)}')">Watch Now</button>
                `;
                container.appendChild(card);
            });
        }

        function openAd(id, url) {
            // Navigate to the viewer page with parameters
            window.location.href = `viewer.html?id=${id}&url=${url}`;
        }
    </script>
</body>
</html>
