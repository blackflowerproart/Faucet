<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - Blackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #28a745;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Navigation */
        nav {
            background: #111;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 1.4rem; color: var(--primary); }

        /* Hero Section / Balance */
        .dashboard-header {
            padding: 40px 5%;
            text-align: center;
            background: linear-gradient(180deg, #111 0%, var(--dark-bg) 100%);
        }

        .balance-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            min-width: 280px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-card h2 { margin: 0; font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; }
        .balance-card .amount { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 10px 0; }

        /* Tabs System */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 0 5%;
        }

        .tab-btn {
            background: #1a1a1a;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active { background: var(--primary); }

        /* Grid Layout for Ads/Tasks */
        .content-section { display: none; padding: 0 5%; animation: fadeIn 0.5s; }
        .content-section.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .item-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .item-card h3 { margin-top: 0; font-size: 1.1rem; }
        .item-card .reward { color: var(--primary); font-weight: bold; display: block; margin-bottom: 15px; }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Settings Form */
        .settings-form { max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 15px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-dim); }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="logo">BFP ART</div>
    <div id="user-nav">
        <span id="nav-email" style="font-size: 0.8rem; margin-left: 15px;"></span>
        <button onclick="logout()" style="background: none; border: 1px solid #444; color: #ff4444; padding: 5px 12px; border-radius: 5px; cursor: pointer;">خروج</button>
    </div>
</nav>

<section class="dashboard-header">
    <div class="balance-card">
        <h2>إجمالي الرصيد</h2>
        <div class="amount" id="balance-val">0.00</div>
        <div style="color: var(--text-dim)">BFP Token</div>
    </div>
</section>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('ads', this)"><i class="fas fa-mouse-pointer"></i> إعلانات</button>
    <button class="tab-btn" onclick="showTab('tasks', this)"><i class="fas fa-tasks"></i> مهام</button>
    <button class="tab-btn" onclick="showTab('settings', this)"><i class="fas fa-cog"></i> إعدادات</button>
</div>

<!-- قسم الإعلانات -->
<section id="ads" class="content-section active">
    <div class="grid" id="ads-grid">
        <!-- يتم جلب الإعلانات برمجياً هنا -->
        <p>جاري تحميل الإعلانات...</p>
    </div>
</section>

<!-- قسم المهام -->
<section id="tasks" class="content-section">
    <div class="grid" id="tasks-grid">
        <div class="item-card">
            <h3>متابعة صفحتنا على فيسبوك</h3>
            <span class="reward">+ 5.00 BFP</span>
            <button class="action-btn">تنفيذ المهمة</button>
        </div>
    </div>
</section>

<!-- قسم الإعدادات -->
<section id="settings" class="content-section">
    <div class="settings-form">
        <h3>إعدادات الحساب</h3>
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="text" id="set-email" disabled>
        </div>
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="set-name" placeholder="أدخل اسمك">
        </div>
        <button class="action-btn" onclick="updateProfile()">حفظ التغييرات</button>
    </div>
</section>

<script>
    const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;

    window.onload = async () => {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return; }
        
        currentUser = user;
        document.getElementById('nav-email').innerText = user.email;
        document.getElementById('set-email').value = user.email;

        loadProfile();
        loadAds();
    };

    async function loadProfile() {
        const { data, error } = await _supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (data) {
            document.getElementById('balance-val').innerText = data.balance.toFixed(2);
            document.getElementById('set-name').value = data.full_name || '';
        }
    }

    async function loadAds() {
        const { data: ads, error } = await _supabase.from('ads').select('*');
        const grid = document.getElementById('ads-grid');
        grid.innerHTML = '';

        if (ads) {
            ads.forEach(ad => {
                grid.innerHTML += `
                    <div class="item-card">
                        <h3>${ad.title}</h3>
                        <span class="reward">+ ${ad.reward} BFP</span>
                        <p style="font-size: 0.8rem; color: #888;">مدة المشاهدة: ${ad.duration} ثانية</p>
                        <button class="action-btn" onclick="watchAd('${ad.id}', '${ad.url}', ${ad.duration}, ${ad.reward})">مشاهدة الآن</button>
                    </div>
                `;
            });
        }
    }

    function watchAd(id, url, sec, rew) {
        // التوجه لصفحة المشاهدة مع تمرير البيانات عبر الرابط
        window.location.href = `viewer.html?id=${id}&url=${encodeURIComponent(url)}&sec=${sec}&rew=${rew}`;
    }

    async function updateProfile() {
        const newName = document.getElementById('set-name').value;
        const { error } = await _supabase.from('profiles').update({ full_name: newName }).eq('id', currentUser.id);
        if (!error) alert('تم تحديث البيانات بنجاح');
    }

    function showTab(tabId, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    async function logout() {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
