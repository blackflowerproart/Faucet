<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* شريط علوي احترافي */
        .top-bar {
            width: 100%;
            padding: 15px 25px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .user-info { display: flex; flex-direction: column; align-items: flex-start; }
        .user-info span { font-size: 0.85rem; color: #888; margin-bottom: 5px; }

        .balance-box {
            background: linear-gradient(45deg, #28a745, #1e7e34);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .nav-buttons { display: flex; gap: 10px; align-items: center; }

        .create-ad-btn {
            background: #fff;
            color: #000;
            padding: 10px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        /* قائمة الإعلانات */
        .ads-container {
            width: 95%;
            max-width: 700px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }

        .ad-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .ad-card h3 { margin: 0 0 5px 0; font-size: 1.2rem; color: #28a745; }
        .ad-card p { margin: 0; color: #aaa; font-size: 0.9rem; }

        .view-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .view-btn:hover { background: #218838; transform: scale(1.05); }

        /* نافذة المشاهدة */
        #video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #timer-display { font-size: 4rem; color: #28a745; margin-bottom: 10px; font-weight: bold; }
        iframe { width: 90%; height: 70%; border: 1px solid #333; border-radius: 10px; background: #000; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <span id="user-display">جاري التحميل...</span>
            <div class="balance-box"><span id="balance">0</span> BFP</div>
        </div>
        <div class="nav-buttons">
            <a href="create-ad.html" class="create-ad-btn">📢 أنشئ إعلان</a>
            <button onclick="handleLogout()" style="background:none; border:1px solid #444; color:#fff; cursor:pointer; padding:8px; border-radius:8px;">خروج</button>
        </div>
    </div>

    <div class="ads-container" id="ads-list">
        <p style="text-align: center; color: #555;">جاري البحث عن إعلانات...</p>
    </div>

    <!-- نافذة المشاهدة -->
    <div id="video-overlay">
        <div id="timer-display">0</div>
        <p style="color: #888; margin-bottom: 15px;">انتظر حتى انتهاء العداد للحصول على المكافأة</p>
        <iframe id="ad-frame" src=""></iframe>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUserId = null;

        // تشغيل الوظائف عند التحميل
        window.onload = async function() {
            const { data: { user } } = await _supabase.auth.getUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUserId = user.id;
            console.log("Logged in user ID:", currentUserId);
            
            loadUserData();
            loadAds();
        };

        // جلب بيانات المستخدم
        async function loadUserData() {
            const { data, error } = await _supabase
                .from('profiles')
                .select('username, wallets(balance)')
                .eq('id', currentUserId)
                .single();

            if (data) {
                document.getElementById('user-display').innerText = "مرحباً: " + data.username;
                document.getElementById('balance').innerText = data.wallets.balance;
            }
        }

        // جلب الإعلانات (محدثة لضمان الظهور)
        async function loadAds() {
            console.log("Attempting to fetch ads...");
            
            // جلب الإعلانات بدون شرط التاريخ مؤقتاً للتأكد من أنها تظهر
            const { data: ads, error } = await _supabase
                .from('ads')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Supabase Error:", error.message);
                document.getElementById('ads-list').innerHTML = `<p style="color:red">خطأ: ${error.message}</p>`;
                return;
            }

            console.log("Ads retrieved from DB:", ads);

            const list = document.getElementById('ads-list');
            list.innerHTML = "";

            if (ads && ads.length > 0) {
                ads.forEach(ad => {
                    list.innerHTML += `
                        <div class="ad-card">
                            <div class="ad-info">
                                <h3>${ad.title}</h3>
                                <p>المدة: ${ad.duration_seconds} ثانية | المكافأة: <b style="color:#28a745">${ad.reward_amount} BFP</b></p>
                            </div>
                            <button class="view-btn" onclick="startWatching('${ad.ad_link}', ${ad.duration_seconds}, ${ad.reward_amount})">مشاهدة</button>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = "<p style='text-align:center; color:#555;'>لا توجد إعلانات منشورة حتى الآن.</p>";
            }
        }

        // نظام المشاهدة والمكافأة
        function startWatching(url, seconds, reward) {
            const overlay = document.getElementById('video-overlay');
            const timerText = document.getElementById('timer-display');
            const frame = document.getElementById('ad-frame');
            
            overlay.style.display = 'flex';
            frame.src = url;
            let timeLeft = seconds;
            timerText.innerText = timeLeft;

            const countdown = setInterval(async () => {
                timeLeft--;
                timerText.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    overlay.style.display = 'none';
                    frame.src = ""; // تنظيف الإطار
                    await addReward(reward);
                }
            }, 1000);
        }

        async function addReward(amount) {
            const { error } = await _supabase.rpc('increment_balance', { 
                user_id: currentUserId, 
                amount: amount 
            });

            if (error) {
                alert("خطأ في المكافأة: " + error.message);
            } else {
                alert(`أحسنت! أضيف لبرصيدك ${amount} BFP`);
                loadUserData(); // تحديث الرصيد فوراً
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
