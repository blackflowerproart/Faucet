<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب - The Blackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #28a745;
            --bg-dark: #000000;
            --card-bg: #111111;
            --text-main: #ffffff;
            --border-color: #222;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .settings-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section img {
            width: 70px; height: 70px;
            border-radius: 12px; border: 2px solid var(--primary-color);
            margin-bottom: 10px;
        }
        h2 { margin: 0; color: var(--primary-color); font-size: 1.5rem; }

        .setting-box {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
        }

        h3 { margin-top: 0; font-size: 1rem; color: var(--primary-color); border-bottom: 1px solid #222; padding-bottom: 10px; }

        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #888; }

        input {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid #333; background: #151515; color: white;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-color); }

        .action-btn {
            width: 100%; padding: 12px;
            background: var(--primary-color); color: white;
            border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        .action-btn:hover { background: #218838; }

        .footer-links { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .footer-links a { color: #555; text-decoration: none; display: block; margin-bottom: 10px; }
        .footer-links a:hover { color: var(--primary-color); }
        
        .back-link { font-weight: bold; color: var(--primary-color) !important; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="settings-container">
        <div class="logo-section">
            <img src="wight.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/70'">
            <h2>إعدادات الحساب</h2>
        </div>

        <!-- القسم الأول: تغيير الاسم -->
        <div class="setting-box">
            <h3>👤 تغيير اسم المستخدم</h3>
            <div class="input-group">
                <label>الاسم الجديد:</label>
                <input type="text" id="new-username" placeholder="أدخل الاسم الجديد">
            </div>
            <button class="action-btn" onclick="updateNameOnly()">تحديث الاسم</button>
        </div>

        <!-- القسم الثاني: تغيير كلمة المرور -->
        <div class="setting-box">
            <h3>🔐 تغيير كلمة المرور</h3>
            <div class="input-group">
                <label>كلمة المرور الجديدة:</label>
                <input type="password" id="new-password" placeholder="أدخل كلمة المرور الجديدة">
            </div>
            <button class="action-btn" onclick="updatePasswordOnly()" style="background: #333;">تحديث كلمة المرور</button>
        </div>

        <div class="footer-links">
            <a href="#" onclick="forgotPassword()">هل نسيت كلمة المرور؟</a>
            <a href="home.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // وظيفة تحديث الاسم فقط
        async function updateNameOnly() {
            const newName = document.getElementById('new-username').value;
            if (!newName) return alert("الرجاء إدخال الاسم أولاً");

            const { data: { user } } = await _supabase.auth.getUser();
            
            const { error } = await _supabase.rpc('update_username', { 
                user_id: user.id, 
                new_name: newName 
            });

            if (error) {
                alert("خطأ أثناء تحديث الاسم: " + error.message);
            } else {
                alert("تم تحديث اسم المستخدم بنجاح!");
                document.getElementById('new-username').value = "";
            }
        }

        // وظيفة تحديث كلمة المرور فقط
        async function updatePasswordOnly() {
            const newPass = document.getElementById('new-password').value;
            
            if (!newPass || newPass.length < 6) {
                return alert("الرجاء إدخال كلمة مرور قوية (6 أحرف على الأقل)");
            }

            const { error } = await _supabase.auth.updateUser({ password: newPass });

            if (error) {
                alert("خطأ أثناء تحديث كلمة المرور: " + error.message);
            } else {
                alert("تم تحديث كلمة المرور بنجاح!");
                document.getElementById('new-password').value = "";
            }
        }

        // استعادة كلمة المرور
        async function forgotPassword() {
            const { data: { user } } = await _supabase.auth.getUser();
            const email = user ? user.email : prompt("أدخل بريدك الإلكتروني:");
            
            if (email) {
                const { error } = await _supabase.auth.resetPasswordForEmail(email);
                if (error) alert("خطأ: " + error.message);
                else alert("تم إرسال رابط الاستعادة إلى بريدك الإلكتروني.");
            }
        }
    </script>
</body>
</html>
