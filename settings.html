<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات Google</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #4285F4; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Color_Icon.svg" width="50">
        <h2>حساب متصل بـ Google</h2>
        <p style="color:#888;">يتم إدارة أمان هذا الحساب وكلمة المرور عبر إعدادات Google مباشرة.</p>
        <a href="home.html" style="color:#4285F4; text-decoration:none; font-weight:bold;">العودة للرئيسية</a>
    </div>

    <script>
        const _supabase = supabase.createClient('https://qxtubfnbbqnxteoocqrg.supabase.co', 'YOUR_KEY_HERE');
        
        window.onload = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            // حماية إضافية: إذا دخل مستخدم يدوي لهذه الصفحة بالخطأ، يتم تحويله للرئيسية
            if (user && user.app_metadata.provider !== 'google') {
                window.location.href = 'home.html';
            }
        };
    </script>
</body>
</html>
