<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #1a1a1a; color: #fff; border: 1px solid #444; }
        .btn { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #msg { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div id="step1">
            <h2>تعديل البيانات</h2>
            <input type="text" id="new_name" placeholder="الاسم الجديد">
            <button class="btn" onclick="handleSave()">حفظ وإرسال الرمز</button>
        </div>

        <div id="step2" class="hidden">
            <h2>تأكيد الرمز</h2>
            <input type="text" id="otp_code" placeholder="أدخل الرمز">
            <button class="btn" style="background: #28a745; color: #fff;" onclick="handleVerify()">تأكيد نهائي</button>
        </div>
        <div id="msg"></div>
    </div>

    <script>
        const config = {
            url: 'https://qxtubfnbbqnxteoocqrg.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU',
            resend: 're_ChvyWsPX_MRNrxw6YYGbqgREPfaZB9pL4'
        };
        const _supabase = supabase.createClient(config.url, config.key);

        async function handleSave() {
            const name = document.getElementById('new_name').value;
            const { data: { user }, error: authError } = await _supabase.auth.getUser();

            if (authError || !user) {
                document.getElementById('msg').innerHTML = "<span style='color:red'>خطأ: سجل دخولك أولاً!</span>";
                return;
            }

            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            
            // حفظ في الانتظار
            await _supabase.from('pending_updates').insert([{ user_id: user.id, payload: { full_name: name }, otp_code: otp }]);

            // إرسال الإيميل
            await fetch('https://api.resend.com/emails', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${config.resend}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    from: 'TheBlackflower <onboarding@resend.dev>',
                    to: user.email,
                    subject: 'رمز التحقق',
                    html: `رمزك هو: ${otp}`
                })
            });

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        async function handleVerify() {
            const otp = document.getElementById('otp_code').value;
            const { data: { user } } = await _supabase.auth.getUser();

            const { data, error } = await _supabase.rpc('verify_and_update_settings', {
                input_user_id: user.id,
                input_otp: otp
            });

            if (data?.success) {
                alert("تم التحديث!");
                window.location.href = "home.html";
            } else {
                alert("الرمز خطأ");
            }
        }

        // التتبع (Presence) في صفحة الإعدادات أيضاً
        setInterval(async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if(user) await _supabase.from('user_presence').upsert({ user_id: user.id, last_seen: new Date().toISOString() });
        }, 30000);
    </script>
</body>
</html>
