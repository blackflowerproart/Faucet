<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب | TheBlackflower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #000000; --accent: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: var(--primary); text-align: center; font-weight: 800; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input { width: 100%; padding: 0.8rem; border: 2px solid #f1f5f9; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--accent); }
        button { width: 100%; padding: 0.9rem; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: transform 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #94a3b8; }
        .hidden { display: none; }
        .status { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <!-- المرحلة الأولى -->
    <div id="settings-stage">
        <h2>تعديل البيانات</h2>
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="full_name" placeholder="الاسم الجديد">
        </div>
        <div class="form-group">
            <label>بيانات إضافية (JSON)</label>
            <input type="text" id="extra_info" placeholder="مثلاً: المسمى الوظيفي">
        </div>
        <button id="btn-save" onclick="handleSave()">إرسال رمز التأكيد</button>
    </div>

    <!-- المرحلة الثانية -->
    <div id="otp-stage" class="hidden">
        <h2>تأكيد الرمز</h2>
        <p style="text-align: center; color: #64748b; font-size: 0.85rem;">أدخل الرمز المكون من 6 أرقام المرسل لبريدك</p>
        <div class="form-group">
            <input type="text" id="otp_input" maxlength="6" style="text-align: center; letter-spacing: 0.5rem; font-size: 1.5rem;">
        </div>
        <button id="btn-verify" onclick="handleVerify()">تحديث قاعدة البيانات</button>
    </div>

    <div id="status-msg" class="status"></div>
</div>

<script>
    // --- إعدادات الاتصال ---
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // استبدله برابط مشروعك
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // استبدله بمفتاح مشروعك
    const RESEND_API_KEY = 're_ChvyWsPX_MRNrxw6YYGbqgREPfaZB9pL4'; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleSave() {
        const name = document.getElementById('full_name').value;
        const info = document.getElementById('extra_info').value;
        const btn = document.getElementById('btn-save');
        const msg = document.getElementById('status-msg');

        if(!name) return alert("يرجى إدخال الاسم");

        btn.disabled = true;
        msg.innerText = "جاري الحفظ وإرسال الرمز...";

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) throw new Error("يجب تسجيل الدخول أولاً");

            const otp = Math.floor(100000 + Math.random() * 900000).toString();

            // 1. الحفظ في جدول الانتظار
            const { error: dbError } = await _supabase
                .from('pending_updates')
                .insert([{ 
                    user_id: user.id, 
                    payload: { full_name: name, info: info }, 
                    otp_code: otp 
                }]);

            if (dbError) throw dbError;

            // 2. إرسال الإيميل عبر Resend
            const emailRes = await fetch('https://api.resend.com/emails', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${RESEND_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    from: 'TheBlackflower <onboarding@resend.dev>',
                    to: user.email,
                    subject: 'تأكيد تعديل إعدادات الحساب',
                    html: `رمز التأكيد الخاص بك هو: <strong>${otp}</strong>. هذا الرمز صالح لمدة 12 ساعة.`
                })
            });

            if (!emailRes.ok) throw new Error("فشل إرسال البريد الإلكتروني");

            document.getElementById('settings-stage').classList.add('hidden');
            document.getElementById('otp-stage').classList.remove('hidden');
            msg.innerText = "تم إرسال الرمز بنجاح";
            msg.style.color = "#10b981";

        } catch (err) {
            msg.innerText = err.message;
            msg.style.color = "#ef4444";
            btn.disabled = false;
        }
    }

    async function handleVerify() {
        const otpVal = document.getElementById('otp_input').value;
        const btn = document.getElementById('btn-verify');
        const msg = document.getElementById('status-msg');

        btn.disabled = true;
        msg.innerText = "جاري التحديث النهائي...";

        try {
            const { data: { user } } = await _supabase.auth.getUser();

            const { data, error } = await _supabase.rpc('verify_and_update_settings', {
                input_user_id: user.id,
                input_otp: otpVal
            });

            if (data?.success) {
                msg.innerText = "تم تحديث البيانات بنجاح في قاعدة البيانات!";
                msg.style.color = "#10b981";
                setTimeout(() => location.reload(), 3000);
            } else {
                throw new Error(data?.message || "فشل التحقق");
            }
        } catch (err) {
            msg.innerText = err.message;
            msg.style.color = "#ef4444";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
