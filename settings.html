<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: #111; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
        }
        h2 { color: #28a745; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #1a1a1a; 
            color: #fff; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #28a745; }
        .btn { 
            width: 100%; 
            padding: 12px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }
        .btn:hover { background: #e6e6e6; }
        .btn-verify { background: #28a745; color: #fff; }
        .hidden { display: none; }
        .status { margin-top: 15px; font-size: 0.9rem; min-height: 20px; }
        .error { color: #ff4444; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <!-- المرحلة 1: إدخال البيانات -->
    <div id="stage-input">
        <h2>إعدادات الحساب</h2>
        <input type="text" id="new_name" placeholder="الاسم الجديد">
        <button class="btn" id="btn-save" onclick="handleInitialSave()">حفظ وإرسال الرمز</button>
    </div>

    <!-- المرحلة 2: تأكيد الرمز -->
    <div id="stage-otp" class="hidden">
        <h2>تأكيد الرمز</h2>
        <p style="color: #888; font-size: 0.8rem;">أدخل الرمز المكون من 6 أرقام المرسل لبريدك</p>
        <input type="text" id="otp_input" maxlength="6" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
        <button class="btn btn-verify" id="btn-confirm" onclick="handleVerify()">تأكيد التحديث</button>
    </div>

    <div id="status-msg" class="status"></div>
</div>

<script>
    // 1. إعدادات الربط (ببيانات مشروعك الحقيقية)
    const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
    const resendApiKey = 're_ChvyWsPX_MRNrxw6YYGbqgREPfaZB9pL4';

    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. وظيفة الحفظ وإرسال الرمز
    async function handleInitialSave() {
        const nameInput = document.getElementById('new_name').value;
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('btn-save');

        if (!nameInput) {
            msg.className = "status error";
            msg.innerText = "يرجى إدخال الاسم أولاً";
            return;
        }

        // --- الفحص الحرج لهوية المستخدم ---
        const { data: { user }, error: authError } = await _supabase.auth.getUser();

        if (authError || !user) {
            msg.className = "status error";
            msg.innerText = "خطأ: يجب تسجيل الدخول أولاً (غير مصرح)";
            console.error("User not logged in");
            return;
        }

        btn.disabled = true;
        msg.className = "status";
        msg.innerText = "جاري الحفظ وإرسال الرمز...";

        try {
            const otp = Math.floor(100000 + Math.random() * 900000).toString();

            // أ- حفظ في جدول الانتظار
            const { error: dbError } = await _supabase
                .from('pending_updates')
                .insert([{ 
                    user_id: user.id, 
                    payload: { full_name: nameInput }, 
                    otp_code: otp 
                }]);

            if (dbError) throw dbError;

            // ب- إرسال البريد عبر Resend
            const emailRes = await fetch('https://api.resend.com/emails', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${resendApiKey}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    from: 'TheBlackflower <onboarding@resend.dev>',
                    to: user.email,
                    subject: 'رمز تأكيد التعديل',
                    html: `رمز التحقق الخاص بك هو: <strong>${otp}</strong>`
                })
            });

            if (!emailRes.ok) throw new Error("فشل إرسال الإيميل");

            // نجاح العملية الأولى
            document.getElementById('stage-input').classList.add('hidden');
            document.getElementById('stage-otp').classList.remove('hidden');
            msg.innerText = "";

        } catch (err) {
            msg.className = "status error";
            msg.innerText = "حدث خطأ: " + err.message;
            btn.disabled = false;
        }
    }

    // 3. وظيفة التحقق النهائي (RPC)
    async function handleVerify() {
        const otpVal = document.getElementById('otp_input').value;
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('btn-confirm');

        btn.disabled = true;
        msg.innerText = "جاري التحقق...";

        try {
            const { data: { user } } = await _supabase.auth.getUser();

            const { data, error } = await _supabase.rpc('verify_and_update_settings', {
                input_user_id: user.id,
                input_otp: otpVal
            });

            if (data && data.success) {
                msg.className = "status success";
                msg.innerText = "تم تحديث البيانات بنجاح!";
                setTimeout(() => location.reload(), 2000);
            } else {
                msg.className = "status error";
                msg.innerText = data ? data.message : "الرمز غير صحيح";
                btn.disabled = false;
            }
        } catch (err) {
            msg.className = "status error";
            msg.innerText = "خطأ تقني: " + err.message;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
