<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب | TheBlackflower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .hidden { display: none; }
        .message { margin-top: 1rem; font-size: 0.85rem; text-align: center; }
        .otp-box { text-align: center; }
        .otp-box input { letter-spacing: 0.5rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <!-- المرحلة الأولى: نموذج الإعدادات -->
    <div id="settings-stage">
        <h2>إعدادات الصفحة</h2>
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="full_name" placeholder="أدخل اسمك الجديد">
        </div>
        <div class="form-group">
            <label>اللغة المفضلة</label>
            <input type="text" id="language" placeholder="مثلاً: العربية">
        </div>
        <button id="btn-save" onclick="handleSave()">حفظ التغييرات</button>
    </div>

    <!-- المرحلة الثانية: تأكيد الرمز -->
    <div id="otp-stage" class="hidden">
        <h2>تأكيد الهوية</h2>
        <p style="font-size: 0.8rem; text-align: center;">أدخل الرمز المرسل لبريدك الإلكتروني (صالح لـ 12 ساعة)</p>
        <div class="form-group otp-box">
            <input type="text" id="otp_input" maxlength="6" placeholder="000000">
        </div>
        <button id="btn-verify" onclick="handleVerify()">تأكيد الرمز</button>
        <p style="text-align: center; margin-top: 10px;">
            <a href="#" onclick="location.reload()" style="font-size: 0.8rem; color: #64748b;">إلغاء</a>
        </p>
    </div>

    <div id="status-msg" class="message"></div>
</div>

<script>
    // --- إعدادات Supabase و Resend ---
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const RESEND_API_KEY = 're_YOUR_RESEND_KEY'; // تأكد من حماية هذا المفتاح في الإنتاج

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- الوظائف ---

    async function handleSave() {
        const fullName = document.getElementById('full_name').value;
        const lang = document.getElementById('language').value;
        const btn = document.getElementById('btn-save');
        const msg = document.getElementById('status-msg');

        if (!fullName || !lang) return alert("يرجى ملء الحقول");

        btn.disabled = true;
        msg.innerText = "جاري إرسال رمز التأكيد...";

        try {
            const { data: { user } } = await supabase.auth.getUser();
            const otp = Math.floor(100000 + Math.random() * 900000).toString();

            // 1. الحفظ في جدول الانتظار
            const { error: dbError } = await supabase
                .from('pending_updates')
                .insert([{ 
                    user_id: user.id, 
                    payload: { full_name: fullName, language: lang }, 
                    otp_code: otp 
                }]);

            if (dbError) throw dbError;

            // 2. إرسال الإيميل عبر Resend API
            const emailRes = await fetch('https://api.resend.com/emails', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${RESEND_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    from: 'TheBlackflower <onboarding@resend.dev>',
                    to: user.email,
                    subject: 'رمز الأمان لتحديث الإعدادات',
                    html: `<p>رمز التأكيد الخاص بك هو: <b>${otp}</b></p>`
                })
            });

            if (!emailRes.ok) throw new Error("فشل إرسال البريد");

            // انتقل لمرحلة الرمز
            document.getElementById('settings-stage').classList.add('hidden');
            document.getElementById('otp-stage').classList.remove('hidden');
            msg.innerText = "";

        } catch (err) {
            msg.innerText = "خطأ: " + err.message;
            btn.disabled = false;
        }
    }

    async function handleVerify() {
        const otpInput = document.getElementById('otp_input').value;
        const btn = document.getElementById('btn-verify');
        const msg = document.getElementById('status-msg');

        btn.disabled = true;
        msg.innerText = "جاري التحقق من الرمز...";

        try {
            const { data: { user } } = await supabase.auth.getUser();

            // استدعاء الدالة RPC التي أنشأناها في SQL
            const { data, error } = await supabase.rpc('verify_and_update_settings', {
                input_user_id: user.id,
                input_otp: otpInput
            });

            if (data.success) {
                msg.style.color = "green";
                msg.innerText = "تم التحديث بنجاح! سيتم إعادة تحميل الصفحة...";
                setTimeout(() => location.reload(), 2000);
            } else {
                msg.style.color = "red";
                msg.innerText = data.message;
                btn.disabled = false;
            }
        } catch (err) {
            msg.innerText = "خطأ في الاتصال بقاعدة البيانات";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
