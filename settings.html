<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب - The Blackflower Pro Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #28a745;
            --bg-dark: #0b0b0b;
            --card-bg: #161616;
            --text-main: #ffffff;
            --input-bg: #222;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .settings-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--primary-color); text-align: center; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary-color); }

        .btn-save {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--primary-color); }

        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <h2>⚙️ إعدادات الحساب</h2>
        
        <!-- قسم تحديث الاسم -->
        <div class="input-group">
            <label>اسم المستخدم الجديد</label>
            <input type="text" id="new-username" placeholder="أدخل الاسم الجديد...">
            <button class="btn-save" onclick="updateUsername()">تحديث الاسم</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 25px 0;">

        <!-- قسم تحديث كلمة المرور -->
        <div class="input-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="new-password" placeholder="********">
            <button class="btn-save" style="background-color: #444;" onclick="updatePassword()">تغيير كلمة المرور</button>
        </div>

        <div id="status-msg" class="status-msg"></div>

        <a href="home.html" class="back-link">⬅️ العودة للوحة التحكم</a>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // تحديث اسم المستخدم
        async function updateUsername() {
            const newName = document.getElementById('new-username').value;
            const status = document.getElementById('status-msg');

            if (!newName) {
                showStatus("يرجى إدخال اسم أولاً", "orange");
                return;
            }

            const { data: { user } } = await _supabase.auth.getUser();

            const { error } = await _supabase
                .from('profiles')
                .update({ username: newName })
                .eq('id', user.id);

            if (error) {
                showStatus("خطأ في التحديث: " + error.message, "red");
            } else {
                showStatus("✅ تم تحديث الاسم بنجاح! \n Success! Your username has been updated.", "var(--primary-color)");
            }
        }

        // تحديث كلمة المرور
        async function updatePassword() {
            const newPass = document.getElementById('new-password').value;

            if (newPass.length < 6) {
                showStatus("كلمة المرور يجب أن تكون 6 أحرف على الأقل", "orange");
                return;
            }

            const { error } = await _supabase.auth.updateUser({ password: newPass });

            if (error) {
                showStatus("خطأ: " + error.message, "red");
            } else {
                showStatus("✅ تم تغيير كلمة المرور بنجاح! \n Security Alert: Password Updated.", "var(--primary-color)");
            }
        }

        function showStatus(msg, color) {
            const status = document.getElementById('status-msg');
            status.style.display = "block";
            status.innerText = msg;
            status.style.color = color;
        }
    </script>
</body>
</html>
