<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء إعلان - BFP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 35px; border-radius: 20px; border: 1px solid #333; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: #28a745; }
        .price-tag { background: #28a745; color: #fff; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 1.3rem; font-weight: bold; }
        .promo-section { border-top: 1px dashed #333; margin-top: 20px; padding-top: 10px; }
        button { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        button:hover { background: #e6e6e6; }
        .free-badge { color: #ffc107; font-size: 0.9rem; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>إنشاء حملة إعلانية</h1>
    <div class="container">
        <input type="text" id="ad-title" placeholder="عنوان الإعلان (مثلاً: موقع الربح الصادق)">
        <input type="url" id="ad-link" placeholder="رابط الإعلان (https://...)">
        
        <label>نوع الإعلان:</label>
        <select id="ad-type" onchange="calculateTotal()">
            <option value="10">10 ثوانٍ (50 BFP / يوم)</option>
            <option value="20">20 ثانية (100 BFP / يوم)</option>
        </select>

        <label>مدة العرض:</label>
        <select id="ad-duration" onchange="calculateTotal()">
            <option value="1">يوم واحد</option>
            <option value="7">أسبوع (7 أيام)</option>
            <option value="30">شهر (30 يوم)</option>
        </select>

        <div class="promo-section">
            <input type="text" id="promo-code" placeholder="هل لديك برومو كود؟" oninput="calculateTotal()">
            <div id="free-msg" class="free-badge">✨ الكود صحيح! الإعلان مجاني تماماً ✨</div>
        </div>

        <div class="price-tag">التكلفة الإجمالية: <span id="total-price">50</span> BFP</div>
        <button id="create-btn" onclick="submitAd()">تأكيد ونشر الإعلان</button>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let isFree = false;

        function calculateTotal() {
            const type = document.getElementById('ad-type').value;
            const days = document.getElementById('ad-duration').value;
            const promo = document.getElementById('promo-code').value.trim();
            const freeMsg = document.getElementById('free-msg');
            const priceSpan = document.getElementById('total-price');

            let total = (type == "10" ? 50 : 100) * days;

            if (promo === "123456") {
                total = 0;
                isFree = true;
                freeMsg.style.display = "block";
                priceSpan.style.textDecoration = "line-through";
                priceSpan.style.color = "#ccc";
            } else {
                isFree = false;
                freeMsg.style.display = "none";
                priceSpan.style.textDecoration = "none";
                priceSpan.style.color = "#fff";
            }
            
            priceSpan.innerText = total;
        }

        async function submitAd() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("يرجى تسجيل الدخول أولاً");

            const title = document.getElementById('ad-title').value;
            const link = document.getElementById('ad-link').value;
            const dur = document.getElementById('ad-type').value;
            const days = document.getElementById('ad-duration').value;
            const cost = isFree ? 0 : ((dur == "10" ? 50 : 100) * days);
            const reward = (dur == "10" ? 8 : 15);

            if(!title || !link) return alert("يرجى ملء جميع الخانات");

            // استدعاء دالة SQL التي خصمنا بها الرصيد سابقاً
            // إذا كان الكود مجاني (cost = 0) لن يخصم شيئاً من الرصيد
            const { error } = await _supabase.rpc('create_ad_and_deduct', {
                user_id: user.id,
                ad_title: title,
                ad_url: link,
                dur: parseInt(dur),
                reward: reward,
                cost: cost,
                days: parseInt(days)
            });

            if (error) {
                alert("فشل في إنشاء الإعلان: " + error.message);
            } else {
                alert("تم بنجاح! إعلانك الآن قيد العرض.");
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
