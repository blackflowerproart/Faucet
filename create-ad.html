<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حملة إعلانية - BlackFlower ProArt</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #28a745;
            --danger-red: #dc3545;
            --dark-bg: #0b0b0b;
            --card-bg: #141414;
            --input-bg: #1c1c1c;
            --border-color: #252525;
            --text-color: #ffffff;
            --muted-text: #888888;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header i {
            font-size: 3rem;
            color: var(--primary-green);
            margin-bottom: 10px;
        }

        .form-header h2 {
            margin: 5px 0;
            font-size: 1.6rem;
        }

        .form-header p {
            color: var(--muted-text);
            font-size: 0.9rem;
            margin: 5px 0 0 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.95rem;
            font-weight: bold;
            color: #ddd;
        }

        .form-group input, .form-group textarea, .form-group select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--primary-green);
            background: #222;
        }

        .info-note {
            font-size: 0.85rem;
            color: #ffc107;
            margin-top: 2px;
        }

        .promo-success {
            font-size: 0.85rem;
            color: var(--primary-green);
            margin-top: 2px;
            display: none;
        }

        .summary-card {
            background: rgba(40, 167, 69, 0.05);
            border: 1px dashed rgba(40, 167, 69, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .summary-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-green);
        }

        .discount-applied {
            color: var(--danger-red);
            font-size: 0.9rem;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .btn-submit {
            background: var(--primary-green);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #218838;
        }

        .btn-submit:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--muted-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-bullhorn"></i>
            <h2>إنشاء حملة إعلانية جديدة</h2>
            <p>سيتم ربط الإعلان ببيانات جدولك الحقيقي وخصم القيمة الصافية</p>
        </div>

        <form id="ad-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="title"><i class="fas fa-heading"></i> عنوان الإعلان</label>
                <input type="text" id="title" placeholder="مثال: اشترك في قناتنا واربح" required>
            </div>

            <div class="form-group">
                <label for="description"><i class="fas fa-align-left"></i> الوصف التفصيلي</label>
                <textarea id="description" rows="3" placeholder="اكتب هنا تفاصيل مختصرة للمشاهدين..." required></textarea>
            </div>

            <div class="form-group">
                <label for="url"><i class="fas fa-link"></i> رابط الإعلان المستهدف</label>
                <input type="url" id="url" placeholder="https://example.com/your-page" required>
            </div>

            <div class="form-group">
                <label for="duration"><i class="fas fa-hourglass-half"></i> مدة المشاهدة المطلوبة</label>
                <select id="duration" required onchange="handleDurationChange()">
                    <option value="10" selected>10 ثوانٍ (التكلفة: 0.5 BFP / يومياً)</option>
                    <option value="20">20 ثانية (التكلفة: 1 BFP / يومياً)</option>
                </select>
                <div id="reward-info" class="info-note">💡 مكافأة المشاهد لهذا الخيار: 0.001 BFP لكل مشاهدة.</div>
            </div>

            <div class="form-group">
                <label for="campaign_days"><i class="fas fa-calendar-alt"></i> عدد أيام تشغيل الإعلان</label>
                <input type="number" id="campaign_days" min="1" value="1" required oninput="calculateTotalCost()">
            </div>

            <div class="form-group">
                <label for="promocode"><i class="fas fa-percentage"></i> هل لديك بروموكود (كود خصم)؟</label>
                <input type="text" id="promocode" placeholder="أدخل كود الخصم إن وجد هنا" oninput="calculateTotalCost()">
                <div id="promo-msg" class="promo-success"><i class="fas fa-check"></i> تم تفعيل البروموكود بنجاح! الحملة مجانية تماماً (خصم 100%).</div>
            </div>

            <div class="summary-card">
                <div class="summary-row">
                    <span><i class="fas fa-calculator"></i> التكلفة الإجمالية المقدرة:</span>
                    <div>
                        <span id="original-cost-display" class="discount-applied" style="display:none;"></span>
                        <span id="total-cost-display" class="summary-value">0.50 BFP</span>
                    </div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-submit">
                <i class="fas fa-plus-circle"></i> نشر الحملة ودفع التكلفة
            </button>
        </form>

        <a href="home.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة إلى الصفحة الرئيسية</a>
    </div>

    <script>
        // إعدادات الاتصال بـ Supabase
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let CURRENT_USER_ID = null;
        const SECRET_PROMOCODE = "9861003993"; // البروموكود المعتمد الخاص بك

        window.onload = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                CURRENT_USER_ID = user.id;
            } else {
                // ✨ تحديث: استخدام الـ UUID الحقيقي الظاهر في جدول محفظتك لتخطي خطأ الصياغة
                CURRENT_USER_ID = "8ee744a5-28ad-49e7-8175-c87f8a515f29"; 
            }
            handleDurationChange();
        };

        // تحديث الملاحظات عند تغيير مدة الإعلان
        function handleDurationChange() {
            const duration = document.getElementById('duration').value;
            const rewardInfo = document.getElementById('reward-info');
            
            if (duration === "10") {
                rewardInfo.innerText = "💡 مكافأة المشاهد لهذا الخيار: 0.001 BFP لكل مشاهدة.";
            } else if (duration === "20") {
                rewardInfo.innerText = "💡 مكافأة المشاهد لهذا الخيار: 0.005 BFP لكل مشاهدة.";
            }
            calculateTotalCost();
        }

        // دالة الحساب التلقائي للتكلفة والبروموكود
        function calculateTotalCost() {
            const duration = document.getElementById('duration').value;
            const days = parseInt(document.getElementById('campaign_days').value) || 1;
            const promoInput = document.getElementById('promocode').value.trim();
            const promoMsg = document.getElementById('promo-msg');
            const originalCostDisplay = document.getElementById('original-cost-display');

            let costPerDay = (duration === "10") ? 0.5 : 1.0;
            let totalCost = costPerDay * days;

            // التحقق من البروموكود وتطبيق خصم 100%
            if (promoInput === SECRET_PROMOCODE) {
                promoMsg.style.display = 'block';
                originalCostDisplay.style.display = 'inline';
                originalCostDisplay.innerText = `${totalCost.toFixed(2)} BFP`;
                
                totalCost = 0; 
            } else {
                promoMsg.style.display = 'none';
                originalCostDisplay.style.display = 'none';
            }
            
            document.getElementById('total-cost-display').innerText = `${totalCost.toFixed(3)} BFP`;
            return totalCost;
        }

        // إرسال البيانات وحفظها في قاعدة البيانات
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري معالجة الطلب ونشر إعلانك...`;

            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const url = document.getElementById('url').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            const reward = (duration === 10) ? 0.001 : 0.005;
            const total_cost = calculateTotalCost();
            const total_views = 99999; 

            try {
                // استدعاء دالة الـ RPC المحدثة المتوافقة مع أسماء الأعمدة الحالية
                const { data, error } = await _supabase.rpc('create_ad_and_deduct', {
                    p_user_id: CURRENT_USER_ID,
                    p_title: title,
                    p_description: description,      
                    p_url: url,
                    p_reward: reward,          
                    p_duration: duration,      
                    p_total_views: total_views,
                    p_total_cost: total_cost    
                });

                if (error) throw error;

                alert("🎉 مبروك! تم إنشاء الحملة الإعلانية بنجاح ونشرها في جدول الإعلانات الحقيقي!");
                window.location.href = "home.html";

            } catch (err) {
                console.error("تفاصيل الخطأ المستلم:", err);
                alert("فشل في إنشاء الإعلان: " + (err.message || err));
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-plus-circle"></i> نشر الحملة ودفع التكلفة`;
            }
        }
    </script>
</body>
</html>
