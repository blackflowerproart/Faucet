<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة إعلان جديد - BlackFlower ProArt</title>
    <!-- ربط مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- ربط مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #28a745;
            --danger-red: #dc3545;
            --dark-bg: #0b0b0b;
            --card-bg: #141414;
            --input-bg: #1c1c1c;
            --border-color: #252525;
            --text-color: #ffffff;
            --muted-text: #888888;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header i {
            font-size: 3rem;
            color: var(--primary-green);
            margin-bottom: 10px;
        }

        .form-header h2 {
            margin: 5px 0;
            font-size: 1.6rem;
        }

        .form-header p {
            color: var(--muted-text);
            font-size: 0.9rem;
            margin: 5px 0 0 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.95rem;
            font-weight: bold;
            color: #ddd;
        }

        .form-group input, .form-group textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-green);
            background: #222;
        }

        /* حقل استعراض التكلفة التلقائية */
        .summary-card {
            background: rgba(40, 167, 69, 0.05);
            border: 1px dashed rgba(40, 167, 69, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-label {
            font-size: 0.95rem;
            font-weight: bold;
        }

        .summary-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-green);
        }

        .btn-submit {
            background: var(--primary-green);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #218838;
        }

        .btn-submit:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--muted-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-bullhorn"></i>
            <h2>إنشاء حملة إعلانية جديدة</h2>
            <p>سيتم خصم التكلفة الإجمالية من محفظتك فوراً ونشر الإعلان للمستخدمين</p>
        </div>

        <form id="ad-form" onsubmit="handleSubmit(event)">
            <!-- عنوان الإعلان -->
            <div class="form-group">
                <label for="title"><i class="fas fa-heading"></i> عنوان الإعلان</label>
                <input type="text" id="title" placeholder="مثال: اشترك في قناتنا واربح" required>
            </div>

            <!-- الوصف المختصر -->
            <div class="form-group">
                <label for="description"><i class="fas fa-align-left"></i> الوصف التفصيلي</label>
                <textarea id="description" rows="3" placeholder="اكتب هنا تفاصيل واضحة ومختصرة حول العرض المتوفر في الرابط..." required></textarea>
            </div>

            <!-- رابط التوجيه (URL) -->
            <div class="form-group">
                <label for="url"><i class="fas fa-link"></i> رابط الإعلان المستهدف</label>
                <input type="url" id="url" placeholder="https://example.com/your-video-or-page" required>
            </div>

            <!-- مدة المشاهدة بالثواني -->
            <div class="form-group">
                <label for="duration"><i class="fas fa-hourglass-half"></i> مدة المشاهدة المطلوبة (بالثواني)</label>
                <input type="number" id="duration" min="5" value="15" required oninput="calculateTotalCost()">
            </div>

            <!-- مكافأة المشاهد الواحد (تقبل أرقام عشرية بدقة) -->
            <div class="form-group">
                <label for="reward"><i class="fas fa-coins"></i> مكافأة المشاهدة للشخص الواحد (BFP)</label>
                <!-- ✨ تم تغيير الحقل هنا ليقبل أي كسور عشرية عبر وضع step="any" -->
                <input type="number" id="reward" step="any" min="0.0001" placeholder="مثال: 0.001" required oninput="calculateTotalCost()">
            </div>

            <!-- عدد المشاهدات المطلوبة الإجمالي -->
            <div class="form-group">
                <label for="total_views"><i class="fas fa-users"></i> إجمالي عدد المشاهدات المستهدفة</label>
                <input type="number" id="total_views" min="1" value="100" required oninput="calculateTotalCost()">
            </div>

            <!-- مربع حساب التكلفة الإجمالية التلقائي بالكسور -->
            <div class="summary-card">
                <span class="summary-label"><i class="fas fa-calculator"></i> التكلفة الإجمالية للحملة:</span>
                <span id="total-cost-display" class="summary-value">0.0000 BFP</span>
            </div>

            <!-- زر الإرسال والحفظ -->
            <button type="submit" id="submit-btn" class="btn-submit">
                <i class="fas fa-plus-circle"></i> نشر الحملة ودفع التكلفة
            </button>
        </form>

        <a href="home.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة إلى الصفحة الرئيسية</a>
    </div>

    <script>
        // إعدادات الاتصال بـ Supabase
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let CURRENT_USER_ID = null;

        window.onload = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                CURRENT_USER_ID = user.id;
            } else {
                CURRENT_USER_ID = "test-user-id"; // للمستخدم التجريبي
            }
            calculateTotalCost();
        };

        // دالة الحساب التلقائي للتكلفة الإجمالية بدعم كامل للكسور
        function calculateTotalCost() {
            // ✨ تم تحويل حقل المكافأة لاستخدام parseFloat بدلاً من الأعداد الصحيحة لضمان بقاء الكسور مثل 0.001
            const reward = parseFloat(document.getElementById('reward').value) || 0;
            const views = parseInt(document.getElementById('total_views').value) || 0;
            
            const totalCost = reward * views;
            
            // عرض النتيجة بدقة 4 أرقام بعد الفاصلة العشرية
            document.getElementById('total-cost-display').innerText = `${totalCost.toFixed(4)} BFP`;
            return totalCost;
        }

        // إرسال البيانات وحفظها في قاعدة البيانات عبر الدالة المحدثة RPC
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري معالجة الدفع وإنشاء الحملة...`;

            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const url = document.getElementById('url').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            // ✨ استخدام parseFloat لتمرير القيم العشرية النظيفة بشكل كامل إلى الدالة المخزنة
            const reward = parseFloat(document.getElementById('reward').value);
            const total_views = parseInt(document.getElementById('total_views').value);
            const total_cost = calculateTotalCost();

            try {
                // استدعاء الدالة المخزنة RPC التي تم تحديثها لتقبل الـ NUMERIC
                const { data, error } = await _supabase.rpc('create_ad_and_deduct', {
                    p_user_id: CURRENT_USER_ID,
                    p_title: title,
                    p_description: description,
                    p_url: url,
                    p_reward: reward,          // 🟢 قيمة عشرية دقيقة
                    p_duration: duration,
                    p_total_views: total_views,
                    p_total_cost: total_cost    // 🟢 تكلفة إجمالية عشرية دقيقة
                });

                if (error) {
                    throw error;
                }

                alert("🎉 تم إنشاء إعلانك بنجاح، وخصم قيمته من محفظتك ونشره للمشاهدين!");
                window.location.href = "home.html";

            } catch (err) {
                console.error("تفاصيل الخطأ:", err);
                alert("فشل في إنشاء الإعلان: " + (err.message || err));
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-plus-circle"></i> نشر الحملة ودفع التكلفة`;
            }
        }
    </script>
</body>
</html>
