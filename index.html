<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower | Crypto Ecosystem</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
            font-family: 'Inter', 'Times New Roman', serif;
        }

        .logo-box { margin-bottom: 30px; }
        .main-logo {
            width: 140px; height: 140px; border-radius: 50%;
            object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.2);
            filter: grayscale(100%);
        }

        .content { text-align: center; max-width: 700px; padding: 0 20px; }

        h1 {
            font-size: 3.5rem; font-weight: 800; margin-bottom: 5px; letter-spacing: 3px;
            background: linear-gradient(to bottom, #fff 50%, #666 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .pro-art {
            font-size: 0.9rem; letter-spacing: 6px; color: var(--text-dim);
            text-transform: uppercase; margin-bottom: 30px; display: block;
        }

        p {
            font-size: 1.1rem; color: var(--text-dim); margin-bottom: 45px; line-height: 1.6;
        }

        .btn-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        .btn {
            padding: 15px 35px; font-size: 0.8rem; font-weight: bold;
            text-decoration: none; border-radius: 4px; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 2px; min-width: 160px; text-align: center;
        }

        .btn-login {
            background-color: var(--primary-accent);
            color: #000;
            border: 1px solid var(--primary-accent);
        }

        .btn-login:hover {
            background-color: transparent;
            color: var(--primary-accent);
        }

        .btn-signup {
            background-color: transparent;
            color: var(--primary-accent);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-signup:hover {
            border-color: var(--primary-accent);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* حالة التحميل البسيطة لمنع الوميض */
        #auth-status { opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="wight.jpg" alt="Logo" class="main-logo">
    </div>

    <div class="content" id="auth-status">
        <h1>THE BLACKFLOWER</h1>
        <span class="pro-art">Professional Art</span>
        
        <p id="welcome-text">Access the most exclusive decentralized crypto ecosystem. Security and professional art combined.</p>
        
        <div class="btn-container">
            <a href="login.html" id="main-btn" class="btn btn-login">Login</a>
            <a href="register.html" id="alt-btn" class="btn btn-signup">Join Now</a>
        </div>
    </div>

    <script>
        // إعدادات Supabase الثابتة
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function initApp() {
            const mainBtn = document.getElementById('main-btn');
            const altBtn = document.getElementById('alt-btn');
            const welcomeText = document.getElementById('welcome-text');
            const contentDiv = document.getElementById('auth-status');

            try {
                // 1. التحقق هل يوجد جلسة نشطة للمستخدم
                const { data: { session } } = await _supabase.auth.getSession();

                if (session && session.user) {
                    // المستخدم مسجل دخول بالفعل
                    const user = session.user;
                    
                    // جلب اليوزر نيم من جدول بياناتك
                    const { data: profile } = await _supabase
                        .from('blackflowerproart')
                        .select('username')
                        .eq('user_id', user.id)
                        .single();

                    const name = profile ? profile.username : user.email.split('@')[0];
                    
                    // تحويل الواجهة لحالة "المستخدم المسجل"
                    mainBtn.innerText = `GO TO DASHBOARD (${name.toUpperCase()})`;
                    mainBtn.href = "home.html";
                    
                    altBtn.innerText = "LOGOUT";
                    altBtn.href = "#";
                    altBtn.onclick = async (e) => {
                        e.preventDefault();
                        await _supabase.auth.signOut();
                        window.location.reload();
                    };

                    welcomeText.innerText = `Welcome back, ${name}. Your secure ecosystem is ready for action.`;
                } else {
                    // المستخدم غير مسجل دخول
                    mainBtn.innerText = "LOGIN";
                    mainBtn.href = "login.html";
                    
                    altBtn.innerText = "JOIN NOW";
                    altBtn.href = "register.html";
                }
            } catch (err) {
                console.log("Error initializing:", err);
            } finally {
                // إظهار المحتوى بعد الفحص لمنع القفز في التصميم
                contentDiv.style.opacity = "1";
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
