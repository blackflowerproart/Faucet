<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackFlower | تسجيل الدخول</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            color: #94a3b8;
        }

        .toggle-text span {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* تأثيرات بسيطة للتبديل */
        #signup-fields {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="form-title">تسجيل الدخول</h2>
    
    <form id="auth-form">
        <div id="signup-fields">
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" id="name" placeholder="أدخل اسمك">
            </div>
        </div>

        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submit-btn">دخول</button>
    </form>

    <div class="toggle-text" onclick="toggleForm()">
        <p id="toggle-msg">ليس لديك حساب؟ <span>إنشاء حساب جديد</span></p>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleForm() {
        isLogin = !isLogin;
        const title = document.getElementById('form-title');
        const signupFields = document.getElementById('signup-fields');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMsg = document.getElementById('toggle-msg');

        if (isLogin) {
            title.innerText = 'تسجيل الدخول';
            signupFields.style.display = 'none';
            submitBtn.innerText = 'دخول';
            toggleMsg.innerHTML = 'ليس لديك حساب؟ <span>إنشاء حساب جديد</span>';
        } else {
            title.innerText = 'إنشاء حساب';
            signupFields.style.display = 'block';
            submitBtn.innerText = 'تسجيل';
            toggleMsg.innerHTML = 'لديك حساب بالفعل؟ <span>دخول</span>';
        }
    }

    document.getElementById('auth-form').onsubmit = function(e) {
        e.preventDefault();
        alert('سيتم ربط هذا النموذج بقاعدة بيانات Supabase الخاصة بك لاحقاً!');
    };
</script>

</body>
</html>
