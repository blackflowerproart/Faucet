<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower | Crypto Ecosystem</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --secondary-accent: #1a1a1a;
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* تم تغيير الخط هنا إلى Times New Roman */
            font-family: 'Times New Roman', Times, serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .logo-box {
            margin-bottom: 40px;
        }

        .main-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            filter: grayscale(100%); /* الحفاظ على المظهر المونوكروم */
        }

        .content {
            text-align: center;
            max-width: 700px;
            padding: 0 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 4px; /* تباعد الحروف ليعطي طابعاً رسمياً */
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 45px;
            font-style: italic; /* الخط التايمز يظهر بجمالية عالية في وضع الإمالة */
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 16px 35px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login {
            background-color: var(--primary-accent);
            color: #000;
        }

        .btn-login:hover {
            background-color: transparent;
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
        }

        .btn-signup {
            background-color: transparent;
            color: var(--primary-accent);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-signup:hover {
            border-color: var(--primary-accent);
            background-color: var(--primary-accent);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="wight.jpg" alt="The BlackFlower Logo" class="main-logo">
    </div>

    <div class="content">
        <h1>THE BLACKFLOWER</h1>
        <p>The future of decentralized finance is blooming. Secure your assets and explore the next generation of crypto trading.</p>
        
        <div class="btn-container">
            <a href="#" class="btn btn-login">Login</a>
            <a href="register.html" class="btn btn-signup">Join Now</a>
        </div>
    </div>

</body>
</html>
