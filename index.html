<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower - الصفحة الرئيسية</title>
    <style>
        /* --- CSS RESET & BASE STYLES --- */
        :root {
            --bg-color: #080808; /* أسود غامق جدا خلفية */
            --text-color: #e0e0e0; /* رمادي فاتح للنصوص */
            --accent-color: #1a1a1a; /* لون داكن ثانوي */
            --primary-btn-bg: #f5f5f5; /* لون أبيض مائل للرمادي للزر الرئيسي */
            --primary-btn-text: #080808;
            --secondary-btn-bg: #222222; /* لون داكن لزر التسجيل */
            --secondary-btn-text: #e0e0e0;
            --hover-transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between; /* للتوزيع العمودي */
            overflow: hidden; /* لمنع التمرير غير الضروري */
        }

        /* --- LOGO SECTION --- */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin-top: 5vh; /* ترك مسافة من الأعلى */
        }

        .main-logo {
            max-width: 180px; /* حجم الشعار */
            height: auto;
            display: block;
        }

        /* --- CENTRAL CONTENT (HERO) --- */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-grow: 1; /* يشغل المساحة المتبقية */
            padding: 0 20px;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #aaaaaa;
            margin-bottom: 40px;
            max-width: 500px;
        }

        /* --- BUTTONS SECTION --- */
        .auth-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: var(--hover-transition);
            cursor: pointer;
            text-transform: uppercase;
        }

        /* زر الدخول (البارز) */
        .btn-login {
            background-color: var(--primary-btn-bg);
            color: var(--primary-btn-text);
            border: 1px solid var(--primary-btn-bg);
        }

        .btn-login:hover {
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* زر التسجيل (الداكن) */
        .btn-register {
            background-color: transparent;
            color: var(--secondary-btn-text);
            border: 1px solid var(--secondary-btn-text);
        }

        .btn-register:hover {
            background-color: var(--secondary-btn-text);
            color: var(--bg-color);
            box-shadow: 0 4px 15px rgba(224, 224, 224, 0.2);
            transform: translateY(-2px);
        }

        /* --- FOOTER --- */
        .footer {
            text-align: center;
            padding: 15px;
            background-color: var(--accent-color);
            font-size: 0.8rem;
            color: #666;
        }

        /* --- RESPONSIVE DESIGN (للشاشات الصغيرة) --- */
        @media (max-width: 600px) {
            .logo-container { margin-top: 3vh; }
            .main-logo { max-width: 140px; }
            .hero-title { font-size: 2.2rem; }
            .hero-subtitle { font-size: 1rem; margin-bottom: 30px; }
            
            .auth-buttons {
                flex-direction: column; /* الأزرار تحت بعض */
                gap: 15px;
                width: 100%;
                max-width: 300px;
            }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- قسم الشعار -->
    <div class="logo-container">
        <!-- **ملاحظة**: يجب أن يكون ملف الشعار المرفق باسم logo.png في نفس المجلد** -->
        <img src="logo.png" alt="The BlackFlower Logo" class="main-logo">
    </div>

    <!-- قسم المحتوى المركزي (Hero) -->
    <div class="hero-section">
        <h1 class="hero-title">The BlackFlower</h1>
        <p class="hero-subtitle">استمتع بتجربة مشاهدة استثنائية. عوالم جديدة، قصص تروى، مشاهدة بلا حدود.</p>
        
        <!-- قسم الأزرار -->
        <div class="auth-buttons">
            <a href="login.html" class="btn btn-login">تسجيل الدخول</a>
            <a href="register.html" class="btn btn-register">إنشاء حساب</a>
        </div>
    </div>

    <!-- التذييل (Footer) -->
    <footer class="footer">
        <p>&copy; 2024 The BlackFlower. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
