<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower | Crypto Ecosystem</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg-color: #050505; /* Deep Black */
            --primary-accent: #ffffff; /* Clean White */
            --secondary-accent: #1a1a1a; /* Dark Grey */
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* --- LOGO SECTION --- */
        .logo-box {
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .main-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Making it circular to match the image style */
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* --- HERO SECTION --- */
        .content {
            text-align: center;
            max-width: 700px;
            padding: 0 20px;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 45px;
            line-height: 1.6;
        }

        /* --- BUTTONS --- */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 16px 35px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login {
            background-color: var(--primary-accent);
            color: #000;
            border: 1px solid var(--primary-accent);
        }

        .btn-login:hover {
            background-color: transparent;
            color: var(--primary-accent);
            transform: scale(1.05);
        }

        .btn-signup {
            background-color: transparent;
            color: var(--primary-accent);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-signup:hover {
            border-color: var(--primary-accent);
            background-color: rgba(255, 255, 255, 0.05);
            transform: scale(1.05);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .btn-container { flex-direction: column; width: 100%; align-items: center; }
            .btn { width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Logo Section using wight.jpg -->
    <div class="logo-box">
        <img src="wight.jpg" alt="The BlackFlower Logo" class="main-logo">
    </div>

    <!-- Main Marketing Content -->
    <div class="content">
        <h1>THE BLACKFLOWER</h1>
        <p>
            The future of decentralized finance is blooming. 
            Secure your assets and explore the next generation of crypto trading with our advanced ecosystem.
        </p>
        
        <!-- Action Buttons -->
        <div class="btn-container">
            <a href="#login" class="btn btn-login">Login</a>
            <a href="#register" class="btn btn-signup">Join Now</a>
        </div>
    </div>

</body>
</html>
