<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackFlower | تسجيل مباشر</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 { text-align: center; color: #f8fafc; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:disabled { background: #475569; }
        #message { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>إنشاء حساب جديد</h2>
        <form id="registrationForm">
            <input type="text" id="fullName" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور (6 خانات على الأقل)" required minlength="6">
            <button type="submit" id="submitBtn">تسجيل الآن</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // إعدادات الربط المباشر مع مشروعك
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        // ملاحظة: يجب وضع الـ Anon Key الخاص بك هنا ليعمل الكود
        const SUPABASE_KEY = 'أدخل_هنا_مفتاح_ANON_الخاص_بك'; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('registrationForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            messageDiv.innerText = "جاري الاتصال بقاعدة البيانات...";
            messageDiv.style.color = "#94a3b8";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { display_name: fullName }
                    }
                });

                if (error) throw error;

                messageDiv.innerText = "تم التسجيل بنجاح! افحص بريدك لتأكيد الحساب.";
                messageDiv.style.color = "#10b981";
                form.reset();

            } catch (error) {
                messageDiv.innerText = "خطأ: " + error.message;
                messageDiv.style.color = "#ef4444";
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
