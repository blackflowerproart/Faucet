<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackFlower ProArt | الرئيسية</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .btn-auth {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .crypto-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .crypto-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #334155;
        }

        .price {
            font-size: 1.5rem;
            color: #10b981;
            margin: 10px 0;
        }

        h1 { text-align: center; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BlackFlower ProArt</div>
        <a href="signup.html" class="btn-auth">تسجيل حساب جديد</a>
    </nav>

    <h1>بورصة العملات الرقمية مباشر</h1>
    
    <div class="crypto-container" id="crypto-list">
        <!-- سيتم تحميل العملات هنا تلقائياً -->
        <div class="crypto-card">جاري تحميل البيانات...</div>
    </div>

    <script>
        async function fetchCrypto() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,cardano,solana&vs_currencies=usd');
                const data = await response.json();
                
                const container = document.getElementById('crypto-list');
                container.innerHTML = ''; // مسح رسالة التحميل

                const coins = {
                    'bitcoin': 'Bitcoin (BTC)',
                    'ethereum': 'Ethereum (ETH)',
                    'binancecoin': 'Binance Coin (BNB)',
                    'solana': 'Solana (SOL)',
                    'cardano': 'Cardano (ADA)'
                };

                for (const [id, name] of Object.entries(coins)) {
                    container.innerHTML += `
                        <div class="crypto-card">
                            <h3>${name}</h3>
                            <div class="price">$${data[id].usd.toLocaleString()}</div>
                            <small>تحديث تلقائي</small>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("خطأ في جلب البيانات", error);
            }
        }

        fetchCrypto();
        setInterval(fetchCrypto, 30000); // تحديث كل 30 ثانية
    </script>
</body>
</html>
