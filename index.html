<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower - الرئيسية</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 600px; padding: 20px; }
        img { width: 150px; height: auto; margin-bottom: 10px; border-radius: 10px; }
        h1 { font-family: 'Times New Roman', serif; font-size: 3rem; margin: 10px 0; letter-spacing: 2px; }
        .sub-title { font-family: Arial, sans-serif; font-size: 1.2rem; color: #bbb; text-transform: uppercase; margin-bottom: 40px; }
        .btn-box { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        button { padding: 18px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; }
        .login-btn { background-color: #fff; color: #000; }
        .earn-btn { background-color: #28a745; color: #fff; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        @media (min-width: 768px) { .btn-box { flex-direction: row; } }
    </style>
</head>
<body>
    <div class="container">
        <img src="wight.jpg" alt="Logo">
        <h1>The Black Flower</h1>
        <p class="sub-title">Professional art</p>
        <div class="btn-box">
            <button class="login-btn" onclick="location.href='login.html'">Login</button>
            <button class="earn-btn" onclick="location.href='register.html'">Start Earning</button>
        </div>
    </div>
</body>
</html>
