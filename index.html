<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Crypto Ecosystem</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .main-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            filter: grayscale(100%);
        }

        .content {
            text-align: center;
            max-width: 700px;
            padding: 0 20px;
        }

        /* العنوان بخط تايمز */
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #fff 50%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* النص الإضافي تحت العنوان بخط تايمز صغير */
        .pro-art {
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }

        p {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 45px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        /* الأزرار بخط أريال */
        .btn {
            font-family: Arial, Helvetica, sans-serif;
            padding: 15px 40px;
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px; /* زوايا أكثر حدة لتناسب الخط الرسمي */
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login {
            background-color: var(--primary-accent);
            color: #000;
            border: 1px solid var(--primary-accent);
        }

        .btn-login:hover {
            background-color: transparent;
            color: var(--primary-accent);
        }

        .btn-signup {
            background-color: transparent;
            color: var(--primary-accent);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-signup:hover {
            border-color: var(--primary-accent);
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="wight.jpg" alt="The Black Flower Logo" class="main-logo">
    </div>

    <div class="content">
        <h1>THE BLACKFLOWER</h1>
        <span class="pro-art">Professional Art</span>
        
        <p>The future of decentralized finance is blooming. Secure your assets and explore the next generation of crypto trading.</p>
        
        <div class="btn-container">
            <a href="#" class="btn btn-login">Login</a>
            <a href="register.html" class="btn btn-signup">Join Now</a>
        </div>
    </div>

</body>
</html>
