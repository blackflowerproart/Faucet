<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Black Flower | Home</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-gray: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* تنسيق شعار الصورة */
        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            /* إضافة لمسة احترافية للصورة */
            border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* العنوان بخط التايمز */
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* النص الفرعي بخط أريال */
        .subtitle {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            color: var(--accent-gray);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 5px;
            margin-bottom: 50px;
        }

        /* حاوية الأزرار */
        .button-container {
            display: flex;
            gap: 20px;
        }

        /* التنسيق المشترك للأزرار */
        .btn {
            text-decoration: none;
            padding: 15px 40px;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        /* زر Login باللون الأبيض */
        .btn-login {
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
        }

        .btn-login:hover {
            background-color: transparent;
            color: var(--text-color);
        }

        /* زر Start Earning شفاف بإطار */
        .btn-earning {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
        }

        .btn-earning:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* تأثير إضافي للخلفية لجعلها أقل جموداً */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <img src="wight.jepg" alt="The Black Flower Logo" class="logo">

    <h1>The Black Flower</h1>
    
    <div class="subtitle">professional art</div>

    <div class="button-container">
        <a href="login.html" class="btn btn-login">Login</a>
        <a href="register.html" class="btn btn-earning">Start Earning</a>
    </div>

</body>
</html>
