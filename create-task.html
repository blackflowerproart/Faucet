<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء مهمة جديدة - BFP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; direction: rtl; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 35px; border-radius: 20px; border: 1px solid #333; }
        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 1.1rem; box-sizing: border-box; outline: none; font-family: Arial; text-align: right; }
        input:focus, textarea:focus { border-color: #28a745; }
        textarea { height: 100px; resize: none; }
        label { display: block; text-align: right; margin-top: 15px; font-weight: bold; color: #ccc; }
        .file-input-container { background: #1a1a1a; border: 1px dashed #444; padding: 20px; border-radius: 10px; margin: 10px 0; cursor: pointer; position: relative; }
        .file-input-container input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .reward-tag { background: #28a745; color: #fff; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 1.2rem; font-weight: bold; line-height: 1.6; }
        .total-cost { font-size: 1.4rem; color: #ffc107; display: block; margin-top: 5px; }
        button { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        button:hover { background: #e6e6e6; }
        button:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .preview-img { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <h1>إنشاء مهمة جديدة للمتصفحين</h1>
    <div class="container">
        <input type="text" id="task-title" placeholder="عنوان المهمة (مثال: اشترك في قناتنا)">
        <textarea id="task-desc" placeholder="تفاصيل وشروط المهمة..."></textarea>
        <input type="url" id="task-url" placeholder="رابط الموقع المعني بالمهمة (https://...)">
        
        <label>إرفاق صورة توضيحية للمهمة:</label>
        <div class="file-input-container">
            <span id="file-label">📸 اضغط هنا لاختيار صورة</span>
            <input type="file" id="task-image" accept="image/*" onchange="previewFile()">
            <img id="image-preview" class="preview-img" src="" alt="Preview">
        </div>

        <label>عدد المنفذين المطلوبين للمهمة:</label>
        <input type="number" id="task-limit" min="1" value="10" placeholder="مثال: 50 مستخدم" oninput="calculateTotalCost()">

        <div class="reward-tag">
            المكافأة الفردية: <span id="reward-price">0.5</span> BFP
            <span class="total-cost">إجمالي التكلفة المطلوب حسمها: <span id="total-price">5</span> BFP</span>
            <small style="display: block; font-size: 0.85rem; margin-top: 5px; color: #eee;">صلاحية المهمة: أسبوع واحد فقط (تختفي بعدها تلقائياً)</small>
        </div>
        
        <button id="submit-btn" onclick="submitTask()">تأكيد ونشر المهمة</button>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const FIXED_REWARD = 0.5; // تسعير ثابت لكل فرد بناءً على طلبك

        // حساب إجمالي المبلغ بناءً على المكافأة الثابتة وعدد المنفذين
        function calculateTotalCost() {
            let limit = parseInt(document.getElementById('task-limit').value) || 0;
            if (limit < 1) limit = 1;

            const total = FIXED_REWARD * limit;

            document.getElementById('reward-price').innerText = FIXED_REWARD;
            document.getElementById('total-price').innerText = total % 1 === 0 ? total : total.toFixed(2);
        }

        function previewFile() {
            const file = document.getElementById('task-image').files[0];
            const preview = document.getElementById('image-preview');
            const label = document.getElementById('file-label');
            
            if (file) {
                label.innerText = `الملف المختار: ${file.name}`;
                const reader = new FileReader();
                reader.onloadend = function () {
                    preview.src = reader.result;
                    preview.style.display = "block";
                }
                reader.readAsDataURL(file);
            }
        }

        async function submitTask() {
            const btn = document.getElementById('submit-btn');
            
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("يرجى تسجيل الدخول أولاً");

            const title = document.getElementById('task-title').value.trim();
            const desc = document.getElementById('task-desc').value.trim();
            const url = document.getElementById('task-url').value.trim();
            let limit = parseInt(document.getElementById('task-limit').value);
            const imageFile = document.getElementById('task-image').files[0];

            if (!limit || limit < 1) limit = 1;
            const totalCost = FIXED_REWARD * limit;

            if (!title || !desc) return alert("يرجى إدخال عنوان المهمة وتفاصيلها على الأقل");

            try {
                btn.disabled = true;
                btn.innerText = "جاري التحقق من الرصيد والرفع...";

                // 1. التحقق من رصيد محفظة الناشر الحالية
                const { data: wallet, error: walletErr } = await _supabase
                    .from('wallets')
                    .select('balance')
                    .eq('user_id', user.id)
                    .maybeSingle();

                if (walletErr) throw walletErr;
                
                const currentBalance = wallet ? wallet.balance : 0;

                if (currentBalance < totalCost) {
                    throw new Error(`رصيدك غير كافٍ. تحتاج إلى ${totalCost} BFP بينما رصيدك الحالي هو ${currentBalance} BFP.`);
                }

                let imageUrl = null;

                // 2. رفع الصورة إلى الـ Storage في حال توفرها
                if (imageFile) {
                    const fileExt = imageFile.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                    const filePath = `tasks/${fileName}`;

                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('task-images')
                        .upload(filePath, imageFile);

                    if (uploadError) throw uploadError;

                    const { data: { publicUrl } } = _supabase.storage
                        .from('task-images')
                        .getPublicUrl(filePath);
                        
                    imageUrl = publicUrl;
                }

                // 3. خصم القيمة الإجمالية من محفظة الناشر
                const { error: deductError } = await _supabase
                    .from('wallets')
                    .update({ balance: currentBalance - totalCost })
                    .eq('user_id', user.id);

                if (deductError) throw new Error("فشل حسم الرصيد من المحفظة، يرجى المحاولة لاحقاً.");

                // حساب تاريخ الانتهاء (الوقت الحالي + 7 أيام)
                const expiresAt = new Date();
                expiresAt.setDate(expiresAt.getDate() + 7);

                // 4. إدخال بيانات المهمة بالكامل داخل جدول الـ tasks مع حقل صلاحية الانتهاء
                const { error: insertError } = await _supabase
                    .from('tasks')
                    .insert([
                        {
                            user_id: user.id,       
                            creator_id: user.id,   
                            title: title,
                            description: desc,
                            site_url: url ? url : null,
                            image_url: imageUrl,
                            points_reward: FIXED_REWARD, // تم تعيينها بـ 0.5 تلقائياً
                            target_limit: limit,
                            expires_at: expiresAt.toISOString() // حفظ تاريخ انتهاء المهمة بالقاعدة
                        }
                    ]);

                if (insertError) {
                    // تراجع (Rollback) في حال الفشل
                    await _supabase.from('wallets').update({ balance: currentBalance }).eq('user_id', user.id);
                    throw insertError;
                }

                alert(`تم بنجاح! تم حسم ${totalCost} BFP ونشر المهمة لعدد ${limit} منفذ محتمل.`);
                window.location.href = 'home.html';

            } catch (error) {
                console.error(error);
                alert(error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "تأكيد ونشر المهمة";
            }
        }
    </script>
</body>
</html>
