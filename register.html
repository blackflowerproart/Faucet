<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BlackFlower Pro Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
            --google-red: #db4437;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .register-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--pure-white);
            text-align: center;
            box-sizing: border-box;
        }

        .logo-header img {
            width: 70px; height: 70px;
            border: 1px solid var(--pure-white);
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .brand-title {
            font-family: 'Times New Roman', serif;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--light-gray);
            font-size: 10px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #333;
            background-color: transparent;
            color: var(--pure-white);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }

        .btn-register {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--pure-white);
            background-color: var(--pure-white);
            color: var(--pure-black);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-register:disabled { background-color: #333; color: #888; border-color: #333; cursor: not-allowed; }

        .google-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--pure-white);
            padding: 12px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        #msg { margin-top: 15px; font-size: 10px; text-transform: uppercase; display: none; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="EMAIL@EXAMPLE.COM" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="MIN 6 CHARACTERS" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="REPEAT PASSWORD" required>
            </div>
            
            <button type="submit" id="submitBtn" class="btn-register">Create Account</button>
        </form>

        <button class="google-btn" onclick="socialLogin('google')">
            <i class="fab fa-google"></i> Continue with Google
        </button>

        <div id="msg"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            if (password !== confirm) {
                showMessage("Passwords do not match", "red");
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                // 1. إنشاء الحساب في Supabase Auth
                const { data: authData, error: authError } = await _supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                if (authData.user) {
                    const autoUsername = email.split('@')[0];
                    btn.innerText = "SAVING PROFILE...";

                    // 2. إدخال البيانات في الجدول (هنا يحدث الخطأ عادةً)
                    const { error: dbError } = await _supabase
                        .from('blackflowerproart')
                        .insert([
                            { 
                                user_id: authData.user.id, 
                                username: autoUsername, 
                                balance: 0 
                            }
                        ]);
                    
                    if (dbError) {
                        // إظهار السبب التقني الدقيق في تنبيه
                        alert("SUPABASE DB ERROR:\nMessage: " + dbError.message + "\nCode: " + dbError.code + "\nHint: " + (dbError.hint || "Check your RLS Policies"));
                        throw dbError;
                    }
                    
                    window.location.replace("home.html");
                }
            } catch (err) {
                showMessage(err.message, "red");
                btn.innerText = "CREATE ACCOUNT";
                btn.disabled = false;
            }
        });

        async function socialLogin(provider) {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: "https://blackflowerproart.github.io/Faucet/home.html" }
            });
            if (error) showMessage(error.message, "red");
        }

        function showMessage(text, color) {
            const msgDiv = document.getElementById('msg');
            msgDiv.innerText = text.toUpperCase();
            msgDiv.style.color = color;
            msgDiv.style.display = "block";
        }
    </script>
</body>
</html>
