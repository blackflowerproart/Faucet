<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BlackFlower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
            --google: #db4437;
            --discord: #7289da;
            --facebook: #1877f2;
            --linkedin: #0077b5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .signup-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--pure-white);
            text-align: center;
        }

        /* ... (بقية التنسيقات السابقة كما هي) ... */

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
        }
        .divider span { padding: 0 10px; }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .social-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--light-gray);
            padding: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        /* تعديلات ألوان الـ Hover */
        .social-btn.google:hover { border-color: var(--google); color: var(--google); }
        .social-btn.discord:hover { border-color: var(--discord); color: var(--discord); }
        
        /* زر تويتر المعدل ليظهر على الخلفية السوداء */
        .social-btn.twitter:hover { 
            border-color: var(--pure-white); 
            color: var(--pure-white); 
            background-color: #1a1a1a;
        }

        .social-btn.facebook:hover { border-color: var(--facebook); color: var(--facebook); }
        .social-btn.linkedin:hover { border-color: var(--linkedin); color: var(--linkedin); }

        /* ... (بقية الـ CSS السابقة) ... */
    </style>
</head>
<body>
    <div class="signup-container">
        <!-- ... (محتوى الصفحة كما هو) ... -->
        
        <div class="social-grid">
            <button class="social-btn google" onclick="socialLogin('google')"><i class="fab fa-google"></i></button>
            <button class="social-btn discord" onclick="socialLogin('discord')"><i class="fab fa-discord"></i></button>
            <!-- استخدام أيقونة X الجديدة -->
            <button class="social-btn twitter" onclick="socialLogin('twitter')"><i class="fa-brands fa-x-twitter"></i></button>
            <button class="social-btn facebook" onclick="socialLogin('facebook')"><i class="fab fa-facebook-f"></i></button>
            <button class="social-btn linkedin" onclick="socialLogin('linkedin')"><i class="fab fa-linkedin-in"></i></button>
        </div>
        
        <!-- ... (بقية الصفحة) ... -->
    </div>
</body>
