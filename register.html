<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | The BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .signup-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
        .logo-header { text-align: center; margin-bottom: 20px; }
        .logo-header img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #f7931a; }
        h2 { text-align: center; margin-bottom: 8px; }
        .highlight { color: #f7931a; }
        p.subtitle { text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .btn-google {
            width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 8px;
            background-color: #161b22; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s;
        }
        .btn-google:hover { background-color: #21262d; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #484f58; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #30363d; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; color: #c9d1d9; font-size: 13px; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 8px;
            background-color: #0d1117; color: white; box-sizing: border-box; outline: none;
        }
        .input-group input:focus { border-color: #f7931a; }
        .btn-signup {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background-color: #f7931a; color: #0d1117; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #8b949e; }
        .footer-link a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo-header">
        <img src="wight.jpg" alt="Logo">
    </div>

    <h2>Join <span class="highlight">BlackFlower</span></h2>
    <p class="subtitle">Create your professional account</p>

    <button class="btn-google" onclick="signUpWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Continue with Google
    </button>

    <div class="divider">OR</div>

    <form id="signupForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="submitBtn" class="btn-signup">Create Account</button>
    </form>
    <p class="footer-link">Already have an account? <a href="index.html">Log In</a></p>
</div>

<script>
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. Form Registration
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerText = 'Processing...';

        const { error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: { emailRedirectTo: window.location.origin + '/success.html' }
        });

        if (error) {
            alert(error.message);
            btn.disabled = false;
            btn.innerText = 'Create Account';
        } else {
            // Redirect to the success page
            window.location.href = "success.html";
        }
    });

    // 2. Google Registration
    async function signUpWithGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/success.html' }
        });
        if (error) alert(error.message);
    }
</script>

</body>
</html>
