<div style="text-align: center; padding: 20px;">
    <img src="wight.jpg" alt="Logo" style="width: 100px; height: auto;">
    <h1 style="font-family: 'Times New Roman', Times, serif; margin: 0;">The Black Flower</h1>
    <p style="font-family: Arial, sans-serif; font-size: 14px; color: gray; margin: 0;">Professional Art</p>
    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>التسجيل</title>
</head>
<body>
    <!-- الشعار هنا -->
    <div style="max-width: 300px; margin: auto; text-align: center;">
        <input type="text" id="username" placeholder="اسم المستخدم" required><br><br>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required><br><br>
        <input type="password" id="password" placeholder="كلمة السر" required><br><br>
        <button onclick="signUpWithEmail()">تسجيل بالبريد</button>
        <hr>
        <button onclick="signInWithGoogle()">التسجيل عبر Google</button>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function signUpWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: { data: { username: username } } // إرسال الاسم للـ Trigger
            });

            if (error) alert(error.message);
            else alert('تفحص بريدك لتأكيد الحساب!');
        }

        async function signInWithGoogle() {
            await supabase.auth.signInWithOAuth({ provider: 'google' });
        }
    </script>
</body>
</html>
</div>
