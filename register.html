<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The BlackFlower</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #ffffff;
            --input-bg: #000000;
            --border: #222222;
            --text-dim: #888888;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .logo { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 20px; border: 1px solid #333; }
        h2 { margin-bottom: 8px; font-size: 1.6rem; text-align: center; }
        p.desc { color: var(--text-dim); font-size: 0.9rem; text-align: center; margin-bottom: 30px; }

        /* --- Social Login Buttons --- */
        .social-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-social:hover { background: rgba(255,255,255,0.05); border-color: #444; }
        .google-icon { width: 18px; }

        .divider {
            display: flex; align-items: center; text-align: center;
            margin: 20px 0; color: #444; font-size: 0.8rem; font-weight: 700;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #222; }
        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        /* --- Form Styles --- */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; margin-left: 4px; }
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--input-bg); color: #fff; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        .btn-primary {
            width: 100%; padding: 15px; background: var(--accent); color: #000;
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; margin-top: 10px; transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        
        .footer-text { text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-dim); }
        .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-card">
        <center><img src="wight.jpg" alt="Logo" class="logo"></center>
        <h2>Create Account</h2>
        <p class="desc">Join the future of crypto with The BlackFlower</p>

        <!-- خيارات التسجيل الاجتماعي -->
        <div class="social-buttons">
            <button class="btn-social" onclick="signUpWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon">
                Continue with Google
            </button>
        </div>

        <div class="divider">OR</div>

        <!-- استمارة التسجيل التقليدية -->
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="btn-primary" id="regBtn">Sign Up</button>
        </form>

        <p class="footer-text">Already have an account? <a href="index.html">Log In</a></p>
    </div>

    <script>
        // إعدادات Supabase الخاصة بك
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. التسجيل التقليدي (البريد وكلمة السر)
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('fullName').value;

            btn.disabled = true;
            btn.innerText = 'Creating Account...';

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: name },
                    emailRedirectTo: window.location.origin + '/index.html'
                }
            });

            if (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerText = 'Sign Up';
            } else {
                alert('Success! Please check your email to verify your account.');
                window.location.href = "index.html";
            }
        });

        // 2. التسجيل عبر جوجل (OAuth)
        async function signUpWithGoogle() {
            const { data, error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/index.html'
                }
            });
            if (error) alert(error.message);
        }
    </script>
</body>
</html>
