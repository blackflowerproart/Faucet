<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--pure-white);
            text-align: center;
        }

        .logo-header { margin-bottom: 20px; }
        .logo-header img { 
            width: 80px; height: 80px; 
            border: 1px solid var(--pure-white);
            filter: grayscale(100%);
            margin-bottom: 15px;
        }

        /* تنسيق النصوص تحت الشعار */
        .brand-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--light-gray);
            margin-top: 5px;
            text-transform: uppercase;
        }

        h2 { 
            margin: 30px 0 10px 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        .btn-google {
            width: 100%; padding: 12px; border: 1px solid var(--pure-white);
            background-color: transparent; color: var(--pure-white); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s; font-size: 11px; text-transform: uppercase;
        }
        .btn-google:hover { background-color: var(--pure-white); color: var(--pure-black); }
        .btn-google img { filter: invert(100%); }

        .divider { 
            display: flex; align-items: center; margin: 25px 0; 
            color: #444; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; 
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--light-gray); font-size: 9px; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 10px; border: none; border-bottom: 1px solid #333;
            background-color: transparent; color: var(--pure-white); box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }

        .btn-signup {
            width: 100%; padding: 15px; border: 1px solid var(--pure-white);
            background-color: var(--pure-white); color: var(--pure-black);
            font-size: 13px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-signup:hover { background-color: var(--pure-black); color: var(--pure-white); }

        .footer-link { margin-top: 25px; font-size: 10px; color: var(--light-gray); }
        .footer-link a { color: var(--pure-white); text-decoration: none; border-bottom: 1px solid var(--pure-white); }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
            <div class="brand-subtitle">Professional Art</div>
        </div>
        
        <!-- تم تغيير كلمة Studio إلى Now هنا -->
        <h2>Join Now</h2>
        
        <button class="btn-google" onclick="signUpWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="14">
            Continue with Google
        </button>

        <div class="divider">Or Email</div>

        <form id="signupForm">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="username" placeholder="YOUR NAME" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="EMAIL@EXAMPLE.COM" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-signup">Create Account</button>
        </form>
        <p class="footer-link">Member? <a href="index.html">Log In</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const successURL = window.location.href.replace('register.html', 'success.html');

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'PROCESSING...';
            const { error } = await _supabase.auth.signUp({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                options: { emailRedirectTo: successURL }
            });
            if (error) { alert(error.message); btn.innerText = 'CREATE ACCOUNT'; }
            else { window.location.href = "success.html"; }
        });

        async function signUpWithGoogle() {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: successURL }
            });
        }
    </script>
</body>
</html>
