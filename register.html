<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | The BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --border-color: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .signup-container {
            background-color: var(--card-bg);
            padding: 40px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border-color);
        }
        .logo-header { text-align: center; margin-bottom: 30px; }
        .logo-header img { 
            width: 80px; height: 80px; 
            border: 1px solid var(--border-color);
            filter: grayscale(100%); /* لضمان ظهور الشعار بالأبيض والأسود */
        }
        h2 { text-align: center; margin: 0 0 10px 0; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }

        .btn-google {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            background-color: transparent; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; font-size: 13px; text-transform: uppercase;
        }
        .btn-google:hover { background-color: white; color: black; }
        .btn-google img { filter: invert(100%); } /* جعل أيقونة جوجل بيضاء */

        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 12px; border: none; border-bottom: 1px solid #333;
            background-color: transparent; color: white; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid white; }

        .btn-signup {
            width: 100%; padding: 15px; border: 1px solid white;
            background-color: white; color: black; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-signup:hover { background-color: transparent; color: white; }

        .footer-link { text-align: center; margin-top: 25px; font-size: 12px; color: var(--text-secondary); }
        .footer-link a { color: white; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo-header"><img src="wight.jpg" alt="Logo"></div>
        <h2>Join BlackFlower</h2>
        <p class="subtitle">PURE DESIGN. NO COMPROMISE.</p>
        
        <button class="btn-google" onclick="signUpWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
            Continue with Google
        </button>

        <div class="divider">or use email</div>

        <form id="signupForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="NAME" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="EMAIL@DOMAIN.COM" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-signup">Register Account</button>
        </form>
        <p class="footer-link">Member? <a href="index.html">Log In</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const successURL = window.location.href.replace('register.html', 'success.html');

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'PROCESSING...';
            const { error } = await _supabase.auth.signUp({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                options: { emailRedirectTo: successURL }
            });
            if (error) { alert(error.message); btn.innerText = 'REGISTER'; }
            else { window.location.href = "success.html"; }
        });

        async function signUpWithGoogle() {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: successURL }
            });
        }
    </script>
</body>
</html>
