<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب - The BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            transition: all 0.5s ease;
        }

        .logo-header { text-align: center; margin-bottom: 20px; }
        .logo-header img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #f7931a; }

        h2 { text-align: center; margin-bottom: 10px; }
        .highlight { color: #f7931a; }
        p.subtitle { text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 25px; }

        /* أزرار التسجيل الاجتماعي */
        .social-auth { margin-bottom: 25px; }
        .btn-google {
            width: 100%; padding: 10px; border: 1px solid #30363d; border-radius: 6px;
            background-color: #161b22; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }

        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #484f58; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #30363d; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; color: #c9d1d9; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 6px;
            background-color: #0d1117; color: white; box-sizing: border-box;
        }

        .btn-signup {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background-color: #f7931a; color: #0d1117; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        /* --- واجهة النجاح (مخفية افتراضياً) --- */
        #success-content {
            display: none; /* مخفي */
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        .success-icon { font-size: 50px; color: #f7931a; margin-bottom: 15px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #8b949e; }
        .login-link a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container" id="main-card">
    <div class="logo-header">
        <img src="wight.jpg" alt="Logo">
    </div>

    <!-- المحتوى الأول: استمارة التسجيل -->
    <div id="register-content">
        <h2>إنشاء حساب <span class="highlight">Crypto</span></h2>
        <p class="subtitle">ابدأ رحلتك في عالم The BlackFlower اليوم</p>

        <div class="social-auth">
            <button class="btn-google" onclick="signInWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                التسجيل عبر Google
            </button>
        </div>

        <div class="divider">أو</div>

        <form id="signupForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-signup">إنشاء الحساب</button>
        </form>
        <p class="login-link">لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></p>
    </div>

    <!-- المحتوى الثاني: رسالة النجاح (تظهر بعد التسجيل) -->
    <div id="success-content">
        <div class="success-icon">✅</div>
        <h2>تمت العملية بنجاح!</h2>
        <p id="success-msg">مرحباً بك. يرجى مراجعة بريدك الإلكتروني لتفعيل الحساب.</p>
        <br>
        <a href="index.html" class="btn-signup" style="text-decoration: none; display: block;">العودة للرئيسية</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // دالة للتبديل بين الواجهات داخل نفس الملف
    function showSuccessUI(message) {
        document.getElementById('register-content').style.display = 'none';
        document.getElementById('success-content').style.display = 'block';
        if(message) document.getElementById('success-msg').innerText = message;
    }

    // 1. التسجيل التقليدي
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerText = 'جاري المعالجة...';

        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: { emailRedirectTo: window.location.origin + '/register.html' }
        });

        if (error) {
            alert('خطأ: ' + error.message);
            btn.disabled = false;
            btn.innerText = 'إنشاء الحساب';
        } else {
            showSuccessUI('لقد أرسلنا رابط تفعيل إلى بريدك الإلكتروني. يرجى تأكيده للبدء.');
        }
    });

    // 2. التسجيل عبر جوجل
    async function signInWithGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/register.html' }
        });
        
        // ملاحظة: جوجل سيعيد تحميل الصفحة، لذا يفضل التحقق من الجلسة عند العودة
        if (error) alert('خطأ: ' + error.message);
    }

    // للتحقق إذا عاد المستخدم من جوجل بنجاح
    window.onload = async () => {
        const { data } = await _supabase.auth.getSession();
        if (data.session) {
            showSuccessUI('تم تسجيل دخولك بنجاح عبر Google! يمكنك الآن البدء.');
        }
    }
</script>

</body>
</html>
