<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Black Flower | Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { border: 1px solid #fff; padding: 20px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: transparent; border: 1px solid #444; color: #fff; }
        button { width: 100%; padding: 10px; background: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>SIGN UP</h2>
    <form id="regForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="btn">CREATE ACCOUNT</button>
    </form>
</div>

<script>
    // 1. تعريف المتغيرات
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
    
    // محاولة الاتصال بـ Supabase
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        alert("1. تم الضغط على الزر بنجاح!"); // للتأكد أن الزر يعمل

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn');

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            // 2. محاولة إنشاء الحساب
            alert("2. جاري محاولة إنشاء الحساب في نظام Auth...");
            const { data: authData, error: authError } = await _supabase.auth.signUp({
                email: email,
                password: password
            });

            if (authError) {
                alert("خطأ في نظام Auth: " + authError.message);
                throw authError;
            }

            if (authData.user) {
                alert("3. نجاح إنشاء الحساب. المعرف هو: " + authData.user.id);
                
                // 3. محاولة الحفظ في الجدول
                alert("4. جاري محاولة حفظ البيانات في جدول blackflowerproart...");
                const { error: dbError } = await _supabase
                    .from('blackflowerproart')
                    .insert([
                        { 
                            user_id: authData.user.id, 
                            username: email.split('@')[0], 
                            balance: 0 
                        }
                    ]);

                if (dbError) {
                    alert("5. فشل الحفظ في الجدول: " + dbError.message);
                    console.error(dbError);
                } else {
                    alert("6. تم الحفظ بنجاح! سيتم توجيهك الآن.");
                    window.location.replace("home.html");
                }
            }
        } catch (err) {
            alert("حدث خطأ غير متوقع: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "CREATE ACCOUNT";
        }
    });
</script>

</body>
</html>
