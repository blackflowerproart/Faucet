<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The Black Flower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
            --google: #db4437;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .register-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--pure-white);
            text-align: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        .logo-header img { 
            width: 70px; height: 70px; 
            border: 1px solid var(--pure-white);
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .brand-title {
            font-family: 'Times New Roman', serif;
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 { 
            margin: 20px 0; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            color: var(--light-gray);
        }

        .social-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--pure-white);
            color: var(--pure-white);
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }

        .social-btn:hover {
            background: var(--pure-white);
            color: var(--pure-black);
        }

        #status-msg { 
            margin-top: 20px; 
            font-size: 11px; 
            color: #ffffff; 
            display: none; 
            text-transform: uppercase; 
            border: 1px dashed #444;
            padding: 12px;
        }

        .footer-link { margin-top: 25px; font-size: 11px; color: var(--light-gray); }
        .footer-link a { color: var(--pure-white); text-decoration: none; border-bottom: 1px solid white; }
        
        /* تأثير التحميل */
        .loader {
            border: 2px solid #333;
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
        </div>
        
        <h2>Create Account</h2>

        <button class="social-btn" id="googleBtn" onclick="socialLogin('google')">
            <i class="fab fa-google"></i>
            Continue with Google
        </button>

        <div id="status-msg"></div>

        <p class="footer-link">Already have an account? <a href="index.html">Sign In</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const statusMsg = document.getElementById('status-msg');

        // 1. الدخول عبر Google
        async function socialLogin(provider) {
            try {
                const { error } = await _supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        // التوجيه لنفس الصفحة لمعالجة البيانات عند العودة
                        redirectTo: window.location.href 
                    }
                });
                if (error) throw error;
            } catch (err) {
                showMessage(err.message);
            }
        }

        // 2. معالجة البيانات بعد العودة من Google
        async function handleAuthRedirect() {
            const { data: { session }, error } = await _supabase.auth.getSession();
            
            if (session) {
                showMessage('<span class="loader"></span> Syncing your profile...', false);
                
                // انتظار بسيط لضمان تنفيذ الـ SQL Trigger في السيرفر
                setTimeout(async () => {
                    try {
                        const user = session.user;

                        // التحقق من وجود السجل في جدولك الخاص
                        const { data: profile } = await _supabase
                            .from('blackflowerproart')
                            .select('user_id')
                            .eq('user_id', user.id)
                            .maybeSingle();

                        if (!profile) {
                            // إذا لم يعمل الـ Trigger، نقوم بإنشاء السجل يدوياً هنا
                            const usernameFromEmail = user.email.split('@')[0];
                            const { error: insertError } = await _supabase
                                .from('blackflowerproart')
                                .insert([{
                                    user_id: user.id,
                                    username: usernameFromEmail,
                                    email: user.email,
                                    balance: 0
                                }]);
                            
                            if (insertError) throw insertError;
                        }

                        // الانتقال لصفحة الهوم بعد التأكد من وجود البيانات
                        window.location.replace("home.html");

                    } catch (err) {
                        showMessage("Error creating profile: " + err.message);
                    }
                }, 2000); // تأخير لمدة ثانيتين لضمان استقرار السيرفر
            }
        }

        function showMessage(text, isError = true) {
            statusMsg.innerHTML = text.toUpperCase();
            statusMsg.style.display = "block";
            statusMsg.style.borderColor = isError ? "#300" : "#fff";
            statusMsg.style.color = isError ? "#ff4444" : "#fff";
        }

        // تشغيل التحقق التلقائي عند تحميل الصفحة
        window.onload = handleAuthRedirect;
    </script>
</body>
</html>
