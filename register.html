<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #fff; padding: 40px; width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: transparent; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="letter-spacing: 3px;">SIGN UP</h2>
    <form id="regForm">
        <input type="email" id="email" placeholder="EMAIL" required>
        <input type="password" id="password" placeholder="PASSWORD" required>
        <button type="submit" id="btn">Create Account</button>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn');
        const userPart = email.split('@')[0];

        btn.innerText = "CREATING...";
        btn.disabled = true;

        try {
            // 1. إنشاء الحساب في Auth
            const { data: authData, error: authError } = await _supabase.auth.signUp({
                email, password
            });

            if (authError) throw authError;

            if (authData.user) {
                // انتظر ثانية واحدة لضمان استقرار السيرفر
                btn.innerText = "SAVING DATA...";
                await new Promise(res => setTimeout(res, 1000));

                // 2. الحفظ في الجدول
                const { error: dbError } = await _supabase
                    .from('blackflowerproart')
                    .insert([{ 
                        user_id: authData.user.id, 
                        username: userPart, 
                        balance: 0 
                    }]);

                if (dbError) {
                    // إذا فشل هنا، سيظهر التنبيه بالسبب الحقيقي
                    alert("خطأ في الجدول: " + dbError.message);
                    console.log(dbError);
                } else {
                    // نجاح كامل - انتقل للرئيسية
                    window.location.replace("home.html");
                }
            }
        } catch (err) {
            alert("خطأ في النظام: " + err.message);
        } finally {
            btn.innerText = "Create Account";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
