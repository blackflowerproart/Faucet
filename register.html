<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب - The BlackFlower</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* دمج كود الـ CSS الخاص بك مع تحسينات بسيطة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #f7931a;
        }

        h2 { text-align: center; margin-bottom: 10px; }
        .highlight { color: #f7931a; }
        p.subtitle { text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 25px; }

        /* أزرار التسجيل الاجتماعي */
        .social-auth {
            margin-bottom: 25px;
        }

        .btn-google {
            width: 100%;
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #161b22;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-google:hover { background-color: #30363d; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #484f58;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #30363d; }
        .divider:not(:empty)::before { margin-left: .5em; }
        .divider:not(:empty)::after { margin-right: .5em; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; color: #c9d1d9; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 6px;
            background-color: #0d1117; color: white; box-sizing: border-box;
        }
        .input-group input:focus { outline: none; border-color: #f7931a; }

        .btn-signup {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background-color: #f7931a; color: #0d1117; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-signup:hover { background-color: #e58510; }
        .btn-signup:disabled { opacity: 0.5; cursor: not-allowed; }

        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #8b949e; }
        .login-link a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo-header">
        <img src="wight.jpg" alt="Logo">
    </div>

    <h2>إنشاء حساب <span class="highlight">Crypto</span></h2>
    <p class="subtitle">ابدأ رحلتك في عالم The BlackFlower اليوم</p>

    <!-- التسجيل عبر جوجل -->
    <div class="social-auth">
        <button class="btn-google" onclick="signInWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            التسجيل عبر Google
        </button>
    </div>

    <div class="divider">أو</div>

    <!-- استمارة التسجيل -->
    <form id="signupForm">
        <div class="input-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" placeholder="مثال: AhmedCrypto" required>
        </div>

        <div class="input-group">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-signup">إنشاء الحساب</button>
        
        <p class="login-link">لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></p>
    </form>
</div>

<script>
    // بيانات الربط الخاصة بك
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. التسجيل التقليدي بالبريد
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value;

        btn.disabled = true;
        btn.innerText = 'جاري المعالجة...';

        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { display_name: username },
                emailRedirectTo: window.location.origin + '/index.html'
            }
        });

        if (error) {
            alert('خطأ: ' + error.message);
            btn.disabled = false;
            btn.innerText = 'إنشاء الحساب';
        } else {
            alert('تم بنجاح! يرجى مراجعة بريدك الإلكتروني لتأكيد الحساب.');
            window.location.href = "index.html";
        }
    });

    // 2. التسجيل عبر جوجل
    async function signInWithGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/index.html'
            }
        });
        if (error) alert('خطأ في الاتصال بجوجل: ' + error.message);
    }
</script>

</body>
</html>
