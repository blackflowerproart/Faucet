<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The BlackFlower | Crypto Registration</title>
    <style>
        /* --- CSS STYLES (Matching Home Page) --- */
        :root {
            --bg-color: #050505;
            --primary-accent: #ffffff;
            --secondary-bg: #111111;
            --input-border: #333333;
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at top right, #1a1a1a 0%, #050505 100%);
        }

        /* --- REGISTRATION CARD --- */
        .register-card {
            background-color: var(--secondary-bg);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        .mini-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* --- FORM STYLES --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-left: 5px;
            margin-bottom: -10px;
        }

        input {
            background-color: #000;
            border: 1px solid var(--input-border);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            margin-top: 10px;
            background-color: var(--primary-accent);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        /* --- FOOTER LINKS --- */
        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .footer-links a {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-card { padding: 30px 20px; border-radius: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <!-- Logo Reference -->
        <img src="wight.jpg" alt="The BlackFlower Logo" class="mini-logo">
        
        <h2>Create Account</h2>
        <p class="subtitle">Join the BlackFlower crypto revolution today.</p>

        <form action="#">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email Address</label>
            <input type="email" placeholder="name@example.com" required>

            <label>Password</label>
            <input type="password" placeholder="Create a strong password" required>

            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <div class="footer-links">
            Already have an account? <a href="index.html">Login</a>
        </div>
    </div>

</body>
</html>
