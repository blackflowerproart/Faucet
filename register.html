<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Register | The BlackFlower</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent: #ffffff;
            --card-bg: #111111;
            --text-dim: #888888;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #222;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 10px; font-size: 1.5rem; }
        p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 30px; }

        /* --- خاصية التسجيل السريع بلمسة واحدة --- */
        .quick-auth-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
            border: 1px dashed #444;
            margin-bottom: 20px;
        }

        .email-input-quick {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            text-align: center;
            font-size: 1rem;
        }

        .btn-fast-track {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-fast-track:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <!-- استخدام الصورة التي طلبتها -->
        <img src="wight.jpg" alt="Logo" class="logo">
        
        <h2>Quick Access</h2>
        <p>Enter your email to bloom into the ecosystem instantly.</p>

        <!-- قسم التسجيل السريع -->
        <div class="quick-auth-section">
            <input type="email" class="email-input-quick" placeholder="yourname@email.com" id="quickEmail">
            <button class="btn-fast-track" onclick="handleQuickSign()">
                Instant Sign-Up ⚡
            </button>
        </div>

        <script>
            function handleQuickSign() {
                const email = document.getElementById('quickEmail').value;
                if(email) {
                    alert('Success! Registration link sent to: ' + email + '\nWelcome to The BlackFlower.');
                    window.location.href = "index.html"; // يعيده للرئيسية بعد النجاح
                } else {
                    alert('Please enter a valid email for quick access.');
                }
            }
        </script>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
