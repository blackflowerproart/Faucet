<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | The BlackFlower</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .logo-header { text-align: center; margin-bottom: 25px; }
        .logo-header img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #f7931a; }

        h2 { text-align: center; margin-bottom: 8px; font-weight: 800; }
        .highlight { color: #f7931a; }
        p.subtitle { text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 30px; }

        /* Social Auth */
        .btn-google {
            width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 8px;
            background-color: #161b22; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; 
            font-weight: 600; transition: 0.3s;
        }
        .btn-google:hover { background-color: #21262d; border-color: #8b949e; }

        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #484f58; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #30363d; }
        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        /* Form Controls */
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 8px; color: #c9d1d9; font-size: 13px; font-weight: 500; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 8px;
            background-color: #0d1117; color: white; box-sizing: border-box; outline: none;
        }
        .input-group input:focus { border-color: #f7931a; box-shadow: 0 0 0 2px rgba(247, 147, 26, 0.2); }

        .btn-signup {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background-color: #f7931a; color: #0d1117; font-size: 16px; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-signup:hover { background-color: #e58510; transform: translateY(-1px); }

        /* Success UI State */
        #success-state { display: none; text-align: center; animation: fadeIn 0.4s ease-in-out; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .footer-link { text-align: center; margin-top: 25px; font-size: 14px; color: #8b949e; }
        .footer-link a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo-header">
        <img src="wight.jpg" alt="The BlackFlower Logo">
    </div>

    <!-- Registration UI -->
    <div id="register-state">
        <h2>Join <span class="highlight">BlackFlower</span></h2>
        <p class="subtitle">Start your crypto journey with the elite.</p>

        <button class="btn-google" onclick="continueWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continue with Google
        </button>

        <div class="divider">OR USE EMAIL</div>

        <form id="signupForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="e.g. Satoshi_99" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@domain.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-signup">Create Account</button>
        </form>
        <p class="footer-link">Have an account? <a href="index.html">Log In</a></p>
    </div>

    <!-- Success UI -->
    <div id="success-state">
        <div class="success-icon">✔️</div>
        <h2>Registration Successful!</h2>
        <p id="success-msg">Your account has been created. Please check your email for the verification link.</p>
        <br>
        <a href="index.html" class="btn-signup" style="display: block; text-decoration: none;">Go to Dashboard</a>
    </div>
</div>

<script>
    // Configuration
    const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showSuccess(customMsg) {
        document.getElementById('register-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
        if (customMsg) document.getElementById('success-msg').innerText = customMsg;
    }

    // 1. Email & Password Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value;

        btn.disabled = true;
        btn.innerText = 'Creating Account...';

        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { display_name: username },
                emailRedirectTo: window.location.href // Returns to this page to show success
            }
        });

        if (error) {
            alert('Error: ' + error.message);
            btn.disabled = false;
            btn.innerText = 'Create Account';
        } else {
            showSuccess(`Success! A confirmation email has been sent to ${email}. Please verify to continue.`);
        }
    });

    // 2. Google OAuth (Fixed)
    async function continueWithGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.href // Redirects back here to trigger window.onload
            }
        });
        if (error) alert('Google Sign-In Error: ' + error.message);
    }

    // Check session on load (Handles Google callback)
    window.onload = async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            showSuccess('Welcome back! You have successfully signed in via Google.');
        }
    }
</script>

</body>
</html>
