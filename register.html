<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BlackFlower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-black: #000; --p-white: #fff; }
        body { 
            background: radial-gradient(circle, #111, #000); color: var(--p-white);
            font-family: 'Inter', sans-serif; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; margin: 0;
        }
        .container { 
            padding: 40px; width: 100%; max-width: 380px; border: 1px solid var(--p-white); 
            text-align: center; background: var(--p-black);
        }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 1px solid #fff; margin-bottom: 15px; }
        .btn-google { 
            width: 100%; padding: 15px; border: 1px solid #fff; background: transparent;
            color: #fff; cursor: pointer; text-transform: uppercase; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google:hover { background: #fff; color: #000; }
        #msg { margin-top: 20px; font-size: 11px; display: none; border: 1px dashed #444; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="wight.jpg" class="logo">
        <h1 style="font-family: serif; letter-spacing: 2px;">THE BLACK FLOWER</h1>
        <p style="color: #888; font-size: 12px; margin-bottom: 30px;">CREATE YOUR ACCOUNT</p>
        
        <button class="btn-google" onclick="signUpWithGoogle()">
            <i class="fab fa-google"></i> Continue with Google
        </button>
        
        <div id="msg"></div>
        <p style="font-size: 11px; margin-top: 20px;">Already a member? <a href="index.html" style="color: #fff;">Sign In</a></p>
    </div>

    <script>
        const _supabase = supabase.createClient('https://xuozmfqsfgdqogiiideu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us');

        async function signUpWithGoogle() {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        }

        async function handleRedirect() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const msg = document.getElementById('msg');
                msg.style.display = "block";
                msg.innerText = "SETTING UP YOUR PROFILE...";

                const { data: profile } = await _supabase.from('blackflowerproart').select('user_id').eq('user_id', session.user.id).maybeSingle();
                
                if (!profile) {
                    await _supabase.from('blackflowerproart').insert([{
                        user_id: session.user.id,
                        username: session.user.email.split('@')[0],
                        email: session.user.email,
                        balance: 0
                    }]);
                }
                setTimeout(() => window.location.href = "home.html", 1500);
            }
        }
        window.onload = handleRedirect;
    </script>
</body>
</html>
