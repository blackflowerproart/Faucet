<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Access | The BlackFlower</title>
    <!-- Supabase JavaScript Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --accent: #ffffff;
            --card-bg: #111111;
            --text-dim: #888888;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #222;
        }

        .logo { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            margin-bottom: 20px; 
            border: 1px solid #333; 
        }

        h2 { margin-bottom: 10px; font-size: 1.5rem; }
        p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 30px; }

        .quick-auth-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 16px;
            border: 1px dashed #444;
            margin-bottom: 20px;
        }

        .email-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .email-input:focus { border-color: var(--accent); }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .back { display: block; margin-top: 20px; color: #555; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <img src="wight.jpg" alt="Logo" class="logo">
        <h2>Quick Access</h2>
        <p>Enter your email to receive a secure login link. No password required.</p>

        <div class="quick-auth-section">
            <input type="email" class="email-input" placeholder="name@email.com" id="userEmail">
            <button class="btn-send" id="submitBtn" onclick="signInWithEmail()">
                Get Magic Link ⚡
            </button>
        </div>

        <a href="index.html" class="back">← Back to Home</a>
    </div>

    <script>
        // الروابط الخاصة بك
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signInWithEmail() {
            const email = document.getElementById('userEmail').value;
            const btn = document.getElementById('submitBtn');

            if (!email) {
                alert('Please enter a valid email.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Sending...';

            const { error } = await _supabase.auth.signInWithOtp({
                email: email,
                options: {
                    // سيتم تحويل المستخدم هنا بعد الضغط على الرابط في بريده
                    emailRedirectTo: window.location.origin + '/index.html'
                }
            });

            if (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.innerText = 'Get Magic Link ⚡';
            } else {
                alert('Check your email! We sent a secure link to ' + email);
                btn.innerText = 'Email Sent!';
            }
        }
    </script>
</body>
</html>
