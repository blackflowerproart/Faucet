<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BlackFlower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--pure-white);
            text-align: center;
        }

        .logo-header { margin-bottom: 20px; }
        .logo-header img { 
            width: 80px; height: 80px; 
            border: 1px solid var(--pure-white);
            filter: grayscale(100%);
            margin-bottom: 15px;
        }

        .brand-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--light-gray);
            margin-top: 5px;
            text-transform: uppercase;
        }

        h2 { 
            margin: 30px 0 10px 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--light-gray); font-size: 9px; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 10px; border: none; border-bottom: 1px solid #333;
            background-color: transparent; color: var(--pure-white); box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }

        .btn-signup {
            width: 100%; padding: 15px; border: 1px solid var(--pure-white);
            background-color: var(--pure-white); color: var(--pure-black);
            font-size: 13px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
            margin-top: 20px;
        }
        .btn-signup:hover { background-color: var(--pure-black); color: var(--pure-white); }
        .btn-signup:disabled { background-color: #444; cursor: not-allowed; opacity: 0.5; }

        .footer-link { margin-top: 25px; font-size: 10px; color: var(--light-gray); }
        .footer-link a { color: var(--pure-white); text-decoration: none; border-bottom: 1px solid var(--pure-white); }
        
        #status-msg { margin-top: 15px; font-size: 11px; display: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
            <div class="brand-subtitle">Professional Art</div>
        </div>
        
        <h2>Create Account</h2>

        <div class="input-group">
            <label>Name</label>
            <input type="text" id="username" placeholder="YOUR NAME">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="EMAIL@EXAMPLE.COM">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button type="button" id="submitBtn" onclick="handleRegister()" class="btn-signup">Create Account</button>
        
        <div id="status-msg"></div>

        <p class="footer-link">Member? <a href="login.html">Log In</a></p>
    </div>

    <script>
        // 1. إعدادات Supabase المباشرة
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        
        // 2. تهيئة العميل فوراً عند تحميل السكريبت
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 3. الدالة الرئيسية (تعمل عند الضغط على الزر)
        async function handleRegister() {
            const btn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('status-msg');
            const name = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // التحقق من الحقول
            if (!name || !email || !password) {
                alert("All fields are required!");
                return;
            }

            // تحديث حالة الزر
            btn.innerText = 'PROCESSING...';
            btn.disabled = true;
            statusMsg.style.display = "none";

            try {
                // المرحلة الأولى: إنشاء الحساب في Auth
                console.log("Attempting Auth Sign Up...");
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data.user) {
                    console.log("Auth Success. Inserting to Database...");
                    
                    // المرحلة الثانية: إضافة البيانات للجدول
                    const { error: insertError } = await _supabase
                        .from('blackflowerproart')
                        .insert([
                            { 
                                user_id: data.user.id,
                                username: name,
                                balance: 0.00
                            }
                        ]);

                    if (insertError) {
                        console.error("Database Insert Error:", insertError.message);
                        // لا نوقف العملية هنا لأن الحساب أنشئ فعلاً في Auth
                    }

                    // عرض رسالة النجاح
                    statusMsg.style.color = "#00ff88";
                    statusMsg.style.display = "block";
                    statusMsg.innerText = "SUCCESS! REDIRECTING...";
                    
                    setTimeout(() => {
                        window.location.href = "success.html";
                    }, 1500);
                }

            } catch (err) {
                console.error("Critical Error:", err.message);
                alert("Error: " + err.message);
                btn.innerText = 'CREATE ACCOUNT';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
