<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The Black Flower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --light-gray: #888888;
            --google-red: #db4437;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-container {
            background-color: var(--pure-black);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--pure-white);
            text-align: center;
        }

        .logo-header img { 
            width: 80px; height: 80px; 
            border: 1px solid var(--pure-white);
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .brand-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 { 
            margin: 30px 0 20px 0; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            color: var(--light-gray);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--light-gray); font-size: 10px; text-transform: uppercase; }
        .input-group input {
            width: 100%; padding: 12px; border: none; border-bottom: 1px solid #333;
            background-color: transparent; color: var(--pure-white); box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }

        .btn-login {
            width: 100%; padding: 15px; border: 1px solid var(--pure-white);
            background-color: var(--pure-white); color: var(--pure-black);
            font-size: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: var(--pure-black); color: var(--pure-white); }
        
        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #333; }
        .divider span { padding: 0 10px; }

        .google-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: var(--pure-white);
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .google-btn:hover { border-color: var(--google-red); color: var(--google-red); }

        #status-msg { margin-top: 15px; font-size: 11px; display: none; text-transform: uppercase; }
        
        .footer-link { margin-top: 25px; font-size: 11px; color: var(--light-gray); }
        .footer-link a { color: var(--pure-white); text-decoration: none; border-bottom: 1px solid white; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <img src="wight.jpg" alt="Logo">
            <div class="brand-title">The Black Flower</div>
        </div>
        
        <h2>Create Account</h2>

        <form id="registerForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="ENTER YOUR EMAIL" required>
            </div>
            <div class="input-group">
                <label>Choose Password</label>
                <input type="password" id="password" placeholder="MIN 6 CHARACTERS" required>
            </div>
         <button type="submit" id="regBtn" class="btn-login">Sign Up</button>
        </form>

        <div class="divider"><span>OR QUICK JOIN</span></div>

        <button class="google-btn" onclick="socialLogin('google')">
            <i class="fab fa-google"></i> Continue with Google
        </button>
        
        <div id="status-msg"></div>

        <p class="footer-link">Already a member? <a href="login.html">Sign In</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const statusMsg = document.getElementById('status-msg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // استخراج اسم مستخدم فريد من الإيميل
            const extractedUsername = email.split('@')[0];

            btn.innerText = 'INITIALIZING...';
            btn.disabled = true;
            statusMsg.style.display = "none";

            try {
                // 1. تسجيل المستخدم في نظام Auth
                const { data: authData, error: authError } = await _supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                if (authData.user) {
                    // 2. إنشاء السجل الخاص في جدول البيانات فوراً
                    const { error: dbError } = await _supabase
                        .from('blackflowerproart')
                        .insert([
                            { 
                                user_id: authData.user.id, 
                                username: extractedUsername, 
                                balance: 0 
                            }
                        ]);

                    if (dbError) throw dbError;

                    // 3. الانتقال فوراً لصفحة الهوم
                    // ملاحظة: Supabase يقوم بعمل Login تلقائي بعد الـ SignUp في الإعدادات الافتراضية
                    btn.innerText = 'SUCCESS! REDIRECTING...';
                    window.location.href = "home.html";
                }

            } catch (err) {
                statusMsg.style.color = "#ff4444";
                statusMsg.innerText = err.message.toUpperCase();
                statusMsg.style.display = "block";
                btn.innerText = 'REGISTER & START';
                btn.disabled = false;
            }
        });

  async function socialLogin(provider) {
    try {
        // إنشاء الرابط الذي سينتقل إليه المستخدم بعد اختيار الإيميل
        // هذا السطر يضمن أننا نرسله لصفحة home.html بغض النظر عن مكانه الحالي
        const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
        const redirectTarget = baseUrl + "/home.html";

        const { error } = await _supabase.auth.signInWithOAuth({
            provider: provider,
            options: {
                // هنا نحدد الرابط الذي أضفناه في الخطوة الأولى
                redirectTo: redirectTarget 
            }
        });

        if (error) throw error;
    } catch (err) {
        console.error("Login Error:", err.message);
        alert("حدث خطأ أثناء تسجيل الدخول: " + err.message);
    }
}
    </script>
</body>
</html>
