<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BlackFlower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pure-black: #000000; --pure-white: #ffffff; --light-gray: #888888; --google: #db4437; }
        body { font-family: 'Inter', sans-serif; background-color: var(--pure-black); color: var(--pure-white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .login-container { background-color: var(--pure-black); padding: 40px; width: 100%; max-width: 380px; border: 1px solid var(--pure-white); text-align: center; }
        .logo-header img { width: 80px; height: 80px; border: 1px solid var(--pure-white); border-radius: 50%; margin-bottom: 15px; object-fit: cover; }
        .brand-title { font-family: 'Times New Roman', serif; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--light-gray); font-size: 10px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; border: none; border-bottom: 1px solid #333; background-color: transparent; color: var(--pure-white); box-sizing: border-box; outline: none; transition: 0.3s; }
        .input-group input:focus { border-bottom: 1px solid var(--pure-white); }
        .btn-login { width: 100%; padding: 15px; border: 1px solid var(--pure-white); background-color: var(--pure-white); color: var(--pure-black); font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-login:hover { background-color: var(--pure-black); color: var(--pure-white); }
        .social-btn { background: transparent; border: 1px solid #333; color: var(--pure-white); padding: 12px; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; }
        .social-btn:hover { border-color: var(--google); color: var(--google); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-header"><img src="wight.jpg" alt="Logo"><div class="brand-title">The Black Flower</div></div>
        <h2 style="font-size: 14px; letter-spacing: 4px; color: #888; text-transform: uppercase; margin: 30px 0;">Sign Up</h2>
        <form id="registerForm">
            <div class="input-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
            <button type="submit" id="regBtn" class="btn-login">Sign Up</button>
        </form>
        <button class="social-btn" onclick="socialLogin('google')"><i class="fab fa-google"></i> Continue with Google</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://xuozmfqsfgdqogiiideu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1b3ptZnFzZmdkcW9naWlpZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDA0OTQsImV4cCI6MjA5MzI3NjQ5NH0.KLxch6WmMfoWKGE_ofKsRMjkD1dTsFqpCU8H1OJC6us';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // دالة الدخول بجوجل المحدثة
        async function socialLogin(provider) {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: "https://blackflowerproart.github.io/Faucet/home.html" }
            });
            if (error) alert(error.message);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signUp({ email, password });
            if (data.user) {
                await _supabase.from('blackflowerproart').insert([{ user_id: data.user.id, username: email.split('@')[0], balance: 0 }]);
                window.location.href = "home.html";
            } else { alert(error.message); }
        });
    </script>
</body>
</html>
