<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعيين كلمة سر جديدة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>كلمة سر جديدة</h2>
        <input type="password" id="new-password" placeholder="أدخل كلمة السر الجديدة">
        <button onclick="updatePassword()">تحديث كلمة السر</button>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'YOUR_ANON_KEY'; // ضع مفتاحك هنا
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value;
            
            const { error } = await _supabase.auth.updateUser({
                password: newPassword
            });

            if (error) {
                alert("حدث خطأ: " + error.message);
            } else {
                alert("تم تحديث كلمة السر بنجاح! يمكنك الدخول الآن.");
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
