<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة سر جديدة - The Black Flower</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .container { 
            background: #111; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #28a745; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #1a1a1a; 
            color: #fff; 
            font-size: 1.1rem; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #28a745; }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #28a745; 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.2rem;
            transition: 0.3s;
        }
        button:hover { background: #218838; }
        .info-text { color: #888; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container" id="reset-form" style="display: none;">
        <img src="wight.jpg" width="80" style="border-radius: 10px; margin-bottom: 10px;">
        <h2>كلمة سر جديدة</h2>
        <p>قم بإدخال كلمة السر الجديدة الخاصة بحسابك</p>
        <input type="password" id="new-password" placeholder="كلمة السر الجديدة">
        <button id="update-btn" onclick="updatePassword()">تحديث كلمة السر</button>
    </div>

    <!-- رسالة تظهر في حال عدم وجود جلسة -->
    <div class="container" id="error-box" style="display: none;">
        <h2 style="color: #ff4444;">عذراً! انتهت الجلسة</h2>
        <p>يجب الضغط على الرابط المرسل إلى بريدك الإلكتروني لتتمكن من تغيير كلمة السر.</p>
        <button onclick="window.location.href='login.html'">العودة لصفحة الدخول</button>
    </div>

    <script>
        const supabaseUrl = 'https://qxtubfnbbqnxteoocqrg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dHViZm5iYnFueHRlb29jcXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjE3NjksImV4cCI6MjA5Mzk5Nzc2OX0.Ns_Jc4omGVlK6pikEucMG__rmeDKxcaDdnSeYhhRjTU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // التحقق فور تحميل الصفحة هل المستخدم قادم من رابط الإيميل؟
        window.onload = async function() {
            const { data } = await _supabase.auth.getSession();
            
            if (data.session) {
                document.getElementById('reset-form').style.display = 'block';
            } else {
                document.getElementById('error-box').style.display = 'block';
            }
        };

        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value;
            const btn = document.getElementById('update-btn');

            if (newPassword.length < 6) {
                alert("يجب أن تكون كلمة السر 6 أحرف على الأقل");
                return;
            }

            btn.innerText = "جاري التحديث...";
            btn.disabled = true;

            const { error } = await _supabase.auth.updateUser({
                password: newPassword
            });

            if (error) {
                alert("حدث خطأ: " + error.message);
                btn.innerText = "تحديث كلمة السر";
                btn.disabled = false;
            } else {
                alert("تم تحديث كلمة السر بنجاح! سيتم توجيهك للدخول.");
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
